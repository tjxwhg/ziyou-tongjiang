<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f0f2f5; margin:0; }
        .header { background:#1b5e20; color:white; padding:12px; display:flex; justify-content:space-between; }
        .container { max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; }
        .tab button { padding:10px; border:none; background:#e0e0e0; }
        .tab button.active { background:#2e7d32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>管理员登录</h2>
    <div class="form-group"><input id="email" placeholder="邮箱"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>
<div id="main" class="hidden">
    <div class="header"><h2>通江文旅超管后台</h2><button onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍景点POI</button>
            <button onclick="switchTab('routes')">🗺️路线</button>
            <button onclick="switchTab('feedbacks')">💬留言</button>
            <button onclick="switchTab('merchants')">🏪商户账号</button>
            <button onclick="switchTab('transport')">🚗交通耗时</button>
        </div>
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="showAddPoi()">+ 新增POI</button>
            <div id="poi-list"></div>
        </div>
        <div id="tab-routes" class="hidden">
            <button class="btn btn-primary" onclick="showAddRoute()">+ 新增路线</button>
            <div id="route-list"></div>
        </div>
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>
        <div id="tab-merchants" class="hidden">
            <button class="btn btn-primary" onclick="createMerchant()">创建商户账号</button>
            <div id="merchant-list"></div>
        </div>
        <div id="tab-transport" class="hidden">
            <div id="transport-editor"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

async function checkSession(){
    const { data: { session } } = await sb.auth.getSession();
    if(session) { currentUser = session.user; showMain(); }
}
sb.auth.onAuthStateChange((event, session) => {
    if(session) { currentUser = session.user; showMain(); }
    else showLogin();
});
function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); }
function showMain(){ document.getElementById('login-page').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); switchTab('poi'); }
async function login(){
    const email = document.getElementById('email').value, pwd = document.getElementById('password').value;
    const { error } = await sb.auth.signInWithPassword({email, password:pwd});
    if(error) document.getElementById('login-msg').innerText = '登录失败：'+error.message;
}
async function logout(){ await sb.auth.signOut(); }

function switchTab(tab){
    const tabNames = ['poi','routes','feedbacks','merchants','transport'];
    const buttons = document.querySelectorAll('.tab button');
    buttons.forEach(b => b.classList.remove('active'));
    const idx = tabNames.indexOf(tab);
    if(idx >= 0 && buttons[idx]) buttons[idx].classList.add('active');
    
    tabNames.forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    
    if(tab==='poi') loadPOIs();
    if(tab==='routes') loadRoutes();
    if(tab==='feedbacks') loadFeedbacks();
    if(tab==='merchants') loadMerchants();
    if(tab==='transport') loadTransport();
}

// --- POI 管理 ---
async function loadPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').order('sort_order');
    let html = '';
    data.forEach(p => {
        html += `<div class="card"><b>${p.name}</b> [${p.category}] 
        <button onclick="editPoi(${p.id})">编辑</button>
        <button class="btn-danger" onclick="deletePoi(${p.id})">删除</button>
        <button onclick="manageSubPois(${p.id})">子点管理</button></div>`;
    });
    document.getElementById('poi-list').innerHTML = html || '<p>暂无POI</p>';
}
async function showAddPoi(){
    const name = prompt('名称'), lat = prompt('纬度'), lng = prompt('经度'), cat = prompt('类别(逗号分隔)'), desc = prompt('简介');
    if(!name||!lat||!lng) return;
    await sb.from('ztj_poi').insert({name, lat:parseFloat(lat), lng:parseFloat(lng), category:cat||'', description:desc||''});
    loadPOIs();
}
async function editPoi(id){
    const { data:poi } = await sb.from('ztj_poi').select().eq('id',id).single();
    const name = prompt('名称', poi.name), cat = prompt('类别', poi.category), lat = prompt('纬度', poi.lat), lng = prompt('经度', poi.lng);
    if(!name) return;
    await sb.from('ztj_poi').update({name, category:cat, lat:parseFloat(lat), lng:parseFloat(lng)}).eq('id',id);
    loadPOIs();
}
async function deletePoi(id){ if(confirm('确认删除？')){ await sb.from('ztj_poi').delete().eq('id',id); loadPOIs(); } }
function manageSubPois(poiId){
    const panel = document.createElement('div'); panel.className='panel active'; panel.id='subPoiPanel';
    panel.innerHTML = `<div class="panel-header"><h2>子点管理</h2><button onclick="document.getElementById('subPoiPanel').remove()">✕</button></div><div class="panel-body" id="subPoiContent">加载中...</div>`;
    document.body.appendChild(panel);
    loadSubPois(poiId);
}
async function loadSubPois(poiId){
    const { data } = await sb.from('sub_pois').select('*').eq('poi_id', poiId).order('sort_order');
    let html = `<button class="btn btn-primary" onclick="addSubPoi(${poiId})">+ 新增子点</button>`;
    data.forEach(s => {
        html += `<div class="card">${s.name} (${s.lat},${s.lng}) <button onclick="editSubPoi(${s.id})">编辑</button> <button class="btn-danger" onclick="deleteSubPoi(${s.id})">删除</button></div>`;
    });
    document.getElementById('subPoiContent').innerHTML = html;
}
async function addSubPoi(poiId){
    const name = prompt('子点名称'), lat = prompt('纬度'), lng = prompt('经度');
    if(!name||!lat||!lng) return;
    await sb.from('sub_pois').insert({poi_id:poiId, name, lat:parseFloat(lat), lng:parseFloat(lng)});
    loadSubPois(poiId);
}
async function editSubPoi(id){ /* 可扩展 */ }
async function deleteSubPoi(id){ if(confirm('删除？')){ await sb.from('sub_pois').delete().eq('id',id); /* 需刷新列表，可暂不处理 */ } }

// --- 路线管理 ---
async function loadRoutes(){
    const { data } = await sb.from('ztj_routes').select('*');
    document.getElementById('route-list').innerHTML = data.map(r => `<div class="card">${r.name} <button onclick="editRoute(${r.id})">编辑</button> <button class="btn-danger" onclick="deleteRoute(${r.id})">删除</button></div>`).join('');
}
async function showAddRoute(){
    const name = prompt('路线名称');
    if(!name) return;
    const { data } = await sb.from('ztj_routes').insert({name}).select();
    alert('已创建路线 ID:'+data[0].id);
    loadRoutes();
}
async function editRoute(id){ alert('编辑路线功能简化，可自行扩展'); }
async function deleteRoute(id){ if(confirm('删除？')){ await sb.from('ztj_routes').delete().eq('id',id); loadRoutes(); } }

// --- 留言 ---
async function loadFeedbacks(){
    const { data } = await sb.from('ztj_feedbacks').select('*');
    document.getElementById('feedback-list').innerHTML = data.map(f => `<div class="card"><p>${f.message}</p><p>回复：${f.reply||'未回复'}</p><button onclick="replyFeedback(${f.id})">回复</button></div>`).join('');
}
async function replyFeedback(id){
    const reply = prompt('输入回复');
    if(reply) await sb.from('ztj_feedbacks').update({reply}).eq('id',id);
    loadFeedbacks();
}

// --- 商户账号 ---
async function loadMerchants(){
    const { data } = await sb.from('ztj_merchants').select('*');
    document.getElementById('merchant-list').innerHTML = data.map(m => `<div class="card">${m.display_name} (账号:${m.account_id}) <button class="btn-danger" onclick="deleteMerchant('${m.id}')">删除</button></div>`).join('');
}
async function createMerchant(){
    const email = prompt('邮箱'), pwd = prompt('密码'), name = prompt('商户名称'), poiId = prompt('绑定POI ID');
    if(!email||!pwd||!name) return;
    const { data: userData, error } = await sb.auth.admin.createUser({email, password:pwd, email_confirm:true});
    if(error){ alert('创建用户失败：'+error.message); return; }
    await sb.from('ztj_merchants').insert({id:userData.user.id, account_id:name, display_name:name, poi_id:poiId||null});
    alert('商户账号创建成功');
    loadMerchants();
}
async function deleteMerchant(id){ if(confirm('删除商户？')){ await sb.from('ztj_merchants').delete().eq('id',id); loadMerchants(); } }

// --- 交通耗时 ---
async function loadTransport(){
    document.getElementById('transport-editor').innerHTML = '<p>交通耗时管理界面（可扩展）</p>';
}

window.onload = checkSession;
</script>
</body>
</html>
