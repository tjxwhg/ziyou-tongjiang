<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f0f2f5; margin:0; }
        .header { background:#1b5e20; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .container { max-width:1200px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab button { padding:10px 20px; border:none; background:#e0e0e0; border-radius:4px 4px 0 0; cursor:pointer; }
        .tab button.active { background:#2e7d32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin:2px; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; background:#fafafa; }
        .hidden { display:none; }
        .inline-edit { background:#fff; border:1px solid #2e7d32; border-radius:8px; padding:12px; margin-top:8px; }
        .checkbox-group { display:flex; flex-wrap:wrap; gap:12px; }
        .checkbox-group label { display:flex; align-items:center; gap:4px; font-weight:normal; }
        .sub-poi-card { margin-left:20px; border-left:3px solid #2e7d32; }
        .poi-name-header { display:flex; justify-content:space-between; align-items:center; }
        .route-node { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .poi-transport-group { margin-bottom:10px; border:1px solid #ccc; border-radius:6px; overflow:hidden; }
        .poi-transport-header { background:#f9f9f9; padding:10px; cursor:pointer; font-weight:bold; display:flex; justify-content:space-between; }
        .poi-transport-list { padding:10px; background:white; }
        .transport-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee; }
        .transport-item:last-child { border-bottom:none; }
        .transport-item label { width:40%; font-size:14px; }
        .transport-item input { width:80px; padding:4px; border:1px solid #ccc; border-radius:4px; text-align:center; }
        .save-status { font-size:12px; margin-left:8px; color:#2e7d32; }
        .category-group { margin-bottom:15px; }
        .category-title { font-size:16px; font-weight:bold; background:#e9f5ea; padding:8px; border-radius:4px; cursor:pointer; }
        .feedback-card { margin-bottom:10px; }
        .feedback-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
        .feedback-body { margin-top:8px; }
        .feedback-actions { display:flex; gap:8px; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>管理员登录</h2>
    <div class="form-group"><input id="email" placeholder="邮箱"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>

<div id="main" class="hidden">
    <div class="header"><h2>通江文旅超管后台</h2><button class="btn btn-default" onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍景点POI</button>
            <button onclick="switchTab('routes')">🗺️路线</button>
            <button onclick="switchTab('transport')">🚗交通耗时</button>
            <button onclick="switchTab('merchants')">🏪商户账号</button>
            <button onclick="switchTab('feedbacks')">💬留言反馈</button>
        </div>

        <!-- POI 管理 -->
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="toggleAddPoiForm()">+ 新增主景区POI</button>
            <div id="add-poi-form" class="inline-edit hidden" style="margin:10px 0;">
                <h3>新增POI</h3>
                <div class="form-group"><label>名称</label><input id="new-poi-name"></div>
                <div class="form-group"><label>类别（可多选）</label><div class="checkbox-group" id="new-poi-categories"></div></div>
                <div class="form-group"><label>归属主景区</label><select id="new-poi-parent"><option value="">无（作为主景区）</option></select></div>
                <div class="form-group"><label>游览时长 (分钟，可留空)</label><input type="number" id="new-poi-visit" value="60"></div>
                <div class="form-group"><label>纬度</label><input type="number" step="any" id="new-poi-lat"></div>
                <div class="form-group"><label>经度</label><input type="number" step="any" id="new-poi-lng"></div>
                <div class="form-group"><label>简介</label><textarea id="new-poi-desc" rows="2"></textarea></div>
                <div class="form-group"><label>语音文件 (mp3)</label><input type="file" accept="audio/*" id="new-poi-voice"></div>
                <button class="btn btn-primary" onclick="saveNewPoi()">保存</button>
                <button class="btn btn-default" onclick="toggleAddPoiForm()">取消</button>
            </div>
            <div id="poi-list"></div>
        </div>

        <!-- 路线管理 -->
        <div id="tab-routes" class="hidden">
            <button class="btn btn-primary" onclick="toggleRouteForm()">+ 新增路线</button>
            <div id="route-form" class="inline-edit hidden">
                <h3 id="route-form-title">新增路线</h3>
                <input type="hidden" id="edit-route-id" value="">
                <div class="form-group"><label>路线名称</label><input id="route-name"></div>
                <div class="form-group"><label>出发时间</label><input type="time" id="route-start-time" value="08:30"></div>
                <div class="form-group"><label>交通方式</label><input id="route-transport" placeholder="如 自驾/大巴"></div>
                <h4>路线节点</h4>
                <div id="route-node-selects"></div>
                <button class="btn btn-default" onclick="addRouteNode()">+ 添加节点</button>
                <button class="btn btn-primary" onclick="saveRoute()">保存路线</button>
                <button class="btn btn-default" onclick="toggleRouteForm()">取消</button>
            </div>
            <div id="route-list" style="margin-top:20px;"></div>
        </div>

        <!-- 交通耗时 -->
        <div id="tab-transport" class="hidden">
            <h3>景点间交通耗时（分钟）</h3>
            <p style="color:#666;">点击景点展开，修改耗时后自动保存。已排除公共服务、游玩娱乐、特产购物。</p>
            <div id="transport-editor"></div>
        </div>

        <!-- 商户账号 -->
        <div id="tab-merchants" class="hidden">
            <button class="btn btn-primary" onclick="createMerchant()">创建商户账号</button>
            <p style="color:#666; margin-top:8px;">创建后商户即可登录，业务信息由商户自行维护。</p>
        </div>

        <!-- 留言反馈 -->
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
const POI_CATEGORIES = ['自然景区','红色景区','文博场馆','餐饮住宿','交通枢纽','游玩娱乐','特产购物','公共服务'];
const EXCLUDED_TRANSPORT_CATS = ['公共服务','游玩娱乐','特产购物'];
let routeNodes = [];
let allTransportPresets = {};
let mainPoisForTransport = [];

async function checkSession(){
    const { data: { session } } = await sb.auth.getSession();
    if(session) { currentUser = session.user; showMain(); }
}
sb.auth.onAuthStateChange((event, session) => {
    if(session) { currentUser = session.user; showMain(); }
    else showLogin();
});
function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); }
function showMain(){ document.getElementById('login-page').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); switchTab('poi'); }
async function login(){
    const email = document.getElementById('email').value, pwd = document.getElementById('password').value;
    const { error } = await sb.auth.signInWithPassword({email, password:pwd});
    if(error) document.getElementById('login-msg').innerText = '登录失败：'+error.message;
}
async function logout(){ await sb.auth.signOut(); }

function switchTab(tab){
    const tabs = ['poi','routes','transport','merchants','feedbacks'];
    document.querySelectorAll('.tab button').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
    tabs.forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab));
    if(tab==='poi') loadPOIs();
    if(tab==='routes') loadRoutes();
    if(tab==='transport') loadTransportEditor();
    if(tab==='feedbacks') loadFeedbacks();
}

// ================== POI 管理 (优化：保存后局部更新) ==================
async function loadPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').eq('status','active').order('sort_order');
    const grouped = {};
    POI_CATEGORIES.forEach(cat => grouped[cat] = []);
    if(data) data.forEach(p => {
        const cats = (p.category||'').split(',');
        cats.forEach(c => { if(grouped[c]) grouped[c].push(p); });
    });
    let html = '';
    POI_CATEGORIES.forEach(cat => {
        const pois = grouped[cat] || [];
        if(pois.length===0) return;
        html += `<div class="category-group">
            <div class="category-title" onclick="this.nextElementSibling.classList.toggle('hidden')">${cat} (${pois.length})</div>
            <div class="category-content hidden">`;
        pois.forEach(p => {
            const hasParent = p.parent_id ? true : false;
            html += `<div class="card ${hasParent?'sub-poi-card':''}" id="poi-card-${p.id}">
                <div class="poi-name-header">
                    <span><b>${p.name}</b> [${p.category}] 游览时长：${p.visit_duration != null ? p.visit_duration+'分钟' : '未设置'}</span>
                    <div>
                        <button class="btn btn-default" onclick="toggleEditPoi(${p.id})">编辑</button>
                        ${!hasParent ? `<button class="btn btn-default" onclick="manageSubPois(${p.id})">子点管理</button>` : ''}
                        <button class="btn btn-danger" onclick="deletePoi(${p.id})">删除</button>
                    </div>
                </div>
                <div id="edit-poi-${p.id}" class="inline-edit hidden"></div>
                <div id="sub-pois-${p.id}" class="hidden" style="margin-top:8px;"></div>
            </div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('poi-list').innerHTML = html || '<p>暂无POI</p>';
    loadParentOptions();
}

async function loadParentOptions(){
    const { data } = await sb.from('ztj_poi').select('id,name').is('parent_id', null).order('name');
    const sel = document.getElementById('new-poi-parent');
    if(sel) {
        sel.innerHTML = '<option value="">无（作为主景区）</option>';
        if(data) data.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
    }
    const catDiv = document.getElementById('new-poi-categories');
    if(catDiv) catDiv.innerHTML = POI_CATEGORIES.map(c => `<label><input type="checkbox" value="${c}"> ${c}</label>`).join('');
}

function toggleAddPoiForm(){ document.getElementById('add-poi-form').classList.toggle('hidden'); }

async function saveNewPoi(){
    const name = document.getElementById('new-poi-name').value.trim();
    const lat = parseFloat(document.getElementById('new-poi-lat').value);
    const lng = parseFloat(document.getElementById('new-poi-lng').value);
    if(!name || isNaN(lat) || isNaN(lng)){ alert('名称、经纬度必填'); return; }
    const checks = [...document.querySelectorAll('#new-poi-categories input[type="checkbox"]:checked')].map(cb => cb.value);
    const category = checks.join(',');
    const parent_id = document.getElementById('new-poi-parent').value || null;
    const visitInput = document.getElementById('new-poi-visit').value.trim();
    const visit_duration = visitInput === '' ? null : (parseInt(visitInput) || 0);
    const description = document.getElementById('new-poi-desc').value;
    const { data: inserted, error } = await sb.from('ztj_poi').insert({ name, lat, lng, category, parent_id: parent_id||null, visit_duration, description }).select();
    if(error) { alert('保存失败：'+error.message); return; }
    const voiceFile = document.getElementById('new-poi-voice').files[0];
    if(voiceFile && inserted.length){
        const poiId = inserted[0].id;
        const path = `poi_${poiId}_${Date.now()}.mp3`;
        const { error: uploadError } = await sb.storage.from('audio-guides').upload(path, voiceFile);
        if(!uploadError){
            const { data: { publicUrl } } = sb.storage.from('audio-guides').getPublicUrl(path);
            await sb.from('ztj_poi').update({ voice_cn: publicUrl }).eq('id', poiId);
        }
    }
    alert('新增成功');
    toggleAddPoiForm();
    loadPOIs();
}

async function toggleEditPoi(id){
    const container = document.getElementById(`edit-poi-${id}`);
    if(!container.classList.contains('hidden')){ container.classList.add('hidden'); return; }
    const { data:poi } = await sb.from('ztj_poi').select('*').eq('id',id).single();
    const selectedCats = (poi.category||'').split(',');
    const { data: parents } = await sb.from('ztj_poi').select('id,name').is('parent_id', null).neq('id', id);
    let parentOpts = '<option value="">无（作为主景区）</option>';
    if(parents) parents.forEach(p => parentOpts += `<option value="${p.id}" ${poi.parent_id==p.id?'selected':''}>${p.name}</option>`);
    container.innerHTML = `
        <div class="form-group"><label>名称</label><input id="edit-name-${id}" value="${poi.name}"></div>
        <div class="form-group"><label>类别</label>
            <div class="checkbox-group">${POI_CATEGORIES.map(c => `<label><input type="checkbox" value="${c}" ${selectedCats.includes(c)?'checked':''}> ${c}</label>`).join('')}</div>
        </div>
        <div class="form-group"><label>归属主景区</label><select id="edit-parent-${id}">${parentOpts}</select></div>
        <div class="form-group"><label>游览时长 (分钟，可留空)</label><input type="number" id="edit-visit-${id}" value="${poi.visit_duration != null ? poi.visit_duration : ''}"></div>
        <div class="form-group"><label>纬度</label><input type="number" step="any" id="edit-lat-${id}" value="${poi.lat}"></div>
        <div class="form-group"><label>经度</label><input type="number" step="any" id="edit-lng-${id}" value="${poi.lng}"></div>
        <div class="form-group"><label>简介</label><textarea id="edit-desc-${id}">${poi.description||''}</textarea></div>
        <div class="form-group"><label>语音文件</label><input type="file" accept="audio/*" onchange="uploadPoiVoice(${id}, this)"></div>
        <button class="btn btn-primary" onclick="savePoiEdit(${id})">保存</button>
        <button class="btn btn-default" onclick="toggleEditPoi(${id})">取消</button>
    `;
    container.classList.remove('hidden');
}

async function savePoiEdit(id){
    const name = document.getElementById(`edit-name-${id}`).value.trim();
    const lat = parseFloat(document.getElementById(`edit-lat-${id}`).value);
    const lng = parseFloat(document.getElementById(`edit-lng-${id}`).value);
    if(!name || isNaN(lat) || isNaN(lng)){ alert('名称、经纬度必填'); return; }
    const checks = [...document.querySelectorAll(`#edit-poi-${id} input[type="checkbox"]:checked`)].map(cb => cb.value);
    const category = checks.join(',');
    const parent_id = document.getElementById(`edit-parent-${id}`).value || null;
    const visitInput = document.getElementById(`edit-visit-${id}`).value.trim();
    const visit_duration = visitInput === '' ? null : (parseInt(visitInput) || 0);
    const description = document.getElementById(`edit-desc-${id}`).value;
    const { error } = await sb.from('ztj_poi').update({ name, lat, lng, category, parent_id: parent_id||null, visit_duration, description }).eq('id', id);
    if(error) { alert('保存失败：'+error.message); return; }
    // 局部更新卡片显示，不刷新整个列表
    const card = document.getElementById(`poi-card-${id}`);
    if(card){
        const nameSpan = card.querySelector('.poi-name-header span b');
        if(nameSpan) nameSpan.textContent = name;
        const durationText = card.querySelector('.poi-name-header span');
        if(durationText) durationText.innerHTML = `<b>${name}</b> [${category}] 游览时长：${visit_duration != null ? visit_duration+'分钟' : '未设置'}`;
    }
    // 关闭编辑框
    const editContainer = document.getElementById(`edit-poi-${id}`);
    if(editContainer) editContainer.classList.add('hidden');
    alert('保存成功');
}

async function uploadPoiVoice(poiId, input){
    const file = input.files[0];
    if(!file) return;
    const path = `poi_${poiId}_${Date.now()}.mp3`;
    const { error } = await sb.storage.from('audio-guides').upload(path, file);
    if(error){ alert('上传失败'); return; }
    const { data: { publicUrl } } = sb.storage.from('audio-guides').getPublicUrl(path);
    await sb.from('ztj_poi').update({ voice_cn: publicUrl }).eq('id', poiId);
    alert('语音已更新');
}

async function manageSubPois(poiId){
    const container = document.getElementById(`sub-pois-${poiId}`);
    if(!container.classList.contains('hidden')){ container.classList.add('hidden'); return; }
    container.classList.remove('hidden');
    loadSubPois(poiId);
}
async function loadSubPois(poiId){
    const { data } = await sb.from('ztj_poi').select('*').eq('parent_id', poiId).order('sort_order');
    let html = `<button class="btn btn-primary" onclick="addSubPoi(${poiId})">+ 添加子点</button>`;
    if(data) data.forEach(sub => {
        html += `<div class="card sub-poi-card">
            <div><b>${sub.name}</b> (${sub.lat},${sub.lng})</div>
            <button class="btn btn-default" onclick="toggleEditPoi(${sub.id})">编辑</button>
            <button class="btn btn-danger" onclick="removeFromParent(${sub.id}, ${poiId})">移出</button>
        </div>`;
    });
    document.getElementById(`sub-pois-${poiId}`).innerHTML = html;
}
async function addSubPoi(parentId){
    const name = prompt('子点名称'), lat = prompt('纬度'), lng = prompt('经度');
    if(!name||!lat||!lng) return;
    await sb.from('ztj_poi').insert({ name, lat:parseFloat(lat), lng:parseFloat(lng), parent_id: parentId, category: '' });
    loadSubPois(parentId);
}
async function removeFromParent(subId, parentId){
    await sb.from('ztj_poi').update({ parent_id: null }).eq('id', subId);
    loadSubPois(parentId);
    loadPOIs();
}
async function deletePoi(id){
    if(confirm('确定删除此POI？')){ await sb.from('ztj_poi').delete().eq('id', id); loadPOIs(); }
}

// ================== 路线管理 ==================
async function loadPoiOptionsForRoute(){
    const { data } = await sb.from('ztj_poi').select('id,name').order('name');
    window.poiOptions = data || [];
}
async function renderRouteNodes(){
    if(!window.poiOptions) await loadPoiOptionsForRoute();
    const container = document.getElementById('route-node-selects');
    const opts = (window.poiOptions||[]).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    let html = '';
    routeNodes.forEach((n, i) => {
        html += `<div class="route-node">
            <select onchange="updateRouteNode(${i},'poi_id',this.value)">
                <option value="">--选择--</option>${opts}
            </select>
            <input type="number" value="${n.duration_min||60}" placeholder="分钟" style="width:80px" onchange="updateRouteNode(${i},'duration_min',this.value)">
            <button class="btn btn-danger" onclick="removeRouteNode(${i})">删除</button>
        </div>`;
    });
    container.innerHTML = html;
    routeNodes.forEach((n, i) => {
        const sel = container.querySelectorAll('select')[i];
        if(sel && n.poi_id) sel.value = String(n.poi_id);
    });
}
function updateRouteNode(idx, field, value){
    if(field==='poi_id') routeNodes[idx].poi_id = value || '';
    else routeNodes[idx].duration_min = parseInt(value)||60;
}
function addRouteNode(){ routeNodes.push({ poi_id: '', duration_min: 60 }); renderRouteNodes(); }
function removeRouteNode(idx){ routeNodes.splice(idx,1); renderRouteNodes(); }

function toggleRouteForm(editMode = false){
    const form = document.getElementById('route-form');
    if(!form.classList.contains('hidden')){ form.classList.add('hidden'); return; }
    form.classList.remove('hidden');
    if(!editMode){
        document.getElementById('edit-route-id').value = '';
        document.getElementById('route-name').value = '';
        document.getElementById('route-start-time').value = '08:30';
        document.getElementById('route-transport').value = '';
        document.getElementById('route-form-title').textContent = '新增路线';
        routeNodes = [];
    }
    loadPoiOptionsForRoute().then(renderRouteNodes);
}

async function editRoute(id){
    const form = document.getElementById('route-form');
    form.classList.remove('hidden');
    document.getElementById('route-form-title').textContent = '编辑路线';
    const { data: route } = await sb.from('ztj_routes').select('*').eq('id',id).single();
    const { data: nodes } = await sb.from('ztj_route_nodes').select('*').eq('route_id',id).order('order_num');
    document.getElementById('edit-route-id').value = id;
    document.getElementById('route-name').value = route.name;
    document.getElementById('route-start-time').value = route.start_time || '08:30';
    document.getElementById('route-transport').value = route.transport || '';
    routeNodes = (nodes||[]).map(n => ({ poi_id: n.poi_id, duration_min: n.duration_min }));
    await loadPoiOptionsForRoute();
    renderRouteNodes();
}

async function saveRoute(){
    const name = document.getElementById('route-name').value.trim();
    if(!name){ alert('输入路线名称'); return; }
    const editId = document.getElementById('edit-route-id').value;
    const start_time = document.getElementById('route-start-time').value;
    const transport = document.getElementById('route-transport').value;
    const routeData = { name, start_time, transport };
    let routeId = editId;
    if(editId){
        await sb.from('ztj_routes').update(routeData).eq('id', editId);
        await sb.from('ztj_route_nodes').delete().eq('route_id', editId);
    } else {
        const { data, error } = await sb.from('ztj_routes').insert(routeData).select();
        if(error){ alert('创建路线失败：'+error.message); return; }
        routeId = data[0].id;
    }
    const nodesPayload = routeNodes.filter(n => n.poi_id).map((n,i) => ({
        route_id: parseInt(routeId),
        poi_id: parseInt(n.poi_id),
        order_num: i+1,
        duration_min: n.duration_min || 60,
        transport_mode: '步行',
        transport_time: 0
    }));
    if(nodesPayload.length === 0){ alert('请至少添加一个有效节点'); return; }
    const { error } = await sb.from('ztj_route_nodes').insert(nodesPayload);
    if(error){ alert('保存节点失败：'+error.message); return; }
    alert('路线已保存');
    document.getElementById('route-form').classList.add('hidden');
    loadRoutes();
}

async function deleteRoute(id){
    if(confirm('删除路线？')){
        await sb.from('ztj_route_nodes').delete().eq('route_id', id);
        await sb.from('ztj_routes').delete().eq('id', id);
        loadRoutes();
    }
}

async function loadRoutes(){
    const { data, error } = await sb.from('ztj_routes').select('*');
    if(error) { console.error('加载路线失败', error); document.getElementById('route-list').innerHTML = '<p>加载失败</p>'; return; }
    document.getElementById('route-list').innerHTML = data.length ? data.map(r => `<div class="card"><b>${r.name}</b> (${r.start_time||'未设'}) <button class="btn btn-default" onclick="editRoute(${r.id})">编辑</button> <button class="btn btn-danger" onclick="deleteRoute(${r.id})">删除</button></div>`).join('') : '<p>暂无路线</p>';
}

// ================== 交通耗时编辑器 ==================
async function loadTransportEditor(){
    const { data: pois } = await sb.from('ztj_poi').select('id,name,category').is('parent_id', null).order('name');
    mainPoisForTransport = [ { id: 0, name: '红军广场', category: '' } ];
    (pois||[]).forEach(p => {
        if (!p.category) { mainPoisForTransport.push(p); return; }
        const cats = p.category.split(',');
        if (!cats.some(c => EXCLUDED_TRANSPORT_CATS.includes(c))) {
            mainPoisForTransport.push(p);
        }
    });
    const { data: presets } = await sb.from('ztj_transport_presets').select('*');
    allTransportPresets = {};
    if(presets) presets.forEach(p => {
        if(!allTransportPresets[p.from_poi_id]) allTransportPresets[p.from_poi_id] = {};
        allTransportPresets[p.from_poi_id][p.to_poi_id] = p.time_min;
    });
    renderTransportEditor();
}
function getTransportTimeAdmin(fromId, toId){
    if(allTransportPresets[fromId] && allTransportPresets[fromId][toId] !== undefined) return allTransportPresets[fromId][toId];
    if(allTransportPresets[toId] && allTransportPresets[toId][fromId] !== undefined) return allTransportPresets[toId][fromId];
    return '';
}
async function saveTransportTime(fromId, toId, time){
    const timeVal = parseInt(time); if(isNaN(timeVal)||timeVal<0) return;
    await sb.from('ztj_transport_presets').upsert({ from_poi_id: fromId, to_poi_id: toId, travel_mode:'auto', time_min: timeVal }, { onConflict:'from_poi_id,to_poi_id' });
    if(!allTransportPresets[fromId]) allTransportPresets[fromId] = {};
    allTransportPresets[fromId][toId] = timeVal;
}
function renderTransportEditor(){
    const container = document.getElementById('transport-editor');
    if(!mainPoisForTransport.length) { container.innerHTML = '<p>暂无可用景点</p>'; return; }
    let html = '';
    mainPoisForTransport.forEach(poi => {
        html += `<div class="poi-transport-group">
            <div class="poi-transport-header" onclick="this.nextElementSibling.classList.toggle('hidden')"><span>🚩 ${poi.name}</span><span>▼</span></div>
            <div class="poi-transport-list hidden">
                ${mainPoisForTransport.filter(p => p.id !== poi.id).map(target => {
                    const current = getTransportTimeAdmin(poi.id, target.id);
                    return `<div class="transport-item"><label>→ ${target.name}</label><div><input type="number" value="${current}" placeholder="分钟" data-from="${poi.id}" data-to="${target.id}" onblur="handleTransportChange(this)"><span class="save-status"></span></div></div>`;
                }).join('')}
            </div>
        </div>`;
    });
    container.innerHTML = html;
}
async function handleTransportChange(input){
    const from = parseInt(input.dataset.from), to = parseInt(input.dataset.to), val = input.value.trim();
    const statusEl = input.parentElement.querySelector('.save-status');
    if(val === '') return;
    await saveTransportTime(from, to, val);
    statusEl.textContent = '✓已保存'; setTimeout(() => statusEl.textContent='', 1500);
}

// ================== 商户账号 ==================
async function createMerchant(){
    const email = prompt('商户邮箱'), pwd = prompt('密码'), name = prompt('商户名称'), poiId = prompt('绑定POI ID（可留空）');
    if(!email||!pwd||!name) return;
    const { data: userData, error } = await sb.auth.admin.createUser({email, password:pwd, email_confirm:true});
    if(error){ alert('创建用户失败：'+error.message); return; }
    await sb.from('ztj_merchants').insert({ id: userData.user.id, account_id: name, display_name: name, poi_id: poiId||null });
    alert('商户创建成功');
}

// ================== 留言反馈 ==================
async function loadFeedbacks(){
    const { data, error } = await sb.from('ztj_feedbacks').select('*').order('created_at', {ascending: false});
    if(error) { document.getElementById('feedback-list').innerHTML = '<p>加载失败</p>'; return; }
    let html = '';
    if(data && data.length){
        data.forEach(f => {
            const dateStr = new Date(f.created_at).toLocaleString();
            const preview = f.message.length > 30 ? f.message.substring(0,30)+'...' : f.message;
            html += `<div class="card feedback-card">
                <div class="feedback-header" onclick="this.parentElement.querySelector('.feedback-body').classList.toggle('hidden')">
                    <span>${dateStr} - ${preview}</span>
                    <div class="feedback-actions">
                        <button class="btn btn-danger" onclick="event.stopPropagation(); deleteFeedback(${f.id})">删除</button>
                    </div>
                </div>
                <div class="feedback-body hidden">
                    <p style="white-space:pre-wrap;">${f.message}</p>
                    <p style="color:#666;">${f.reply ? '回复：'+f.reply : '暂未回复'}</p>
                    <textarea id="reply-${f.id}" rows="2" placeholder="输入回复">${f.reply||''}</textarea>
                    <button class="btn btn-primary" onclick="replyFeedback(${f.id})">保存回复</button>
                </div>
            </div>`;
        });
    } else html = '<p>暂无留言</p>';
    document.getElementById('feedback-list').innerHTML = html;
}
async function replyFeedback(id){
    const reply = document.getElementById('reply-'+id).value;
    await sb.from('ztj_feedbacks').update({ reply }).eq('id', id);
    loadFeedbacks();
}
async function deleteFeedback(id){
    if(!confirm('确定删除此留言？')) return;
    const { error } = await sb.from('ztj_feedbacks').delete().eq('id', id);
    if(error) alert('删除失败：'+error.message);
    else loadFeedbacks();
}

window.onload = checkSession;
