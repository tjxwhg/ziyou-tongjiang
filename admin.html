<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智游通江 - 管理后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background:#f0f2f5; }
        .header { background:#1b5e20; color:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
        .header button { background:white; color:#1b5e20; border:none; padding:6px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
        .container { max-width:960px; margin:20px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .tab { display:flex; gap:6px; margin-bottom:20px; border-bottom:2px solid #e0e0e0; overflow-x:auto; }
        .tab button { padding:10px 20px; border:none; background:none; font-size:16px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; }
        .tab button.active { border-bottom-color:#2e7d32; color:#2e7d32; font-weight:bold; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; margin-bottom:4px; font-weight:500; font-size:14px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
        .btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-weight:500; font-size:14px; margin-right:4px; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #e0e0e0; border-radius:8px; padding:14px; margin-bottom:12px; background:#fafafa; }
        .card-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .hidden { display:none; }
        #login-page { max-width:400px; margin:80px auto; }
        .login-box { background:white; padding:30px; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .login-box h2 { text-align:center; margin-bottom:20px; }
        .category-section { margin-bottom:20px; }
        .cat-title { background:#e8f5e9; padding:10px 14px; border-radius:6px; font-weight:bold; cursor:pointer; display:flex; justify-content:space-between; }
        .cat-content { padding:0 10px; }
        .poi-card { margin:8px 0; }
        .child-poi { margin-left:25px; border-left:2px solid #2e7d32; padding-left:12px; margin-top:5px; background:#f9f9f9; }
        .inline-edit { background:#fff; border:1px solid #2e7d32; border-radius:8px; padding:12px; margin-top:8px; }
        .add-child-form { margin:10px 0 10px 25px; background:#f0f0f0; padding:12px; border-radius:6px; }
        .error-msg { color:#c62828; margin-top:8px; }
    </style>
</head>
<body>
<div id="login-page">
    <div class="login-box"><h2>🔐 管理后台登录</h2>
        <div class="form-group"><input type="text" id="account" placeholder="账号"></div>
        <div class="form-group"><input type="password" id="password" placeholder="密码"></div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">登录</button>
        <div id="login-msg"></div>
    </div>
</div>
<div id="admin-page" class="hidden">
    <div class="header"><h2>📊 智游通江管理后台</h2><button onclick="logout()">退出</button></div>
    <div id="super-admin-view" class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍POI</button>
            <button onclick="switchTab('settings')">⚙️设置</button>
        </div>
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="showNewPoiForm()">+ 新增POI</button>
            <div id="new-poi-form" class="card hidden" style="margin-top:14px;">
                <h3>新增POI</h3>
                <div class="form-group"><label>类别</label>
                    <input list="category-list" id="new-poi-category" placeholder="选择或输入新类别">
                    <datalist id="category-list"></datalist>
                </div>
                <div class="form-group"><label>所属景区（留空为顶级）</label><select id="new-poi-parent"><option value="">无</option></select></div>
                <div class="form-group"><label>名称 *</label><input id="new-poi-name"></div>
                <div class="form-group"><label>纬度 *</label><input id="new-poi-lat" type="number" step="any"></div>
                <div class="form-group"><label>经度 *</label><input id="new-poi-lng" type="number" step="any"></div>
                <div class="form-group"><label>简介</label><textarea id="new-poi-desc" rows="2"></textarea></div>
                <div class="form-group"><label>建议游览时间(分钟)</label><input id="new-poi-suggested" type="number" value="10"></div>
                <div class="form-group"><label>最佳位置</label><input id="new-poi-best-view"></div>
                <div class="form-group"><label>中文讲解词</label><textarea id="new-poi-voice-cn" rows="2"></textarea></div>
                <div class="form-group"><label>英文讲解词</label><textarea id="new-poi-voice-en" rows="2"></textarea></div>
                <div class="form-group"><label>触发半径(米)</label><input id="new-poi-radius" type="number" value="15"></div>
                <button class="btn btn-primary" onclick="saveNewPoi()">保存</button>
                <button class="btn btn-default" onclick="hideNewPoiForm()">取消</button>
            </div>
            <div id="poi-list" style="margin-top:20px;"></div>
        </div>
        <div id="tab-settings" class="hidden">
            <h3>上传景区导览图</h3>
            <div class="card">
                <div class="form-group"><label>关联景区POI</label><select id="scenic-poi-select"><option value="">全局默认</option></select></div>
                <div class="form-group"><label>图片URL</label><input id="map-url" placeholder="图片链接"></div>
                <div class="form-group"><label>西南角纬度</label><input id="map-sw-lat" type="number" step="any"></div>
                <div class="form-group"><label>西南角经度</label><input id="map-sw-lng" type="number" step="any"></div>
                <div class="form-group"><label>东北角纬度</label><input id="map-ne-lat" type="number" step="any"></div>
                <div class="form-group"><label>东北角经度</label><input id="map-ne-lng" type="number" step="any"></div>
                <button class="btn btn-primary" onclick="saveMapConfig()">保存地图配置</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let allCategories = [];

    // 认证
    async function checkSession() { const { data:{session} } = await sb.auth.getSession(); if(session){ currentUser=session.user; await loadAdminView(); } }
    sb.auth.onAuthStateChange((event,session)=>{ if(session){ currentUser=session.user; loadAdminView(); } else { showLogin(); } });
    function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('admin-page').classList.add('hidden'); }
    async function login(){
        const account=document.getElementById('account').value.trim(), password=document.getElementById('password').value;
        if(!account||!password) return;
        const email=account.includes('@')?account:account+'@zhiyoutongjiang.cn';
        const {error}=await sb.auth.signInWithPassword({email,password});
        if(error){ document.getElementById('login-msg').innerHTML=`<p style="color:red">${error.message}</p>`; }
    }
    async function logout(){ await sb.auth.signOut(); }
    async function loadAdminView(){
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('admin-page').classList.remove('hidden');
        switchTab('poi');
    }

    function switchTab(tab){
        document.querySelectorAll('#super-admin-view .tab button').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-poi').classList.add('hidden');
        document.getElementById('tab-settings').classList.add('hidden');
        if(tab==='poi'){ document.getElementById('tab-poi').classList.remove('hidden'); loadPoiList(); }
        else if(tab==='settings'){ document.getElementById('tab-settings').classList.remove('hidden'); loadSettings(); }
    }

    function refreshCategoryDatalist(){
        const datalist = document.getElementById('category-list');
        datalist.innerHTML = allCategories.map(c => `<option value="${c}">`).join('');
    }

    async function loadParentOptions(selectId, selectedId=null){
        const { data } = await sb.from('ztj_poi').select('id,name').is('parent_id', null).order('name');
        const sel = document.getElementById(selectId);
        sel.innerHTML = '<option value="">无（顶级景点）</option>';
        if(data) data.forEach(p => { sel.innerHTML += `<option value="${p.id}" ${selectedId==p.id?'selected':''}>${p.name}</option>`; });
    }

    function showNewPoiForm(){
        if (allCategories.length === 0) {
            loadPoiList().then(() => {
                refreshCategoryDatalist();
                document.getElementById('new-poi-form').classList.remove('hidden');
            });
        } else {
            document.getElementById('new-poi-form').classList.remove('hidden');
        }
        loadParentOptions('new-poi-parent');
        clearNewPoiForm();
    }
    function hideNewPoiForm(){ document.getElementById('new-poi-form').classList.add('hidden'); }
    function clearNewPoiForm(){
        document.getElementById('new-poi-name').value='';
        document.getElementById('new-poi-lat').value=''; document.getElementById('new-poi-lng').value='';
        document.getElementById('new-poi-desc').value=''; document.getElementById('new-poi-suggested').value='10';
        document.getElementById('new-poi-best-view').value=''; document.getElementById('new-poi-voice-cn').value='';
        document.getElementById('new-poi-voice-en').value=''; document.getElementById('new-poi-radius').value='15';
    }
    async function saveNewPoi(){
        const name = document.getElementById('new-poi-name').value.trim();
        const category = document.getElementById('new-poi-category').value.trim();
        const lat = parseFloat(document.getElementById('new-poi-lat').value);
        const lng = parseFloat(document.getElementById('new-poi-lng').value);
        if(!name || !category || isNaN(lat)||isNaN(lng)){ alert('名称、类别、坐标必填'); return; }
        const payload = {
            name,
            category,
            parent_id: document.getElementById('new-poi-parent').value || null,
            lat, lng,
            description: document.getElementById('new-poi-desc').value,
            suggested_time: parseInt(document.getElementById('new-poi-suggested').value)||10,
            best_view: document.getElementById('new-poi-best-view').value,
            voice_cn: document.getElementById('new-poi-voice-cn').value,
            voice_en: document.getElementById('new-poi-voice-en').value,
            trigger_radius: parseInt(document.getElementById('new-poi-radius').value)||15
        };
        const { error } = await sb.from('ztj_poi').insert([payload]);
        if (error) { alert('保存失败：' + error.message); return; }
        hideNewPoiForm();
        loadPoiList();
    }

    function toggleEditForm(poiId){
        document.querySelectorAll('.inline-edit').forEach(el => { if(el.id !== `edit-${poiId}`) el.classList.add('hidden'); });
        const form = document.getElementById(`edit-${poiId}`);
        if(form) { form.classList.toggle('hidden'); if(!form.classList.contains('hidden')) form.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
    }

    async function editPoi(poiId){
        const { data } = await sb.from('ztj_poi').select('*').eq('id', poiId).single();
        if(!data) return;
        await loadParentOptions(`edit-parent-${poiId}`, data.parent_id);
        document.getElementById(`edit-category-${poiId}`).value = data.category || '';
        document.getElementById(`edit-name-${poiId}`).value = data.name;
        document.getElementById(`edit-lat-${poiId}`).value = data.lat;
        document.getElementById(`edit-lng-${poiId}`).value = data.lng;
        document.getElementById(`edit-desc-${poiId}`).value = data.description || '';
        document.getElementById(`edit-suggested-${poiId}`).value = data.suggested_time || 10;
        document.getElementById(`edit-bestview-${poiId}`).value = data.best_view || '';
        document.getElementById(`edit-voicecn-${poiId}`).value = data.voice_cn || '';
        document.getElementById(`edit-voiceen-${poiId}`).value = data.voice_en || '';
        document.getElementById(`edit-radius-${poiId}`).value = data.trigger_radius || 15;
        toggleEditForm(poiId);
    }

    async function saveInlineEdit(poiId){
        const name = document.getElementById(`edit-name-${poiId}`).value.trim();
        const category = document.getElementById(`edit-category-${poiId}`).value.trim();
        const lat = parseFloat(document.getElementById(`edit-lat-${poiId}`).value);
        const lng = parseFloat(document.getElementById(`edit-lng-${poiId}`).value);
        if(!name || !category || isNaN(lat)||isNaN(lng)){ alert('名称、类别、坐标必填'); return; }
        const payload = {
            name,
            category,
            parent_id: document.getElementById(`edit-parent-${poiId}`).value || null,
            lat, lng,
            description: document.getElementById(`edit-desc-${poiId}`).value,
            suggested_time: parseInt(document.getElementById(`edit-suggested-${poiId}`).value)||10,
            best_view: document.getElementById(`edit-bestview-${poiId}`).value,
            voice_cn: document.getElementById(`edit-voicecn-${poiId}`).value,
            voice_en: document.getElementById(`edit-voiceen-${poiId}`).value,
            trigger_radius: parseInt(document.getElementById(`edit-radius-${poiId}`).value)||15
        };
        const { error } = await sb.from('ztj_poi').update(payload).eq('id', poiId);
        if (error) { alert('保存失败：' + error.message); return; }
        loadPoiList();
    }

    async function deletePoi(id){ if(confirm('确定删除？')){ await sb.from('ztj_poi').delete().eq('id',id); loadPoiList(); } }

    function toggleAddChildForm(parentId){
        const form = document.getElementById(`add-child-${parentId}`);
        if(form) form.classList.toggle('hidden');
    }

    async function saveNewChild(parentId){
        const container = document.getElementById(`add-child-${parentId}`);
        const name = container.querySelector('input[name="child-name"]').value.trim();
        const category = container.querySelector('input[name="child-category"]').value.trim();
        const lat = parseFloat(container.querySelector('input[name="child-lat"]').value);
        const lng = parseFloat(container.querySelector('input[name="child-lng"]').value);
        if(!name || !category || isNaN(lat)||isNaN(lng)){ alert('名称、类别、坐标必填'); return; }
        const payload = {
            name,
            category,
            parent_id: parentId,
            lat, lng,
            description: container.querySelector('textarea[name="child-desc"]').value,
            suggested_time: parseInt(container.querySelector('input[name="child-suggested"]').value)||10,
            best_view: container.querySelector('input[name="child-bestview"]').value,
            voice_cn: container.querySelector('textarea[name="child-voicecn"]').value,
            voice_en: container.querySelector('textarea[name="child-voiceen"]').value,
            trigger_radius: parseInt(container.querySelector('input[name="child-radius"]').value)||15
        };
        const { error } = await sb.from('ztj_poi').insert([payload]);
        if (error) { alert('保存失败：' + error.message); return; }
        loadPoiList();
    }

    async function loadPoiList(){
        const { data, error } = await sb.from('ztj_poi').select('*').order('id');
        if (error) { console.error(error); return; }
        if(!data || data.length === 0){ document.getElementById('poi-list').innerHTML='<p>暂无POI</p>'; return; }
        const parents = data.filter(p => !p.parent_id);
        const children = data.filter(p => p.parent_id);

        const categorySet = new Set(data.map(p => p.category).filter(Boolean));
        allCategories = Array.from(categorySet).sort();
        refreshCategoryDatalist();

        let html = '';
        allCategories.forEach(cat => {
            const catParents = parents.filter(p => p.category === cat);
            const catId = `cat-${cat.replace(/\s+/g,'')}`;
            html += `<div class="category-section">
                <div class="cat-title" onclick="toggleCategory('${catId}')">
                    <span>${cat} (${catParents.length})</span>
                    <span id="${catId}-arrow">▼</span>
                </div>
                <div id="${catId}" class="cat-content">`;
            if(catParents.length === 0){
                html += '<p style="color:#999; padding:10px;">暂无点位</p>';
            } else {
                catParents.forEach(parent => {
                    html += `<div class="card poi-card">
                        <div class="card-row">
                            <div><b>${parent.name}</b></div>
                            <div>
                                <button class="btn btn-default" onclick="editPoi('${parent.id}')">编辑</button>
                                <button class="btn btn-danger" onclick="deletePoi('${parent.id}')">删除</button>
                                <button class="btn btn-default" onclick="toggleChildren('${parent.id}')">子景点</button>
                                <button class="btn btn-default" onclick="toggleAddChildForm('${parent.id}')">+ 添加子POI</button>
                            </div>
                        </div>
                        <div id="edit-${parent.id}" class="inline-edit hidden">
                            <div class="form-group"><label>类别</label><input id="edit-category-${parent.id}" value="${parent.category||''}"></div>
                            <div class="form-group"><label>所属景区</label><select id="edit-parent-${parent.id}"><option value="">无</option></select></div>
                            <div class="form-group"><label>名称</label><input id="edit-name-${parent.id}"></div>
                            <div class="form-group"><label>纬度</label><input id="edit-lat-${parent.id}" type="number" step="any"></div>
                            <div class="form-group"><label>经度</label><input id="edit-lng-${parent.id}" type="number" step="any"></div>
                            <div class="form-group"><label>简介</label><textarea id="edit-desc-${parent.id}" rows="2"></textarea></div>
                            <div class="form-group"><label>建议游览时间</label><input id="edit-suggested-${parent.id}" type="number" value="10"></div>
                            <div class="form-group"><label>最佳位置</label><input id="edit-bestview-${parent.id}"></div>
                            <div class="form-group"><label>中文讲解</label><textarea id="edit-voicecn-${parent.id}" rows="2"></textarea></div>
                            <div class="form-group"><label>英文讲解</label><textarea id="edit-voiceen-${parent.id}" rows="2"></textarea></div>
                            <div class="form-group"><label>半径(米)</label><input id="edit-radius-${parent.id}" type="number" value="15"></div>
                            <button class="btn btn-primary" onclick="saveInlineEdit('${parent.id}')">保存</button>
                            <button class="btn btn-default" onclick="toggleEditForm('${parent.id}')">取消</button>
                        </div>
                        <div id="children-${parent.id}" class="hidden" style="margin-left:20px; margin-top:8px;">
                            ${children.filter(c => c.parent_id == parent.id).map(c => `
                            <div class="child-poi">
                                <div class="card-row">
                                    <div>└ <b>${c.name}</b> (${c.category||''})</div>
                                    <div>
                                        <button class="btn btn-default" onclick="editPoi('${c.id}')">编辑</button>
                                        <button class="btn btn-danger" onclick="deletePoi('${c.id}')">删除</button>
                                    </div>
                                </div>
                                <div id="edit-${c.id}" class="inline-edit hidden">
                                    <div class="form-group"><label>类别</label><input id="edit-category-${c.id}" value="${c.category||''}"></div>
                                    <div class="form-group"><label>所属景区</label><select id="edit-parent-${c.id}"><option value="">无</option></select></div>
                                    <div class="form-group"><label>名称</label><input id="edit-name-${c.id}"></div>
                                    <div class="form-group"><label>纬度</label><input id="edit-lat-${c.id}" type="number" step="any"></div>
                                    <div class="form-group"><label>经度</label><input id="edit-lng-${c.id}" type="number" step="any"></div>
                                    <div class="form-group"><label>简介</label><textarea id="edit-desc-${c.id}" rows="2"></textarea></div>
                                    <div class="form-group"><label>建议游览时间</label><input id="edit-suggested-${c.id}" type="number" value="10"></div>
                                    <div class="form-group"><label>最佳位置</label><input id="edit-bestview-${c.id}"></div>
                                    <div class="form-group"><label>中文讲解</label><textarea id="edit-voicecn-${c.id}" rows="2"></textarea></div>
                                    <div class="form-group"><label>英文讲解</label><textarea id="edit-voiceen-${c.id}" rows="2"></textarea></div>
                                    <div class="form-group"><label>半径(米)</label><input id="edit-radius-${c.id}" type="number" value="15"></div>
                                    <button class="btn btn-primary" onclick="saveInlineEdit('${c.id}')">保存</button>
                                    <button class="btn btn-default" onclick="toggleEditForm('${c.id}')">取消</button>
                                </div>
                            </div>
                            `).join('')}
                        </div>
                        <div id="add-child-${parent.id}" class="add-child-form hidden">
                            <h4>新增子POI</h4>
                            <div class="form-group"><label>类别</label><input name="child-category" list="category-list" placeholder="选择或输入类别"></div>
                            <div class="form-group"><label>名称</label><input name="child-name"></div>
                            <div class="form-group"><label>纬度</label><input name="child-lat" type="number" step="any"></div>
                            <div class="form-group"><label>经度</label><input name="child-lng" type="number" step="any"></div>
                            <div class="form-group"><label>简介</label><textarea name="child-desc" rows="2"></textarea></div>
                            <div class="form-group"><label>建议游览时间</label><input name="child-suggested" type="number" value="10"></div>
                            <div class="form-group"><label>最佳位置</label><input name="child-bestview"></div>
                            <div class="form-group"><label>中文讲解</label><textarea name="child-voicecn" rows="2"></textarea></div>
                            <div class="form-group"><label>英文讲解</label><textarea name="child-voiceen" rows="2"></textarea></div>
                            <div class="form-group"><label>半径(米)</label><input name="child-radius" type="number" value="15"></div>
                            <button class="btn btn-primary" onclick="saveNewChild('${parent.id}')">保存</button>
                            <button class="btn btn-default" onclick="toggleAddChildForm('${parent.id}')">取消</button>
                        </div>
                    </div>`;
                });
            }
            html += `</div></div>`;
        });
        document.getElementById('poi-list').innerHTML = html || '<p>暂无POI</p>';
    }

    function toggleCategory(id){
        const el = document.getElementById(id);
        const arrow = document.getElementById(id + '-arrow');
        if(el.classList.contains('hidden')){ el.classList.remove('hidden'); arrow.textContent='▼'; }
        else { el.classList.add('hidden'); arrow.textContent='▶'; }
    }

    function toggleChildren(parentId){
        const el = document.getElementById(`children-${parentId}`);
        el.classList.toggle('hidden');
    }

    // 设置相关
    async function loadSettings(){
        await loadScenicSelect();
        const { data } = await sb.from('ztj_system_config').select('value').eq('key','custom_map').maybeSingle();
        if(data && data.value){
            document.getElementById('map-url').value = data.value.url || '';
            document.getElementById('map-sw-lat').value = data.value.bounds[0][0] || '';
            document.getElementById('map-sw-lng').value = data.value.bounds[0][1] || '';
            document.getElementById('map-ne-lat').value = data.value.bounds[1][0] || '';
            document.getElementById('map-ne-lng').value = data.value.bounds[1][1] || '';
        }
    }
    async function loadScenicSelect(){
        const { data } = await sb.from('ztj_poi').select('id,name').is('parent_id', null).order('name');
        const sel = document.getElementById('scenic-poi-select');
        sel.innerHTML = '<option value="">全局默认</option>';
        if(data) data.forEach(p => { sel.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
    }
    async function saveMapConfig(){
        const scenicId = document.getElementById('scenic-poi-select').value;
        const key = scenicId ? `custom_map_${scenicId}` : 'custom_map';
        const url = document.getElementById('map-url').value.trim();
        const swLat = parseFloat(document.getElementById('map-sw-lat').value);
        const swLng = parseFloat(document.getElementById('map-sw-lng').value);
        const neLat = parseFloat(document.getElementById('map-ne-lat').value);
        const neLng = parseFloat(document.getElementById('map-ne-lng').value);
        if(!url || isNaN(swLat)||isNaN(swLng)||isNaN(neLat)||isNaN(neLng)){ alert('请完整填写'); return; }
        const value = { url, bounds: [[swLat,swLng],[neLat,neLng]] };
        const { data:exist } = await sb.from('ztj_system_config').select('key').eq('key',key).maybeSingle();
        if(exist) await sb.from('ztj_system_config').update({value}).eq('key',key);
        else await sb.from('ztj_system_config').insert({key,value});
        alert('保存成功');
    }

    window.onload = checkSession;
</script>
</body>
</html>
