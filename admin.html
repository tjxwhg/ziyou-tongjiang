<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f0f2f5; margin:0; }
        .header { background:#1b5e20; color:white; padding:12px; display:flex; justify-content:space-between; }
        .container { max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; }
        .tab button { padding:10px; border:none; background:#e0e0e0; cursor:pointer; }
        .tab button.active { background:#2e7d32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .card { border:1px solid #ddd; border-radius:8px; padding:12px; margin:8px 0; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>管理员登录</h2>
    <div class="form-group"><input id="email" placeholder="邮箱"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>
<div id="main" class="hidden">
    <div class="header"><h2>通江文旅超管后台</h2><button onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍景点POI</button>
            <button onclick="switchTab('routes')">🗺️路线</button>
            <button onclick="switchTab('feedbacks')">💬留言</button>
            <button onclick="switchTab('merchants')">🏪商户账号</button>
            <button onclick="switchTab('transport')">🚗交通耗时</button>
        </div>

        <!-- POI 管理 -->
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="showAddPoi()">+ 新增POI</button>
            <div id="poi-list"></div>
        </div>

        <!-- 路线管理（同原版） -->
        <div id="tab-routes" class="hidden">
            <button class="btn btn-primary" onclick="addRoute()">+ 新增路线</button>
            <div id="route-list"></div>
        </div>

        <!-- 留言 -->
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>

        <!-- 商户账号管理 -->
        <div id="tab-merchants" class="hidden">
            <button class="btn btn-primary" onclick="createMerchant()">创建商户账号</button>
            <div id="merchant-list"></div>
        </div>

        <!-- 交通耗时 -->
        <div id="tab-transport" class="hidden">
            <div id="transport-editor"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) { currentUser = session.user; showMain(); } else showLogin();
    }
    function showLogin() { document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); }
    function showMain() { document.getElementById('login-page').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); switchTab('poi'); }

    async function login() {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if (error) document.getElementById('login-msg').innerText = error.message;
    }

    async function logout() { await sb.auth.signOut(); }

    function switchTab(tab) {
        document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        ['poi','routes','feedbacks','merchants','transport'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
        document.getElementById('tab-'+tab).classList.remove('hidden');
        if (tab==='poi') loadPOIs();
        if (tab==='routes') loadRoutes();
        if (tab==='feedbacks') loadFeedbacks();
        if (tab==='merchants') loadMerchants();
        if (tab==='transport') loadTransport();
    }

    async function loadPOIs() {
        const { data } = await sb.from('ztj_poi').select('*').order('sort_order');
        let html = '';
        data.forEach(p => {
            html += `<div class="card">
                <b>${p.name}</b> [${p.category}] 坐标:${p.lat},${p.lng}
                <button onclick="editPoi(${p.id})">编辑</button>
                <button onclick="deletePoi(${p.id})">删除</button>
                <button onclick="manageSubPois(${p.id})">子点管理</button>
            </div>`;
        });
        document.getElementById('poi-list').innerHTML = html;
    }

    // 其他功能为简化演示，实际需完整实现编辑表单、路线节点管理、商户创建等，篇幅所限不全部贴出，逻辑参考前文对话中的admin代码，并移除商户自助和支付相关内容
    function showAddPoi() { /* 弹窗表单 */ }
    function editPoi(id) { /* 加载编辑表单 */ }
    function deletePoi(id) { /* 删除确认 */ }
    function manageSubPois(poiId) { /* 打开子点管理界面 */ }

    async function loadRoutes() {
        const { data } = await sb.from('ztj_routes').select('*');
        document.getElementById('route-list').innerHTML = data.map(r => `<div class="card">${r.name} (${r.days}天) <button>编辑</button></div>`).join('');
    }

    async function loadFeedbacks() {
        const { data } = await sb.from('ztj_feedbacks').select('*');
        document.getElementById('feedback-list').innerHTML = data.map(f => `<div class="card"><p>${f.message}</p><p>回复：${f.reply||'未回复'}</p><button onclick="replyFeedback(${f.id})">回复</button></div>`).join('');
    }

    async function replyFeedback(id) {
        const reply = prompt('输入回复');
        if (reply) await sb.from('ztj_feedbacks').update({ reply }).eq('id', id);
        loadFeedbacks();
    }

    async function createMerchant() {
        const email = prompt('商户邮箱');
        const pwd = prompt('密码');
        const name = prompt('商户名称');
        const poiId = prompt('绑定POI ID');
        const { data: user, error } = await sb.auth.admin.createUser({ email, password: pwd, email_confirm: true });
        if (error) { alert('创建失败：'+error.message); return; }
        await sb.from('ztj_merchants').insert({ id: user.user.id, account_id: name, display_name: name, poi_id: poiId });
        alert('创建成功');
        loadMerchants();
    }

    async function loadMerchants() {
        const { data } = await sb.from('ztj_merchants').select('*');
        document.getElementById('merchant-list').innerHTML = data.map(m => `<div class="card">${m.display_name} (账号:${m.account_id}) <button onclick="deleteMerchant('${m.id}')">删除</button></div>`).join('');
    }

    window.onload = checkSession;
</script>
</body>
</html>
