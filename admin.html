<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 通江文旅</title>
    <style>
        /* 复用之前的样式 */
        body { font-family: system-ui; background:#f0f2f5; margin:0; }
        .header { background:#1b5e20; color:white; padding:12px; display:flex; justify-content:space-between; }
        .container { max-width:1100px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab button { padding:10px; border:none; background:#e0e0e0; cursor:pointer; }
        .tab button.active { background:#2e7d32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; margin:2px; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; background:#fafafa; }
        .hidden { display:none; }
        .inline-edit { background:#fff; border:1px solid #2e7d32; border-radius:8px; padding:12px; margin-top:8px; }
        .sub-poi-container { margin-left:20px; border-left:3px solid #2e7d32; padding-left:10px; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>管理员登录</h2>
    <div class="form-group"><input id="email" placeholder="邮箱"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>
<div id="main" class="hidden">
    <div class="header"><h2>通江文旅超管后台</h2><button onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍景点POI</button>
            <button onclick="switchTab('routes')">🗺️路线</button>
            <button onclick="switchTab('transport')">🚗交通耗时</button>
            <button onclick="switchTab('merchants')">🏪商户账号</button>
            <button onclick="switchTab('feedbacks')">💬留言反馈</button>
        </div>
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="showAddPoi()">+ 新增主景区/独立POI</button>
            <div id="poi-list"></div>
        </div>
        <div id="tab-routes" class="hidden">...（同前）</div>
        <div id="tab-transport" class="hidden">...（同前）</div>
        <div id="tab-merchants" class="hidden">...（同前）</div>
        <div id="tab-feedbacks" class="hidden">...（同前）</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
// ... 登录相关函数 ...
function switchTab(tab){ /* 略 */ }

// POI 管理核心
async function loadPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').is('parent_id', null).order('sort_order');
    let html = '';
    if(data) data.forEach(p => {
        const cats = p.category ? p.category.split(',') : [];
        html += `
        <div class="card">
            <div class="poi-name-header" style="display:flex; justify-content:space-between;">
                <span><b>${p.name}</b> [${cats.join(',')||'未分类'}]</span>
                <div>
                    <button class="btn btn-default" onclick="toggleEditPoi(${p.id})">编辑</button>
                    <button class="btn btn-default" onclick="toggleSubPois(${p.id})">子POI</button>
                    <button class="btn btn-danger" onclick="deletePoi(${p.id})">删除</button>
                </div>
            </div>
            <div id="edit-poi-${p.id}" class="inline-edit hidden"></div>
            <div id="sub-pois-${p.id}" class="sub-poi-container hidden"></div>
        </div>`;
    });
    document.getElementById('poi-list').innerHTML = html || '<p>暂无主景区</p>';
}

async function toggleEditPoi(id){
    const container = document.getElementById(`edit-poi-${id}`);
    if(!container.classList.contains('hidden')){ container.classList.add('hidden'); return; }
    const { data:poi } = await sb.from('ztj_poi').select('*').eq('id',id).single();
    const { data: allPois } = await sb.from('ztj_poi').select('id,name').neq('id',id).is('parent_id', null).order('name');
    const parentOptions = allPois.map(p => `<option value="${p.id}" ${poi.parent_id==p.id?'selected':''}>${p.name}</option>`).join('');
    container.innerHTML = `
        <div class="form-group"><label>名称</label><input id="edit-name-${id}" value="${poi.name}"></div>
        <div class="form-group"><label>归属主景区</label><select id="edit-parent-${id}"><option value="">无（作为主景区）</option>${parentOptions}</select></div>
        <div class="form-group"><label>类型（可多选）</label>
            <div class="checkbox-group">${['自然景区','红色景区','文博场馆','餐饮住宿','交通枢纽','游玩娱乐','特产购物','公共服务'].map(c => `<label><input type="checkbox" value="${c}" ${(poi.category||'').includes(c)?'checked':''}> ${c}</label>`).join('')}</div>
        </div>
        <div class="form-group"><label>纬度</label><input type="number" step="any" id="edit-lat-${id}" value="${poi.lat}"></div>
        <div class="form-group"><label>经度</label><input type="number" step="any" id="edit-lng-${id}" value="${poi.lng}"></div>
        <div class="form-group"><label>简介</label><textarea id="edit-desc-${id}">${poi.description||''}</textarea></div>
        <div class="form-group"><label>语音文件</label><input type="file" accept="audio/*" onchange="uploadPoiVoice(${id}, this)"></div>
        <button class="btn btn-primary" onclick="savePoiEdit(${id})">保存</button>
        <button class="btn btn-default" onclick="toggleEditPoi(${id})">取消</button>
    `;
    container.classList.remove('hidden');
}

async function savePoiEdit(id){
    const name = document.getElementById(`edit-name-${id}`).value.trim();
    const parentId = document.getElementById(`edit-parent-${id}`).value;
    const lat = parseFloat(document.getElementById(`edit-lat-${id}`).value);
    const lng = parseFloat(document.getElementById(`edit-lng-${id}`).value);
    if(!name || isNaN(lat) || isNaN(lng)){ alert('名称、经纬度必填'); return; }
    const checks = document.querySelectorAll(`#edit-poi-${id} input[type="checkbox"]:checked`);
    const category = Array.from(checks).map(cb => cb.value).join(',');
    const description = document.getElementById(`edit-desc-${id}`).value;
    await sb.from('ztj_poi').update({ name, parent_id: parentId || null, lat, lng, category, description }).eq('id', id);
    alert('保存成功');
    loadPOIs();
}

async function toggleSubPois(poiId){
    const container = document.getElementById(`sub-pois-${poiId}`);
    if(!container.classList.contains('hidden')){ container.classList.add('hidden'); return; }
    container.classList.remove('hidden');
    loadSubPois(poiId);
}

async function loadSubPois(poiId){
    const { data: subs } = await sb.from('ztj_poi').select('*').eq('parent_id', poiId).order('sort_order');
    const container = document.getElementById(`sub-pois-${poiId}`);
    let html = `<button class="btn btn-primary" onclick="addSubPoi(${poiId})">+ 添加子POI</button>`;
    if(subs && subs.length){
        subs.forEach(sub => {
            html += `<div class="card" style="margin-left:20px;">
                <div style="display:flex; justify-content:space-between;">
                    <span><b>${sub.name}</b> (${sub.category||''})</span>
                    <div>
                        <button class="btn btn-default" onclick="toggleEditSubPoi(${sub.id}, ${poiId})">编辑</button>
                        <button class="btn btn-danger" onclick="deletePoi(${sub.id})">删除</button>
                    </div>
                </div>
                <div id="edit-sub-${sub.id}" class="inline-edit hidden"></div>
            </div>`;
        });
    }
    container.innerHTML = html;
}

async function addSubPoi(parentId){
    const name = prompt('子POI名称'); if(!name) return;
    const lat = prompt('纬度'), lng = prompt('经度');
    if(!lat||!lng) return;
    await sb.from('ztj_poi').insert({ name, lat:parseFloat(lat), lng:parseFloat(lng), parent_id: parentId, category:'' });
    loadSubPois(parentId);
}

async function toggleEditSubPoi(subId, parentId){
    const container = document.getElementById(`edit-sub-${subId}`);
    if(!container.classList.contains('hidden')){ container.classList.add('hidden'); return; }
    const { data: sub } = await sb.from('ztj_poi').select('*').eq('id', subId).single();
    const subCats = ['餐饮住宿','交通枢纽','游玩娱乐','特产购物','公共服务']; // 子POI不能选景区类
    container.innerHTML = `
        <div class="form-group"><label>名称</label><input id="edit-sub-name-${subId}" value="${sub.name}"></div>
        <div class="form-group"><label>类型</label>
            <div class="checkbox-group">${subCats.map(c => `<label><input type="checkbox" value="${c}" ${(sub.category||'').includes(c)?'checked':''}> ${c}</label>`).join('')}</div>
        </div>
        <div class="form-group"><label>纬度</label><input type="number" step="any" id="edit-sub-lat-${subId}" value="${sub.lat}"></div>
        <div class="form-group"><label>经度</label><input type="number" step="any" id="edit-sub-lng-${subId}" value="${sub.lng}"></div>
        <div class="form-group"><label>简介</label><textarea id="edit-sub-desc-${subId}">${sub.description||''}</textarea></div>
        <button class="btn btn-primary" onclick="saveSubPoiEdit(${subId}, ${parentId})">保存</button>
        <button class="btn btn-default" onclick="toggleEditSubPoi(${subId}, ${parentId})">取消</button>
    `;
    container.classList.remove('hidden');
}
async function saveSubPoiEdit(subId, parentId){
    const name = document.getElementById(`edit-sub-name-${subId}`).value;
    const lat = parseFloat(document.getElementById(`edit-sub-lat-${subId}`).value);
    const lng = parseFloat(document.getElementById(`edit-sub-lng-${subId}`).value);
    const checks = document.querySelectorAll(`#edit-sub-${subId} input[type="checkbox"]:checked`);
    const category = Array.from(checks).map(cb => cb.value).join(',');
    const desc = document.getElementById(`edit-sub-desc-${subId}`).value;
    await sb.from('ztj_poi').update({ name, lat, lng, category, description: desc }).eq('id', subId);
    alert('子POI已更新');
    loadSubPois(parentId);
}
async function deletePoi(id){
    if(confirm('删除此POI（若为主景区将同时删除所有子POI）？')){
        await sb.from('ztj_poi').delete().eq('id', id);
        loadPOIs();
    }
}
// 其他功能（路线、交通、商户、留言）略，同之前完善版
</script>
</body>
</html>
