<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智游通江 - 管理后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background:#f0f2f5; }
        .header { background:#1b5e20; color:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
        .header button { background:white; color:#1b5e20; border:none; padding:6px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
        .container { max-width:960px; margin:20px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .tab { display:flex; gap:6px; margin-bottom:20px; border-bottom:2px solid #e0e0e0; overflow-x:auto; }
        .tab button { padding:10px 20px; border:none; background:none; font-size:16px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; }
        .tab button.active { border-bottom-color:#2e7d32; color:#2e7d32; font-weight:bold; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; margin-bottom:4px; font-weight:500; font-size:14px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
        .btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-weight:500; font-size:14px; margin-right:4px; }
        .btn-primary { background:#2e7d32; color:white; }
        .btn-danger { background:#c62828; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #e0e0e0; border-radius:8px; padding:14px; margin-bottom:12px; background:#fafafa; }
        .card-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .hidden { display:none; }
        #login-page { max-width:400px; margin:80px auto; }
        .login-box { background:white; padding:30px; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .login-box h2 { text-align:center; margin-bottom:20px; }
        .inline-edit { background:#fff; border:1px solid #2e7d32; border-radius:8px; padding:12px; margin-top:8px; }
    </style>
</head>
<body>
<div id="login-page">
    <div class="login-box">
        <h2>🔐 管理后台登录</h2>
        <div class="form-group"><input type="text" id="account" placeholder="账号"></div>
        <div class="form-group"><input type="password" id="password" placeholder="密码"></div>
        <button class="btn btn-primary" style="width:100%;" onclick="login()">登录</button>
        <div id="login-msg"></div>
    </div>
</div>

<div id="admin-page" class="hidden">
    <div class="header"><h2>📊 智游通江管理后台</h2><button onclick="logout()">退出</button></div>
    <div id="super-admin-view" class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('poi')">📍POI</button>
            <button onclick="switchTab('settings')">⚙️设置</button>
        </div>

        <!-- POI 管理 -->
        <div id="tab-poi">
            <button class="btn btn-primary" onclick="showNewPoiForm()">+ 新增POI</button>
            <div id="new-poi-form" class="card hidden" style="margin-top:14px;">
                <h3>新增POI</h3>
                <input type="hidden" id="poi-id">
                <div class="form-group"><label>名称 *</label><input id="poi-name"></div>
                <div class="form-group"><label>类别</label><select id="poi-category"><option>景点</option><option>卫生间</option><option>休息区</option><option>出入口</option><option>餐饮</option></select></div>
                <div class="form-group"><label>纬度 *</label><input id="poi-lat" type="number" step="any"></div>
                <div class="form-group"><label>经度 *</label><input id="poi-lng" type="number" step="any"></div>
                <div class="form-group"><label>简介</label><textarea id="poi-desc" rows="2"></textarea></div>
                <div class="form-group"><label>建议游览时间(分钟)</label><input id="poi-suggested" type="number" value="10"></div>
                <div class="form-group"><label>最佳观赏点</label><input id="poi-best-view"></div>
                <div class="form-group"><label>中文讲解词</label><textarea id="poi-voice-cn" rows="2"></textarea></div>
                <div class="form-group"><label>英文讲解词</label><textarea id="poi-voice-en" rows="2"></textarea></div>
                <div class="form-group"><label>触发半径(米)</label><input id="poi-radius" type="number" value="15"></div>
                <button class="btn btn-primary" onclick="savePoi()">保存</button>
                <button class="btn btn-default" onclick="hidePoiForm()">取消</button>
            </div>
            <div id="poi-list" style="margin-top:20px;"></div>
        </div>

        <!-- 系统设置 -->
        <div id="tab-settings" class="hidden">
            <h3>上传景区导览图</h3>
            <div class="card">
                <div class="form-group"><label>图片URL</label><input id="map-url" placeholder="图片链接"></div>
                <div class="form-group"><label>西南角纬度</label><input id="map-sw-lat" type="number" step="any"></div>
                <div class="form-group"><label>西南角经度</label><input id="map-sw-lng" type="number" step="any"></div>
                <div class="form-group"><label>东北角纬度</label><input id="map-ne-lat" type="number" step="any"></div>
                <div class="form-group"><label>东北角经度</label><input id="map-ne-lng" type="number" step="any"></div>
                <button class="btn btn-primary" onclick="saveMapConfig()">保存地图配置</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) { currentUser = session.user; await loadAdminView(); }
    }
    sb.auth.onAuthStateChange((event, session) => {
        if (session) { currentUser = session.user; loadAdminView(); }
        else { showLogin(); }
    });
    function showLogin() { document.getElementById('login-page').classList.remove('hidden'); document.getElementById('admin-page').classList.add('hidden'); }
    async function login() {
        const account = document.getElementById('account').value.trim();
        const password = document.getElementById('password').value;
        if (!account || !password) return;
        const email = account.includes('@') ? account : account + '@zhiyoutongjiang.cn';
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById('login-msg').innerHTML = `<p style="color:red">${error.message}</p>`; }
    }
    async function logout() { await sb.auth.signOut(); }
    async function loadAdminView() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('admin-page').classList.remove('hidden');
        switchTab('poi');
    }

    function switchTab(tab) {
        document.querySelectorAll('#super-admin-view .tab button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-poi').classList.add('hidden');
        document.getElementById('tab-settings').classList.add('hidden');
        if (tab === 'poi') { document.getElementById('tab-poi').classList.remove('hidden'); loadPoiList(); }
        else if (tab === 'settings') { document.getElementById('tab-settings').classList.remove('hidden'); loadMapConfig(); }
    }

    // POI 管理
    function showNewPoiForm() { document.getElementById('new-poi-form').classList.remove('hidden'); document.getElementById('poi-id').value=''; clearPoiForm(); }
    function hidePoiForm() { document.getElementById('new-poi-form').classList.add('hidden'); }
    function clearPoiForm() {
        document.getElementById('poi-name').value=''; document.getElementById('poi-category').value='景点';
        document.getElementById('poi-lat').value=''; document.getElementById('poi-lng').value='';
        document.getElementById('poi-desc').value=''; document.getElementById('poi-suggested').value='10';
        document.getElementById('poi-best-view').value=''; document.getElementById('poi-voice-cn').value='';
        document.getElementById('poi-voice-en').value=''; document.getElementById('poi-radius').value='15';
    }
    async function savePoi() {
        const id = document.getElementById('poi-id').value;
        const name = document.getElementById('poi-name').value.trim();
        const lat = parseFloat(document.getElementById('poi-lat').value);
        const lng = parseFloat(document.getElementById('poi-lng').value);
        if (!name || isNaN(lat) || isNaN(lng)) { alert('名称、坐标必填'); return; }
        const payload = {
            name,
            category: document.getElementById('poi-category').value,
            lat, lng,
            description: document.getElementById('poi-desc').value,
            suggested_time: parseInt(document.getElementById('poi-suggested').value) || 10,
            best_view: document.getElementById('poi-best-view').value,
            voice_cn: document.getElementById('poi-voice-cn').value,
            voice_en: document.getElementById('poi-voice-en').value,
            trigger_radius: parseInt(document.getElementById('poi-radius').value) || 15
        };
        if (id) {
            await sb.from('ztj_poi').update(payload).eq('id', id);
        } else {
            await sb.from('ztj_poi').insert([payload]);
        }
        hidePoiForm();
        loadPoiList();
    }

    async function editPoi(id) {
        const { data } = await sb.from('ztj_poi').select('*').eq('id', id).single();
        if (!data) return;
        document.getElementById('poi-id').value = data.id;
        document.getElementById('poi-name').value = data.name;
        document.getElementById('poi-category').value = data.category;
        document.getElementById('poi-lat').value = data.lat;
        document.getElementById('poi-lng').value = data.lng;
        document.getElementById('poi-desc').value = data.description || '';
        document.getElementById('poi-suggested').value = data.suggested_time || 10;
        document.getElementById('poi-best-view').value = data.best_view || '';
        document.getElementById('poi-voice-cn').value = data.voice_cn || '';
        document.getElementById('poi-voice-en').value = data.voice_en || '';
        document.getElementById('poi-radius').value = data.trigger_radius || 15;
        document.getElementById('new-poi-form').classList.remove('hidden');
    }

    async function deletePoi(id) {
        if (!confirm('确定删除此POI吗？')) return;
        await sb.from('ztj_poi').delete().eq('id', id);
        loadPoiList();
    }

    async function loadPoiList() {
        const { data } = await sb.from('ztj_poi').select('*').order('id');
        let html = '';
        if (data) {
            data.forEach(p => {
                html += `<div class="card card-row"><div><b>${p.name}</b> (${p.category})</div><div><button class="btn btn-default" onclick="editPoi('${p.id}')">编辑</button><button class="btn btn-danger" onclick="deletePoi('${p.id}')">删除</button></div></div>`;
            });
        }
        document.getElementById('poi-list').innerHTML = html || '<p>暂无POI</p>';
    }

    // 系统设置
    async function loadMapConfig() {
        const { data } = await sb.from('ztj_system_config').select('value').eq('key','custom_map').maybeSingle();
        if (data && data.value) {
            document.getElementById('map-url').value = data.value.url || '';
            document.getElementById('map-sw-lat').value = data.value.bounds[0][0] || '';
            document.getElementById('map-sw-lng').value = data.value.bounds[0][1] || '';
            document.getElementById('map-ne-lat').value = data.value.bounds[1][0] || '';
            document.getElementById('map-ne-lng').value = data.value.bounds[1][1] || '';
        }
    }

    async function saveMapConfig() {
        const url = document.getElementById('map-url').value.trim();
        const swLat = parseFloat(document.getElementById('map-sw-lat').value);
        const swLng = parseFloat(document.getElementById('map-sw-lng').value);
        const neLat = parseFloat(document.getElementById('map-ne-lat').value);
        const neLng = parseFloat(document.getElementById('map-ne-lng').value);
        if (!url || isNaN(swLat) || isNaN(swLng) || isNaN(neLat) || isNaN(neLng)) { alert('请完整填写'); return; }
        const value = { url, bounds: [[swLat, swLng], [neLat, neLng]] };
        const { data: existing } = await sb.from('ztj_system_config').select('key').eq('key','custom_map').maybeSingle();
        if (existing) {
            await sb.from('ztj_system_config').update({ value }).eq('key','custom_map');
        } else {
            await sb.from('ztj_system_config').insert({ key: 'custom_map', value });
        }
        alert('保存成功');
    }

    window.onload = checkSession;
</script>
</body>
</html>
