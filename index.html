<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游通江</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; height:100vh; overflow:hidden; }
        #map { height:100vh; width:100vw; z-index:1; }
        .top-bar { position:fixed; top:20px; right:20px; z-index:1500; }
        .top-btn { background:white; border-radius:20px; padding:6px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); border:none; cursor:pointer; }
        .bottom-bar { position:fixed; bottom:20px; left:20px; right:20px; z-index:1500; display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-secondary { background:white; color:#2E7D32; }
        .panel { position:fixed; top:0; left:0; right:0; bottom:0; background:white; z-index:2000; transform:translateY(100%); transition:0.3s; overflow-y:auto; }
        .panel.active { transform:translateY(0); }
        .panel-header { padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
        .panel-body { padding:16px; }
        .card { border:1px solid #eee; border-radius:8px; padding:12px; margin:8px 0; background:#fafafa; }
        .hidden { display:none; }
        .form-group { margin:8px 0; }
        label { display:block; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .toggle-section { background:#f0f0f0; border-radius:8px; padding:12px; margin:10px 0; cursor:pointer; }
        .my-tab { padding:8px 16px; border:none; background:#eee; border-radius:20px; cursor:pointer; }
        .my-tab.active { background:#2e7d32; color:white; }
        .route-node { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .route-time { font-size:12px; color:#666; }
        .day-header { font-weight:bold; background:#e9f5ea; padding:6px; border-radius:4px; margin:12px 0 6px; }
        .warn-list { background:#fafafa; padding:10px; border-radius:8px; margin-top:10px; }
        .trip-line { padding:4px 0; border-bottom:1px dotted #eee; }
        .collapse-header { cursor:pointer; font-weight:bold; display:flex; justify-content:space-between; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="top-bar"><button class="top-btn" onclick="openPanel('myPanel')">👤 我的</button></div>
<div class="bottom-bar">
    <button class="btn btn-secondary" onclick="openPanel('routesPanel')">📋 路线</button>
    <button class="btn btn-primary" onclick="startSimulation()">📍 模拟导航</button>
</div>

<!-- 商户详情 -->
<div class="panel" id="merchantDetailPanel">
    <div class="panel-header"><h2 id="merchantDetailTitle"></h2><button onclick="closePanel('merchantDetailPanel')">✕</button></div>
    <div class="panel-body" id="merchantDetailContent"></div>
</div>
<!-- 研学预约 -->
<div class="panel" id="reservePanel">
    <div class="panel-header"><h2>研学预约</h2><button onclick="closePanel('reservePanel')">✕</button></div>
    <div class="panel-body" id="reserveContent"></div>
</div>
<!-- 路线面板 -->
<div class="panel" id="routesPanel">
    <div class="panel-header"><h2>路线</h2><button onclick="closePanel('routesPanel')">✕</button></div>
    <div class="panel-body">
        <h3>📌 推荐路线</h3>
        <div id="routeList"></div>
        <div class="toggle-section" onclick="toggleCustomTripSection()"><h4>✏️ 自设行程 <span id="customTripArrow">▼</span></h4></div>
        <div id="customTripSection" class="hidden" style="margin-top:10px;">
            <div class="form-group"><label>出发日期</label><input type="date" id="trip-date"></div>
            <div class="form-group"><label>出发时间</label><select id="trip-time"><option value="06:00">06:00</option><option value="07:00" selected>07:00</option><option value="08:00">08:00</option><option value="09:00">09:00</option></select></div>
            <div class="form-group"><label>出行方式</label><select id="trip-mode"><option value="auto">自驾</option><option value="bus">公交</option><option value="walk">步行</option></select></div>
            <div class="form-group"><label>人数</label><input type="number" id="trip-people" min="1" value="2"></div>
            <div class="form-group"><label>行程路线</label>
                <div id="dynamic-route"></div>
                <button class="btn btn-default" onclick="addRouteLeg()">+ 添加景点</button>
            </div>
            <button class="btn btn-primary" onclick="generateCustomTrip()" style="width:100%; margin-top:12px;">生成行程</button>
            <div id="generated-trip" style="margin-top:12px;"></div>
            <div id="trip-warnings" style="margin-top:12px;"></div>
            <button class="btn btn-primary hidden" id="saveGeneratedTripBtn" onclick="saveGeneratedTrip()" style="width:100%; margin-top:8px;">保存至我的行程</button>
        </div>
    </div>
</div>

<!-- 我的面板 -->
<div class="panel" id="myPanel">
    <div class="panel-header"><h2>我的</h2><button onclick="closePanel('myPanel')">✕</button></div>
    <div class="panel-body">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="my-tab-trip" class="my-tab active" onclick="switchMyTab('trip')">📅 行程</button>
            <button id="my-tab-reservation" class="my-tab" onclick="switchMyTab('reservation')">📋 预约</button>
            <button id="my-tab-feedback" class="my-tab" onclick="switchMyTab('feedback')">💬 留言</button>
        </div>
        <div id="myTripContent"></div>
        <div id="myReservationContent" class="hidden"></div>
        <div id="myFeedbackContent" class="hidden">
            <textarea id="feedbackMsg" rows="3" placeholder="建议或问题..."></textarea>
            <button class="btn btn-primary" onclick="submitFeedback()" style="width:100%; margin-top:8px;">提交</button>
            <div id="feedbackHistory" style="margin-top:12px;"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let map, allPois=[], generatedTripData=null;
const COUNTY = { lat:32.08, lng:107.24, name:'红军广场', id:'county' };
const poiColors = { '自然景区':'#2E7D32', '红色景区':'#9C27B0', '文博场馆':'#9C27B0', '餐饮住宿':'#FF9800', '停车场':'#00BCD4', '公共服务':'#607D8B' };
let transportPresets = {};
const DAY_START=360, DAY_END=1200; // 6:00 - 20:00
const LUNCH_START=690, LUNCH_END=750;   // 11:30 - 12:30
const DINNER_START=1050, DINNER_END=1110; // 17:30 - 18:30
const EXCLUDED_FROM_TRIP = ['游戏娱乐','公共服务','特产购物'];
const NON_VISIT_CATEGORIES = ['交通枢纽','餐饮住宿','公共服务','特产购物','游玩娱乐'];
let routeLegs=[], mainPoiOptions=[], allowedPoiOptions=[];

function getUserId(){ let uid=localStorage.getItem('vid'); if(!uid){ uid='v_'+Date.now()+Math.random().toString(36); localStorage.setItem('vid',uid); } return uid; }
function formatTime(m){ return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }
function isNonVisitPoi(poiId){
    if(poiId==='county') return false;
    const poi=allPois.find(p=>p.id==poiId);
    if(!poi||!poi.category) return false;
    return poi.category.split(',').some(c=>NON_VISIT_CATEGORIES.includes(c));
}

function initMap(){
    map = L.map('map', { zoomControl: false }).setView([32.08,107.18], 12);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
        subdomains:['1','2','3','4'], maxZoom:18
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);
    loadAllPOIs();
}

async function loadAllPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').eq('status','active');
    allPois = data || [];
    renderPOIs(allPois);
    window.subPoisMap = {};
    allPois.forEach(p => { if(p.parent_id){ if(!window.subPoisMap[p.parent_id]) window.subPoisMap[p.parent_id]=[]; window.subPoisMap[p.parent_id].push(p); } });
    await loadTransportPresets();
}
async function loadTransportPresets(){
    const { data } = await sb.from('ztj_transport_presets').select('*');
    transportPresets = {};
    if(data) data.forEach(p => { transportPresets[`${p.from_poi_id}_${p.to_poi_id}`] = p.time_min; });
}
function getTransportTime(fromId, toId){
    const fId=fromId==='county'?0:fromId, tId=toId==='county'?0:toId;
    let t=transportPresets[`${fId}_${tId}`]; if(t!==undefined) return t;
    t=transportPresets[`${tId}_${fId}`]; return t!==undefined?t:null;
}
function renderPOIs(pois){
    map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
    pois.forEach(p => {
        const cat = (p.category||'').split(',')[0]||'其他';
        const icon = L.divIcon({html:`<div style="background:${poiColors[cat]||'#999'}; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>`, iconSize:[20,20]});
        L.marker([p.lat,p.lng],{icon}).addTo(map).on('click',()=>showPoiDetail(p));
    });
}
async function showPoiDetail(poi){
    const { data: m } = await sb.from('ztj_merchants').select('*').eq('poi_id', poi.id).maybeSingle();
    document.getElementById('merchantDetailTitle').textContent = poi.name;
    let html = `<p>${poi.description||''}</p>`;
    if(m){
        html += `<p>📞 ${m.phone||'未提供'} | ${m.status==='open'?'营业':'休息'}</p>`;
        if(m.allow_reserve) html += `<button class="btn btn-primary" onclick="openReservePanel('${m.id}')">📋 研学预约</button>`;
    }
    document.getElementById('merchantDetailContent').innerHTML = html;
    openPanel('merchantDetailPanel');
}

async function loadRoutes(){
    const { data } = await sb.from('ztj_routes').select('*');
    document.getElementById('routeList').innerHTML = data.map(r => `<div class="card"><h3>${r.name}</h3><p>${r.days||1}天</p></div>`).join('');
}

// 自设行程
function toggleCustomTripSection(){ document.getElementById('customTripSection').classList.toggle('hidden'); if(!document.getElementById('customTripSection').classList.contains('hidden')){ buildMainPoiOptions(); resetRouteLegs(); } }
function buildMainPoiOptions(){
    const allMain = allPois.filter(p => !p.parent_id);
    mainPoiOptions = allMain.filter(p => p.id !== 'county');
    mainPoiOptions.unshift(COUNTY);
    allowedPoiOptions = allMain.filter(p => {
        if(!p.category) return false;
        const cats = p.category.split(',');
        return !cats.some(c => EXCLUDED_FROM_TRIP.includes(c));
    });
    if(!allowedPoiOptions.some(p => p.id === 'county')) allowedPoiOptions.unshift(COUNTY);
}
function resetRouteLegs(){ routeLegs=[{...COUNTY}]; renderDynamicRoute(); }
function addRouteLeg(){ routeLegs.push({id:'',name:''}); renderDynamicRoute(); }
function removeLeg(idx){ if(idx>0){ routeLegs.splice(idx,1); renderDynamicRoute(); } }
function updateStartPoint(v){ const p=mainPoiOptions.find(p=>String(p.id)===v); routeLegs[0]=p||COUNTY; updateAllTimes(); }
function updateLeg(idx,v){ const p=allowedPoiOptions.find(p=>String(p.id)===v); if(p) routeLegs[idx]=p; else routeLegs[idx]={id:'',name:''}; renderDynamicRoute(); }
function renderDynamicRoute(){
    let h=`<div class="route-node"><select onchange="updateStartPoint(this.value)">${mainPoiOptions.map(p=>`<option value="${p.id}" ${routeLegs[0]?.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select><span>→</span></div>`;
    routeLegs.forEach((l,i)=>{
        if(i===0) return;
        h+=`<div class="route-node"><select onchange="updateLeg(${i},this.value)"><option value="">--选择--</option>${allowedPoiOptions.map(p=>`<option value="${p.id}" ${l.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select>${i<routeLegs.length-1?`<span class="route-time" id="time-${i}"></span>`:''}<button class="btn btn-danger" onclick="removeLeg(${i})">删除</button></div>`;
    });
    document.getElementById('dynamic-route').innerHTML=h;
    updateAllTimes();
}
async function updateAllTimes(){
    for(let i=1;i<routeLegs.length;i++){
        const span=document.getElementById(`time-${i}`);
        if(span&&routeLegs[i-1].id&&routeLegs[i].id){
            const t=getTransportTime(routeLegs[i-1].id,routeLegs[i].id);
            span.textContent=t!==null?`⏱️约${t}分钟`:'⏱️暂无数据';
        }
    }
}

// 辅助：处理跨天
function handleDayEnd(curMin, curDate, lines){
    while(curMin >= DAY_END){
        lines.push({time: DAY_END, text: `🌙 当天行程结束，住宿休息`, date: new Date(curDate)});
        curDate.setDate(curDate.getDate()+1);
        curMin = DAY_START;
    }
    return {curMin, date: curDate};
}

// 判断时间段是否与就餐窗口有交集
function hasLunchOverlap(start, end){ return start < LUNCH_END && end > LUNCH_START; }
function hasDinnerOverlap(start, end){ return start < DINNER_END && end > DINNER_START; }

// 插入固定1小时就餐
function insertMeal(curMin, curDate, mealType){
    const lines = [];
    let d = new Date(curDate);
    let time = curMin;
    ({curMin: time, date: d} = handleDayEnd(time, d, lines));
    const start = time;
    const end = start + 60;
    const typeName = mealType==='lunch'?'午餐':'晚餐';
    lines.push({time: start, text: `🍽️ ${typeName}时间 (${formatTime(start)}-${formatTime(end)})`, date: new Date(d)});
    time = end;
    ({curMin: time, date: d} = handleDayEnd(time, d, lines));
    return {curMin: time, date: d, lines};
}

// 交通处理：不插入就餐，结束后返回触发标志
function doTravel(startMin, duration, poiName, startDate){
    const lines = [];
    let d = new Date(startDate);
    let cur = startMin;
    let remaining = duration;
    let triggeredLunch = false, triggeredDinner = false;
    const travelStart = cur;
    // 先处理跨天
    ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
    const travelEnd = cur + remaining;
    // 检查是否与就餐窗口重叠
    if(hasLunchOverlap(cur, travelEnd)) triggeredLunch = true;
    if(hasDinnerOverlap(cur, travelEnd)) triggeredDinner = true;

    while(remaining > 0){
        let nextBreak = DAY_END;
        if(cur < LUNCH_START) nextBreak = LUNCH_START;
        else if(cur >= LUNCH_END && cur < DINNER_START) nextBreak = DINNER_START;
        else if(cur >= DINNER_END && cur < DAY_END) nextBreak = DAY_END;
        const timeToBreak = nextBreak - cur;
        const spend = Math.min(remaining, timeToBreak);
        const endMin = cur + spend;
        lines.push({time: cur, text: `🚗 ${formatTime(cur)}-${formatTime(endMin)} 前往 ${poiName} (交通${duration}分钟)`, date: new Date(d)});
        cur = endMin;
        remaining -= spend;
        ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
    }
    return {curMin: cur, date: d, lines, triggeredLunch, triggeredDinner};
}

// 游览处理：可被就餐打断，18:00后不开始新游览
function doVisit(startMin, duration, poiName, startDate, poiId){
    const lines = [];
    let d = new Date(startDate);
    let cur = startMin;
    let remaining = duration;
    // 如果当前时间>=18:00（1080），则推迟到次日6:00
    if(cur >= 1080){
        lines.push({time: cur, text: `🌙 已过18:00，${poiName} 游览推迟至次日`, date: new Date(d)});
        ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
        cur = DAY_START;
        d.setDate(d.getDate()); // 日期已在 handleDayEnd 中+1
    }
    ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
    while(remaining > 0){
        // 检查是否在就餐窗口内，立即插入就餐
        if(cur >= LUNCH_START && cur < LUNCH_END){
            const res = insertMeal(cur, d, 'lunch');
            lines.push(...res.lines);
            cur = res.curMin;
            d = res.date;
            continue;
        }
        if(cur >= DINNER_START && cur < DINNER_END){
            const res = insertMeal(cur, d, 'dinner');
            lines.push(...res.lines);
            cur = res.curMin;
            d = res.date;
            continue;
        }
        // 确定下一个中断点
        let nextBreak = DAY_END;
        if(cur < LUNCH_START) nextBreak = LUNCH_START;
        else if(cur >= LUNCH_END && cur < DINNER_START) nextBreak = DINNER_START;
        else if(cur >= DINNER_END && cur < DAY_END) nextBreak = DAY_END;
        const timeToBreak = nextBreak - cur;
        const spend = Math.min(remaining, timeToBreak);
        const endMin = cur + spend;
        if(isNonVisitPoi(poiId)){
            lines.push({time: cur, text: `📍 ${formatTime(cur)} 到达 ${poiName}`, date: new Date(d)});
        } else {
            lines.push({time: cur, text: `⏱️ ${formatTime(cur)}-${formatTime(endMin)} 游览 ${poiName} (游览${duration}分钟)`, date: new Date(d)});
        }
        cur = endMin;
        remaining -= spend;
        ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
        // 如果跨天后且当前时间>=18:00，剩余游览推迟
        if(cur >= 1080 && remaining > 0){
            lines.push({time: cur, text: `🌙 已过18:00，${poiName} 剩余游览推迟至次日`, date: new Date(d)});
            ({curMin: cur, date: d} = handleDayEnd(cur, d, lines));
            cur = DAY_START;
            d.setDate(d.getDate()); // 调整
        }
    }
    return {curMin: cur, date: d, lines};
}

async function generateCustomTrip(){
    const valid = routeLegs.filter(l => l.id && l.id!=='county');
    if(valid.length===0) return alert('请至少选择一个景区');
    const dateStr = document.getElementById('trip-date').value;
    const startTime = document.getElementById('trip-time').value;
    if(!dateStr) return alert('选择出发日期');
    const mode = document.getElementById('trip-mode').value;
    const people = document.getElementById('trip-people').value;

    let nodes = [{...routeLegs[0], type:'start'}];
    for(let i=1; i<routeLegs.length; i++){
        const p = routeLegs[i];
        let dur = allPois.find(p2=>p2.id==p.id)?.visit_duration || 0;
        if(isNonVisitPoi(p.id)) dur = 0;
        nodes.push({...p, type:'poi', visitDuration:dur});
    }
    for(let i=1; i<nodes.length; i++) nodes[i].transportTime = getTransportTime(nodes[i-1].id, nodes[i].id);

    let curDate = new Date(dateStr);
    let [h,m] = startTime.split(':').map(Number);
    let curMin = h*60+m;
    if(curMin < DAY_START) curMin = DAY_START;
    if(curMin >= DAY_END){ curDate.setDate(curDate.getDate()+1); curMin = DAY_START; }

    let allLines = [{time: curMin, text: `🚩 ${formatTime(curMin)} 从 ${nodes[0].name} 出发`, date: new Date(curDate)}];
    let totalActivity = 0;
    let mealCount = 0;

    for(let i=1; i<nodes.length; i++){
        const cur = nodes[i];
        // 交通
        if(cur.transportTime !== null && cur.transportTime > 0){
            const travelRes = doTravel(curMin, cur.transportTime, cur.name, curDate);
            allLines = allLines.concat(travelRes.lines);
            curMin = travelRes.curMin;
            curDate = travelRes.date;
            totalActivity += cur.transportTime;
            // 补就餐
            if(travelRes.triggeredLunch){
                const lunchRes = insertMeal(curMin, curDate, 'lunch');
                allLines = allLines.concat(lunchRes.lines);
                curMin = lunchRes.curMin;
                curDate = lunchRes.date;
                mealCount++;
            }
            if(travelRes.triggeredDinner){
                const dinnerRes = insertMeal(curMin, curDate, 'dinner');
                allLines = allLines.concat(dinnerRes.lines);
                curMin = dinnerRes.curMin;
                curDate = dinnerRes.date;
                mealCount++;
            }
        } else if(cur.transportTime === null){
            allLines.push({time: curMin, text: `⚠️ 前往 ${cur.name} 交通耗时未知`, date: new Date(curDate)});
        }
        // 游览
        if(cur.visitDuration > 0 || isNonVisitPoi(cur.id)){
            if(isNonVisitPoi(cur.id)){
                allLines.push({time: curMin, text: `📍 ${formatTime(curMin)} 到达 ${cur.name}`, date: new Date(curDate)});
            } else {
                const visitRes = doVisit(curMin, cur.visitDuration, cur.name, curDate, cur.id);
                allLines = allLines.concat(visitRes.lines);
                curMin = visitRes.curMin;
                curDate = visitRes.date;
                totalActivity += cur.visitDuration;
                // 游览内嵌的就餐已经在doVisit中处理，这里统计次数
                mealCount += visitRes.lines.filter(l => l.text.includes('🍽️')).length;
            }
        }
    }

    // 按天分组
    const days = [];
    let day = null;
    allLines.forEach(l => {
        const ld = l.date.toLocaleDateString('zh-CN');
        if(!day || day.date !== ld){
            if(day) days.push(day);
            day = { date: ld, lines: [] };
        }
        day.lines.push({time: l.time, text: l.text});
    });
    if(day) days.push(day);

    let html = '';
    days.forEach((d, i) => {
        html += `<div class="day-header">📅 第${i+1}天 (${d.date})</div>`;
        d.lines.forEach(l => html += `<div class="trip-line">${l.text}</div>`);
    });

    let tips = [];
    tips.push(`行程总交通+游览时长：${totalActivity}分钟（约${(totalActivity/60).toFixed(1)}小时）`);
    if(mealCount > 0) tips.push(`行程包含 ${mealCount} 次就餐（每次1小时），总行程时长：${totalActivity + mealCount*60}分钟（约${((totalActivity + mealCount*60)/60).toFixed(1)}小时）`);
    if(days.length > 1) tips.push(`行程跨${days.length}天，请合理安排住宿。`);

    document.getElementById('generated-trip').innerHTML = `<div class="card">${html}</div>`;
    document.getElementById('trip-warnings').innerHTML = tips.length ? `<div class="warn-list"><strong>温馨提示：</strong>${tips.map(t=>`<div>${t}</div>`).join('')}</div>` : '';
    document.getElementById('saveGeneratedTripBtn').classList.remove('hidden');

    generatedTripData = {
        name: '自设行程', date: dateStr, time: startTime, mode, people,
        nodes: nodes.map(n => ({id:n.id, name:n.name, transportTime:n.transportTime, visitDuration:n.visitDuration})),
        days: days.map(d => ({date: d.date, lines: d.lines})),
        tips
    };
}

function saveGeneratedTrip(){
    if(!generatedTripData) return;
    const name = prompt('行程名称', generatedTripData.name);
    if(!name) return;
    generatedTripData.name = name;
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    trips.push(JSON.parse(JSON.stringify(generatedTripData)));
    localStorage.setItem('trips', JSON.stringify(trips));
    alert('行程已保存');
    document.getElementById('saveGeneratedTripBtn').classList.add('hidden');
    document.getElementById('generated-trip').innerHTML='';
    document.getElementById('trip-warnings').innerHTML='';
    generatedTripData=null;
    resetRouteLegs();
}

function renderMyTrip(){
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    let html = '';
    trips.forEach((trip,i)=>{
        html += `<div class="card">
            <div class="collapse-header" onclick="toggleTripDetail(${i})">
                📅 ${trip.name} | ${trip.date} ${trip.time} | ${trip.mode} | ${trip.people}人
            </div>
            <div id="trip-detail-${i}" class="hidden" style="margin-top:8px;">`;
        if(trip.days) trip.days.forEach(day=>{
            html += `<div class="day-header">📅 ${day.date}</div>`;
            day.lines.forEach(l=> html += `<div class="trip-line">${l.text}</div>`);
        });
        if(trip.tips && trip.tips.length) html += `<div class="warn-list"><strong>温馨提示：</strong>${trip.tips.map(t=>`<div>${t}</div>`).join('')}</div>`;
        html += `<button class="btn btn-danger" onclick="event.stopPropagation(); deleteTrip(${i})" style="margin-top:8px;">删除</button></div></div>`;
    });
    document.getElementById('myTripContent').innerHTML = html || '<p>暂无保存的行程</p>';
}
window.toggleTripDetail = function(idx){ document.getElementById('trip-detail-'+idx).classList.toggle('hidden'); };
function deleteTrip(idx){
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    trips.splice(idx,1);
    localStorage.setItem('trips', JSON.stringify(trips));
    renderMyTrip();
}

async function submitFeedback(){
    const msg = document.getElementById('feedbackMsg').value.trim();
    if(!msg) return;
    await sb.from('ztj_feedbacks').insert({user_id:getUserId(), message:msg});
    document.getElementById('feedbackMsg').value = '';
    loadFeedbackHistory();
}
async function loadFeedbackHistory(){
    const {data} = await sb.from('ztj_feedbacks').select('*').neq('user_id','system').order('created_at',{ascending:false});
    let html='';
    if(data&&data.length){
        data.forEach(f=>{
            html += `<div class="card">
                <div><b>${new Date(f.created_at).toLocaleString()}</b></div>
                <div>${f.message}</div>
                ${f.reply?`<div style="color:#2e7d32;">回复：${f.reply}</div>`:'<div style="color:#999;">暂未回复</div>'}
            </div>`;
        });
    } else html='<p>暂无留言</p>';
    document.getElementById('feedbackHistory').innerHTML = html;
}
async function loadMyReservations(){
    const uid = getUserId();
    const {data} = await sb.from('reservations').select('*').eq('user_id',uid).order('created_at',false);
    document.getElementById('myReservationContent').innerHTML = data?.length ? data.map(r=>`<div class="card"><b>${r.reservation_date} ${r.time_slot_start}</b> ${r.visitor_count}人 ${r.name}</div>`).join('') : '<p>暂无预约</p>';
}
function switchMyTab(tab){
    document.getElementById('my-tab-trip').classList.remove('active');
    document.getElementById('my-tab-reservation').classList.remove('active');
    document.getElementById('my-tab-feedback').classList.remove('active');
    document.getElementById('myTripContent').classList.add('hidden');
    document.getElementById('myReservationContent').classList.add('hidden');
    document.getElementById('myFeedbackContent').classList.add('hidden');
    if(tab==='trip'){
        document.getElementById('my-tab-trip').classList.add('active');
        document.getElementById('myTripContent').classList.remove('hidden');
        renderMyTrip();
    } else if(tab==='reservation'){
        document.getElementById('my-tab-reservation').classList.add('active');
        document.getElementById('myReservationContent').classList.remove('hidden');
        loadMyReservations();
    } else if(tab==='feedback'){
        document.getElementById('my-tab-feedback').classList.add('active');
        document.getElementById('myFeedbackContent').classList.remove('hidden');
        loadFeedbackHistory();
    }
}
function openPanel(id){ document.getElementById(id).classList.add('active'); if(id==='routesPanel') loadRoutes(); }
function closePanel(id){ document.getElementById(id).classList.remove('active'); }
function startSimulation(){ alert('模拟导航即将上线'); }
window.onload = initMap;
</script>
