<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游通江</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; height:100vh; overflow:hidden; }
        #map { height:100vh; width:100vw; z-index:1; }
        .top-bar { position:fixed; top:20px; right:20px; z-index:1500; }
        .top-btn { background:white; border-radius:20px; padding:6px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); border:none; font-size:14px; cursor:pointer; }
        .bottom-bar { position:fixed; bottom:20px; left:20px; right:20px; z-index:1500; display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-secondary { background:white; color:#2E7D32; }
        .panel { position:fixed; top:0; left:0; right:0; bottom:0; background:white; z-index:2000; transform:translateY(100%); transition:0.3s; overflow-y:auto; }
        .panel.active { transform:translateY(0); }
        .panel-header { padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
        .panel-body { padding:16px; }
        .card { border:1px solid #eee; border-radius:8px; padding:12px; margin:8px 0; background:#fafafa; }
        .hidden { display:none; }
        .form-group { margin:8px 0; }
        label { display:block; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .toggle-section { background:#f0f0f0; border-radius:8px; padding:12px; margin:10px 0; cursor:pointer; }
        .my-tab { padding:8px 16px; border:none; background:#eee; border-radius:20px; cursor:pointer; }
        .my-tab.active { background:#2e7d32; color:white; }
        .route-node { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .route-time { font-size:12px; color:#666; }
        .day-header { font-weight:bold; background:#e9f5ea; padding:6px; border-radius:4px; margin:12px 0 6px; }
        .warn-list { background:#fafafa; padding:10px; border-radius:8px; margin-top:10px; }
        .warn-list div { margin:4px 0; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="top-bar">
    <button class="top-btn" onclick="openPanel('myPanel')">👤 我的</button>
</div>
<div class="bottom-bar">
    <button class="btn btn-secondary" onclick="openPanel('routesPanel')">📋 路线</button>
    <button class="btn btn-primary" id="navBtn" onclick="startSimulation()">📍 模拟导航</button>
</div>

<!-- 商户详情 -->
<div class="panel" id="merchantDetailPanel">
    <div class="panel-header"><h2 id="merchantDetailTitle"></h2><button onclick="closePanel('merchantDetailPanel')">✕</button></div>
    <div class="panel-body" id="merchantDetailContent"></div>
</div>
<!-- 研学预约 -->
<div class="panel" id="reservePanel">
    <div class="panel-header"><h2>研学预约</h2><button onclick="closePanel('reservePanel')">✕</button></div>
    <div class="panel-body" id="reserveContent"></div>
</div>
<!-- 路线面板 -->
<div class="panel" id="routesPanel">
    <div class="panel-header"><h2>路线</h2><button onclick="closePanel('routesPanel')">✕</button></div>
    <div class="panel-body">
        <h3>📌 推荐路线</h3>
        <div id="routeList"></div>
        <div class="toggle-section" onclick="toggleCustomTripSection()">
            <h4>✏️ 自设行程 <span id="customTripArrow">▼</span></h4>
        </div>
        <div id="customTripSection" class="hidden" style="margin-top:10px;">
            <div class="form-group"><label>出发日期</label><input type="date" id="trip-date"></div>
            <div class="form-group"><label>出发时间</label><select id="trip-time"><option value="06:00">06:00</option><option value="07:00" selected>07:00</option><option value="08:00">08:00</option><option value="09:00">09:00</option><option value="10:00">10:00</option></select></div>
            <div class="form-group"><label>出行方式</label><select id="trip-mode"><option value="auto">自驾</option><option value="bus">公交</option><option value="walk">步行</option></select></div>
            <div class="form-group"><label>人数</label><input type="number" id="trip-people" min="1" value="2"></div>
            <div class="form-group"><label>行程路线</label>
                <div id="dynamic-route"></div>
                <button class="btn btn-default" onclick="addRouteLeg()">+ 添加景点</button>
            </div>
            <button class="btn btn-primary" onclick="generateCustomTrip()" style="width:100%; margin-top:12px;">生成行程</button>
            <div id="generated-trip" style="margin-top:12px;"></div>
            <div id="trip-warnings" style="margin-top:12px;"></div>
            <button class="btn btn-primary hidden" id="saveGeneratedTripBtn" onclick="saveGeneratedTrip()" style="width:100%; margin-top:8px;">保存至我的行程</button>
        </div>
    </div>
</div>

<!-- 我的面板 -->
<div class="panel" id="myPanel">
    <div class="panel-header"><h2>我的</h2><button onclick="closePanel('myPanel')">✕</button></div>
    <div class="panel-body">
        <div class="lang-select"><label>语言</label><select id="langSelect" style="width:100%"><option value="cn">中文</option></select></div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="my-tab-trip" class="my-tab active" onclick="switchMyTab('trip')">📅 行程</button>
            <button id="my-tab-reservation" class="my-tab" onclick="switchMyTab('reservation')">📋 预约</button>
            <button id="my-tab-feedback" class="my-tab" onclick="switchMyTab('feedback')">💬 留言</button>
        </div>
        <div id="myTripContent"></div>
        <div id="myReservationContent" class="hidden"></div>
        <div id="myFeedbackContent" class="hidden">
            <textarea id="feedbackMsg" rows="4" placeholder="建议或问题..."></textarea>
            <button class="btn btn-primary" onclick="submitFeedback()" style="width:100%">提交</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let map, allPois=[], simPos=null, simMarker=null;
let generatedTripData = null;
const COUNTY = { lat:32.08, lng:107.24, name:'红军广场', id:'county' };
const poiColors = { '自然景区':'#2E7D32', '红色景区':'#9C27B0', '文博场馆':'#9C27B0', '餐饮住宿':'#FF9800', '停车场':'#00BCD4', '公共服务':'#607D8B' };
let transportPresets = {};
const DAY_START = 6*60, DAY_END = 20*60; // 6:00-20:00

function getUserId(){ let uid = localStorage.getItem('vid'); if(!uid) { uid='v_'+Date.now()+Math.random().toString(36); localStorage.setItem('vid',uid); } return uid; }

function initMap(){
    map = L.map('map', { zoomControl: false }).setView([32.08,107.18], 12);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
        subdomains:['1','2','3','4'], maxZoom:18
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);
    loadAllPOIs();
}

async function loadAllPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').eq('status','active');
    allPois = data || [];
    renderPOIs(allPois);
    window.subPoisMap = {};
    allPois.forEach(p => { if(p.parent_id){ if(!window.subPoisMap[p.parent_id]) window.subPoisMap[p.parent_id]=[]; window.subPoisMap[p.parent_id].push(p); } });
    await loadTransportPresets();
}
async function loadTransportPresets(){
    const { data } = await sb.from('ztj_transport_presets').select('*');
    transportPresets = {};
    if(data) data.forEach(p => { transportPresets[`${p.from_poi_id}_${p.to_poi_id}`] = p.time_min; });
}
function getTransportTime(fromId, toId){
    const fId = fromId==='county'?0:fromId;
    const tId = toId==='county'?0:toId;
    let t = transportPresets[`${fId}_${tId}`];
    if(t !== undefined) return t;
    t = transportPresets[`${tId}_${fId}`];
    return t !== undefined ? t : null;
}
function renderPOIs(pois){
    map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
    pois.forEach(p => {
        const cat = (p.category||'').split(',')[0] || '其他';
        const color = poiColors[cat] || '#999';
        const icon = L.divIcon({html:`<div style="background:${color}; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>`, iconSize:[20,20]});
        L.marker([p.lat,p.lng], {icon}).addTo(map).on('click', ()=> showPoiDetail(p));
    });
}
async function showPoiDetail(poi){
    const { data: m } = await sb.from('ztj_merchants').select('*').eq('poi_id', poi.id).maybeSingle();
    document.getElementById('merchantDetailTitle').textContent = poi.name;
    let html = `<p>${poi.description||''}</p>`;
    if(m){
        html += `<p>📞 ${m.phone||'未提供'} | 状态：${m.status==='open'?'营业':'休息'}</p>`;
        if(m.allow_reserve) html += `<button class="btn btn-primary" onclick="openReservePanel('${m.id}')">📋 研学预约</button>`;
    }
    document.getElementById('merchantDetailContent').innerHTML = html;
    openPanel('merchantDetailPanel');
}
async function openReservePanel(merchantId){
    const { data: activities } = await sb.from('reservation_activities').select('*').eq('merchant_id', merchantId);
    let html = `<div class="form-group"><label>活动类型</label><select id="reserve-activity" onchange="updateActivityDetail()">
        ${activities.map(a => `<option value="${a.id}" data-location="${a.location||''}">${a.title}</option>`).join('')}</select></div>
        <div id="activity-location" style="margin:8px 0;color:#666;"></div>
        <div class="form-group"><label>单位</label><select id="reserve-unit"><option>单位</option><option>集团</option><option>家庭</option><option>其他</option></select></div>
        <div class="form-group"><label>联系人</label><input id="reserve-name"></div>
        <div class="form-group"><label>电话</label><input id="reserve-phone"></div>
        <div class="form-group"><label>人数</label><input type="number" id="reserve-count" min="1"></div>
        <div class="form-group"><label>日期</label><input type="date" id="reserve-date"></div>
        <div class="form-group"><label>时段</label><div id="time-slots"></div></div>
        <div class="form-group"><label>场地</label><select id="reserve-room"><option>会议室</option><option>多媒体室</option></select></div>
        <button class="btn btn-primary" onclick="submitReservation('${merchantId}')">提交预约</button>`;
    document.getElementById('reserveContent').innerHTML = html;
    document.getElementById('reserve-date').onchange = ()=> loadTimeSlots(merchantId);
    updateActivityDetail();
    openPanel('reservePanel');
}
function updateActivityDetail(){ const sel = document.getElementById('reserve-activity'); if(sel) document.getElementById('activity-location').innerText = sel.selectedOptions[0]?.dataset.location ? `地点：${sel.selectedOptions[0].dataset.location}` : ''; }
async function loadTimeSlots(merchantId){ /* 省略，同之前 */ }
async function submitReservation(merchantId){ /* 省略 */ }

async function loadRoutes(){
    const { data } = await sb.from('ztj_routes').select('*');
    document.getElementById('routeList').innerHTML = data.map(r => `<div class="card"><h3>${r.name}</h3><p>${r.days||1}天 | ${r.transport||'自驾'}</p></div>`).join('');
}

// 自设行程核心
let routeLegs = [], mainPoiOptions = [];
function toggleCustomTripSection(){ document.getElementById('customTripSection').classList.toggle('hidden'); if(!document.getElementById('customTripSection').classList.contains('hidden')) { buildMainPoiOptions(); resetRouteLegs(); } }
function buildMainPoiOptions(){ mainPoiOptions = allPois.filter(p => !p.parent_id); if(!mainPoiOptions.some(p => String(p.id)==='county')) mainPoiOptions.unshift(COUNTY); }
function resetRouteLegs(){ routeLegs = [ { ...COUNTY } ]; renderDynamicRoute(); }
function addRouteLeg(){ routeLegs.push({ id:'', name:'' }); renderDynamicRoute(); }
function removeLeg(index){ if(index>0){ routeLegs.splice(index,1); renderDynamicRoute(); } }
function updateStartPoint(value){ const poi = mainPoiOptions.find(p=>String(p.id)===value); routeLegs[0] = poi || COUNTY; updateAllTimes(); }
function updateLeg(index, value){ const poi = mainPoiOptions.find(p=>String(p.id)===value); if(poi) routeLegs[index] = poi; else routeLegs[index] = { id:'', name:'' }; renderDynamicRoute(); }
function renderDynamicRoute(){
    const container = document.getElementById('dynamic-route');
    let html = `<div class="route-node"><select onchange="updateStartPoint(this.value)">${mainPoiOptions.map(p => `<option value="${p.id}" ${routeLegs[0]?.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select><span>→</span></div>`;
    routeLegs.forEach((leg, idx) => {
        if(idx===0) return;
        html += `<div class="route-node">
            <select onchange="updateLeg(${idx}, this.value)"><option value="">--选择--</option>${mainPoiOptions.map(p => `<option value="${p.id}" ${leg.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select>
            ${idx < routeLegs.length-1 ? `<span class="route-time" id="time-${idx}"></span>` : ''}
            <button class="btn btn-danger" onclick="removeLeg(${idx})">删除</button>
        </div>`;
    });
    container.innerHTML = html;
    updateAllTimes();
}
async function updateAllTimes(){
    for(let i=1; i<routeLegs.length; i++){
        const span = document.getElementById(`time-${i}`);
        if(span && routeLegs[i-1].id && routeLegs[i].id){
            const time = getTransportTime(routeLegs[i-1].id, routeLegs[i].id);
            span.textContent = time !== null ? `⏱️约${time}分钟` : '⏱️暂无数据';
        }
    }
}

// 生成行程：多日逻辑完善
async function generateCustomTrip(){
    const valid = routeLegs.filter(l => l.id && l.id!=='county');
    if(valid.length===0) return alert('请至少选择一个景区');
    const dateStr = document.getElementById('trip-date').value;
    if(!dateStr) return alert('选择出发日期');
    const startTime = document.getElementById('trip-time').value;
    const mode = document.getElementById('trip-mode').value;
    const people = document.getElementById('trip-people').value;

    // 构建节点
    let nodes = [ { ...routeLegs[0], type:'start' } ];
    for(let i=1; i<routeLegs.length; i++) {
        const poi = routeLegs[i];
        const duration = allPois.find(p=>p.id==poi.id)?.visit_duration || 60;
        nodes.push({ ...poi, type:'poi', visitDuration: duration });
    }
    // 获取交通耗时
    for(let i=1; i<nodes.length; i++){
        const t = getTransportTime(nodes[i-1].id, nodes[i].id);
        nodes[i].transportTime = t;
        if(t === null) await reportMissingTransport(nodes[i-1].id, nodes[i].id, nodes[i-1].name, nodes[i].name);
    }

    let currentDate = new Date(dateStr);
    let [h,m] = startTime.split(':').map(Number);
    let curMin = h*60 + m;
    const days = [ { date: new Date(currentDate), items: [], totalTravel:0, totalVisit:0 } ];
    // 修正出发时间
    if(curMin < DAY_START) curMin = DAY_START;
    if(curMin >= DAY_END) { currentDate.setDate(currentDate.getDate()+1); days.push({ date: new Date(currentDate), items: [], totalTravel:0, totalVisit:0 }); curMin = DAY_START; }
    days[0].items.push({ time: curMin, text: `🚩 从 ${nodes[0].name} 出发` });

    for(let i=1; i<nodes.length; i++){
        const prevNode = nodes[i-1];
        const curNode = nodes[i];
        // 处理交通
        if(curNode.transportTime !== null && curNode.transportTime > 0){
            let travelLeft = curNode.transportTime;
            let state = 'travel';
            while(travelLeft > 0){
                let day = days[days.length-1];
                let timeLeft = DAY_END - curMin;
                if(timeLeft <= 0){
                    // 跨天
                    day.items.push({ time: DAY_END, text: `🌙 交通暂停，前往 ${curNode.name} (剩余${travelLeft}分钟)` });
                    currentDate.setDate(currentDate.getDate()+1);
                    days.push({ date: new Date(currentDate), items: [], totalTravel:0, totalVisit:0 });
                    curMin = DAY_START;
                    timeLeft = DAY_END - DAY_START;
                    day = days[days.length-1];
                }
                let spend = Math.min(travelLeft, timeLeft);
                curMin += spend;
                travelLeft -= spend;
                day.totalTravel += spend;
                if(travelLeft === 0){
                    day.items.push({ time: curMin, text: `🚗 到达 ${curNode.name} (交通${curNode.transportTime}分钟)` });
                }
            }
        } else if(curNode.transportTime === null){
            days[days.length-1].items.push({ time: curMin, text: `⚠️ 到达 ${curNode.name} (交通耗时未知)` });
        }
        // 处理游览
        let visitLeft = curNode.visitDuration;
        if(visitLeft > 0){
            let firstDayVisit = true;
            while(visitLeft > 0){
                let day = days[days.length-1];
                let timeLeft = DAY_END - curMin;
                if(timeLeft <= 0){
                    if(firstDayVisit) day.items.push({ time: DAY_END, text: `⏸️ 游览 ${curNode.name} 暂停，明日继续` });
                    else day.items.push({ time: DAY_END, text: `⏸️ 继续游览 ${curNode.name}，明日继续` });
                    currentDate.setDate(currentDate.getDate()+1);
                    days.push({ date: new Date(currentDate), items: [], totalTravel:0, totalVisit:0 });
                    curMin = DAY_START;
                    timeLeft = DAY_END - DAY_START;
                    day = days[days.length-1];
                    if(!firstDayVisit) day.items.push({ time: DAY_START, text: `▶️ 继续游览 ${curNode.name}` });
                    firstDayVisit = false;
                }
                let spend = Math.min(visitLeft, timeLeft);
                curMin += spend;
                visitLeft -= spend;
                day.totalVisit += spend;
                if(visitLeft === 0){
                    let endText = firstDayVisit ? `⏱️ 结束游览 ${curNode.name} (游览${curNode.visitDuration}分钟)` : `⏱️ 结束游览 ${curNode.name} (总游览${curNode.visitDuration}分钟)`;
                    day.items.push({ time: curMin, text: endText });
                }
            }
        }
    }

    // 生成HTML
    let timelineHtml = '';
    let totalTravelAll = 0, totalVisitAll = 0;
    days.forEach((day, idx) => {
        timelineHtml += `<div class="day-header">📅 第${idx+1}天 (${day.date.toLocaleDateString('zh-CN')})</div>`;
        day.items.forEach(item => {
            const hh = Math.floor(item.time/60).toString().padStart(2,'0');
            const mm = (item.time%60).toString().padStart(2,'0');
            timelineHtml += `<div>${hh}:${mm} ${item.text}</div>`;
        });
        totalTravelAll += day.totalTravel;
        totalVisitAll += day.totalVisit;
    });

    // 温馨提示
    let tips = [];
    let tipIdx = 1;
    // 就餐提示
    days.forEach(day => {
        const lunchRange = [11*60, 13*60];
        const dinnerRange = [17*60, 19*60];
        let hasLunch = false, hasDinner = false;
        day.items.forEach(item => {
            if(item.time >= lunchRange[0] && item.time <= lunchRange[1]) hasLunch = true;
            if(item.time >= dinnerRange[0] && item.time <= dinnerRange[1]) hasDinner = true;
        });
        if(hasLunch) tips.push(`${tipIdx++}. ${day.date.toLocaleDateString('zh-CN')} 行程覆盖午餐时段(11:00-13:00)，建议暂停行程安排就餐。`);
        if(hasDinner) tips.push(`${tipIdx++}. ${day.date.toLocaleDateString('zh-CN')} 行程覆盖晚餐时段(17:00-19:00)，建议暂停行程安排就餐。`);
        // 长游览+餐点提示
        day.items.forEach((item, i) => {
            if(item.text.includes('结束游览')){
                const prevItem = day.items[i-1];
                if(prevItem && (prevItem.text.includes('到达') || prevItem.text.includes('继续游览'))){
                    const startTime = prevItem.time;
                    const duration = item.time - startTime;
                    if(duration > 120){
                        if((startTime <= lunchRange[1] && item.time >= lunchRange[0]) || (startTime <= dinnerRange[1] && item.time >= dinnerRange[0])){
                            const poiName = item.text.match(/游览 (.+?) \(/)?.[1] || '';
                            tips.push(`${tipIdx++}. ${poiName} 游览时间较长且覆盖就餐时段，请提前做好就餐安排。`);
                        }
                    }
                }
            }
        });
    });
    if(totalTravelAll > 180) tips.push(`${tipIdx++}. 总交通时间超过3小时，可能引起疲劳。`);
    if(totalVisitAll > 300) tips.push(`${tipIdx++}. 总游览时间超过5小时，行程较为紧凑。`);
    if(totalTravelAll + totalVisitAll > 480) tips.push(`${tipIdx++}. 全天活动超过8小时，注意体力分配。`);
    if(days.length > 1) tips.push(`${tipIdx++}. 行程跨多天，请合理安排住宿休息。`);

    const tipsHtml = tips.length ? `<div class="warn-list"><strong>温馨提示：</strong>${tips.map(t => `<div>${t}</div>`).join('')}</div>` : '';

    document.getElementById('generated-trip').innerHTML = `<div class="card">${timelineHtml}</div>`;
    document.getElementById('trip-warnings').innerHTML = tipsHtml;
    document.getElementById('saveGeneratedTripBtn').classList.remove('hidden');

    generatedTripData = {
        name: '自设行程', date: dateStr, time: startTime, mode, people,
        nodes: nodes.map(n => ({ id:n.id, name:n.name, lat:n.lat, lng:n.lng, transportTime:n.transportTime, visitDuration:n.visitDuration })),
        days: days.map(d => ({ date: d.date.toISOString(), items: d.items, totalTravel: d.totalTravel, totalVisit: d.totalVisit })),
        warnings: tips
    };
}
async function reportMissingTransport(fromId, toId, fromName, toName){
    const msg = `[缺交通耗时] ${fromName}(ID:${fromId}) → ${toName}(ID:${toId}) 之间缺少预设耗时`;
    await sb.from('ztj_feedbacks').insert({ user_id: 'system', message: msg });
}
function saveGeneratedTrip(){
    if(!generatedTripData) return;
    const name = prompt('行程名称', generatedTripData.name);
    if(!name) return;
    generatedTripData.name = name;
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    trips.push({ ...generatedTripData, timestamp: Date.now() });
    localStorage.setItem('trips', JSON.stringify(trips));
    alert('行程已保存');
    document.getElementById('saveGeneratedTripBtn').classList.add('hidden');
    document.getElementById('generated-trip').innerHTML = '';
    document.getElementById('trip-warnings').innerHTML = '';
    generatedTripData = null;
    resetRouteLegs();
}

// 我的面板
function switchMyTab(tab){
    document.getElementById('my-tab-trip').classList.remove('active');
    document.getElementById('my-tab-reservation').classList.remove('active');
    document.getElementById('my-tab-feedback').classList.remove('active');
    document.getElementById('myTripContent').classList.add('hidden');
    document.getElementById('myReservationContent').classList.add('hidden');
    document.getElementById('myFeedbackContent').classList.add('hidden');
    if(tab==='trip'){
        document.getElementById('my-tab-trip').classList.add('active');
        document.getElementById('myTripContent').classList.remove('hidden');
        renderMyTrip();
    } else if(tab==='reservation'){
        document.getElementById('my-tab-reservation').classList.add('active');
        document.getElementById('myReservationContent').classList.remove('hidden');
        loadMyReservations();
    } else if(tab==='feedback'){
        document.getElementById('my-tab-feedback').classList.add('active');
        document.getElementById('myFeedbackContent').classList.remove('hidden');
    }
}
function renderMyTrip(){
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    document.getElementById('myTripContent').innerHTML = trips.length ? trips.map((t,i)=>`
        <div class="card">
            <h4>${t.name} (${t.date} ${t.time})</h4>
            <p>${t.mode} | ${t.people}人</p>
            ${t.nodes.slice(1).map(n => `<div>• ${n.name} (${n.visitDuration||0}分钟)</div>`).join('')}
            <button class="btn btn-danger" onclick="deleteTrip(${i})">删除</button>
        </div>`).join('') : '<p>暂无行程</p>';
}
function deleteTrip(idx){
    const trips = JSON.parse(localStorage.getItem('trips')||'[]');
    trips.splice(idx,1);
    localStorage.setItem('trips', JSON.stringify(trips));
    renderMyTrip();
}
async function loadMyReservations(){
    const uid = getUserId();
    const { data } = await sb.from('reservations').select('*').eq('user_id', uid).order('created_at',false);
    document.getElementById('myReservationContent').innerHTML = data && data.length ? data.map(r => `<div class="card"><b>${r.reservation_date} ${r.time_slot_start}</b> ${r.visitor_count}人 ${r.name} ${r.phone}</div>`).join('') : '<p>暂无预约</p>';
}
async function submitFeedback(){
    const msg = document.getElementById('feedbackMsg').value;
    if(!msg) return;
    await sb.from('ztj_feedbacks').insert({ user_id: getUserId(), message: msg });
    alert('感谢反馈');
    document.getElementById('feedbackMsg').value = '';
}

function openPanel(id){ document.getElementById(id).classList.add('active'); if(id==='routesPanel') loadRoutes(); }
function closePanel(id){ document.getElementById(id).classList.remove('active'); }
function startSimulation(){ alert('模拟导航尚未实现'); }
window.onload = initMap;
</script>
