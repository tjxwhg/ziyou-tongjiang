<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游通江</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; height:100vh; overflow:hidden; }
        #map { height:100vh; width:100vw; }
        .top-bar { position:fixed; top:20px; right:20px; z-index:1500; }
        .top-btn { background:white; border-radius:20px; padding:6px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); border:none; }
        .float-voice { position:fixed; bottom:120px; right:20px; background:#2E7D32; color:white; border-radius:50%; width:50px; height:50px; display:none; align-items:center; justify-content:center; }
        .bottom-bar { position:fixed; bottom:20px; left:20px; right:20px; display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:12px; font-weight:bold; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-secondary { background:white; color:#2E7D32; }
        .panel { position:fixed; top:0; left:0; right:0; bottom:0; background:white; z-index:2000; transform:translateY(100%); transition:0.3s; overflow-y:auto; }
        .panel.active { transform:translateY(0); }
        .panel-header { padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
        .panel-body { padding:16px; }
        .reserve-btn { background:#1565C0; color:white; padding:10px; border-radius:20px; width:100%; margin-top:12px; }
        .time-slot { display:inline-block; padding:6px 12px; margin:4px; border:1px solid #ccc; border-radius:20px; cursor:pointer; }
        .time-slot.full { background:#eee; color:#999; }
        .time-slot.selected { background:#2E7D32; color:white; }
        .card { border:1px solid #eee; border-radius:8px; padding:12px; margin:8px 0; background:#fafafa; }
        .hidden { display:none; }
        .form-group { margin:8px 0; }
        label { display:block; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .toggle-section { background:#f0f0f0; border-radius:8px; padding:12px; margin:10px 0; cursor:pointer; }
        .my-tab { padding:8px 16px; border:none; background:#eee; border-radius:20px; }
        .my-tab.active { background:#2e7d32; color:white; }
        .route-node { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .route-time { font-size:12px; color:#666; margin-left:8px; }
        .lang-select { margin-bottom:15px; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="top-bar">
    <button class="top-btn" onclick="openPanel('myPanel')">👤 我的</button>
</div>
<div class="float-voice" id="voiceBtn">🔊</div>
<div class="bottom-bar">
    <button class="btn btn-secondary" onclick="openPanel('routesPanel')">📋 路线</button>
    <button class="btn btn-primary" id="navBtn" onclick="startSimulation()">📍 模拟导航</button>
</div>

<!-- 商户详情面板 -->
<div class="panel" id="merchantDetailPanel">
    <div class="panel-header"><h2 id="merchantDetailTitle"></h2><button onclick="closePanel('merchantDetailPanel')">✕</button></div>
    <div class="panel-body" id="merchantDetailContent"></div>
</div>
<!-- 研学预约面板 -->
<div class="panel" id="reservePanel">
    <div class="panel-header"><h2>研学预约</h2><button onclick="closePanel('reservePanel')">✕</button></div>
    <div class="panel-body" id="reserveContent"></div>
</div>
<!-- 路线面板 -->
<div class="panel" id="routesPanel">
    <div class="panel-header"><h2>路线</h2><button onclick="closePanel('routesPanel')">✕</button></div>
    <div class="panel-body">
        <h3>📌 推荐路线</h3>
        <div id="routeList"></div>
        <div class="toggle-section" onclick="toggleCustomTripSection()">
            <h4>✏️ 自设行程 <span id="customTripArrow">▼</span></h4>
        </div>
        <div id="customTripSection" class="hidden" style="margin-top:10px;">
            <div class="form-group"><label>出行时段</label><select id="trip-time"><option value="08:00">08:00</option><option value="09:00">09:00</option><option value="10:00">10:00</option></select></div>
            <div class="form-group"><label>出行方式</label><select id="trip-mode"><option value="auto">自驾</option><option value="bus">公交</option><option value="walk">步行</option></select></div>
            <div class="form-group"><label>人数</label><input type="number" id="trip-people" min="1" value="2"></div>
            <div class="form-group"><label>行程路线</label>
                <div id="dynamic-route"></div>
                <button class="btn btn-default" onclick="addRouteLeg()">+ 添加景点</button>
            </div>
            <button class="btn btn-primary" onclick="generateCustomTrip()" style="width:100%; margin-top:12px;">生成行程</button>
            <div id="trip-warnings" style="margin-top:12px;"></div>
            <div id="generated-trip" style="margin-top:12px;"></div>
            <button class="btn btn-primary hidden" id="saveGeneratedTripBtn" onclick="saveGeneratedTrip()" style="width:100%; margin-top:8px;">保存至我的行程</button>
        </div>
    </div>
</div>

<!-- 我的面板 -->
<div class="panel" id="myPanel">
    <div class="panel-header"><h2>我的</h2><button onclick="closePanel('myPanel')">✕</button></div>
    <div class="panel-body">
        <div class="lang-select">
            <label>语言</label>
            <select id="langSelect" style="width:100%;">
                <option value="cn">中文</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button onclick="switchMyTab('trip')" class="my-tab active">📅 行程</button>
            <button onclick="switchMyTab('reservation')" class="my-tab">📋 预约</button>
            <button onclick="switchMyTab('feedback')" class="my-tab">💬 留言</button>
        </div>
        <div id="myTripContent"></div>
        <div id="myReservationContent" class="hidden"></div>
        <div id="myFeedbackContent" class="hidden">
            <textarea id="feedbackMsg" rows="4" placeholder="建议或问题..."></textarea>
            <button class="btn btn-primary" onclick="submitFeedback()" style="width:100%;">提交</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let map, currentLang='cn', voiceEnabled=true, triggeredPois={};
let allPois=[], simPos=null, simMarker=null;
let generatedTripData = null;
const COUNTY = { lat:32.08, lng:107.24, name:'红军广场', id:'county' };
const poiColors = { '自然景区':'#2E7D32', '红色景区':'#9C27B0', '文博场馆':'#9C27B0', '餐饮住宿':'#FF9800', '停车场':'#00BCD4', '公共服务':'#607D8B' };
let transportPresets = {};

function getUserId(){ let uid = localStorage.getItem('vid'); if(!uid){ uid='v_'+Date.now()+Math.random().toString(36); localStorage.setItem('vid',uid); } return uid; }

function initMap(){
    map = L.map('map').setView([32.08,107.18], 12);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
        subdomains:['1','2','3','4'], maxZoom:18
    }).addTo(map);
    loadAllPOIs();
    map.on('click', e => { if(simPos) setSimulatedPosition(e.latlng.lat, e.latlng.lng); });
}

async function loadAllPOIs(){
    const { data } = await sb.from('ztj_poi').select('*').eq('status','active');
    allPois = data || [];
    renderPOIs(allPois);
    window.subPoisMap = {};
    allPois.forEach(p => { if(p.parent_id){ if(!window.subPoisMap[p.parent_id]) window.subPoisMap[p.parent_id] = []; window.subPoisMap[p.parent_id].push(p); } });
    await loadTransportPresets();
}

async function loadTransportPresets(){
    const { data } = await sb.from('ztj_transport_presets').select('*');
    transportPresets = {};
    if(data){
        data.forEach(p => {
            const key = `${p.from_poi_id}_${p.to_poi_id}`;
            transportPresets[key] = p.time_min;
        });
    }
}

function getTransportTime(fromId, toId) {
    const fId = fromId === 'county' ? 0 : fromId;
    const tId = toId === 'county' ? 0 : toId;
    const key = `${fId}_${tId}`;
    if (transportPresets[key] !== undefined) return transportPresets[key];
    const reverseKey = `${tId}_${fId}`;
    if (transportPresets[reverseKey] !== undefined) return transportPresets[reverseKey];
    return null; // 无数据
}

// 记录缺失数据
async function reportMissingTransport(fromId, toId, fromName, toName){
    const fId = fromId === 'county' ? 0 : fromId;
    const tId = toId === 'county' ? 0 : toId;
    const msg = `[缺交通耗时] ${fromName}(ID:${fId}) → ${toName}(ID:${tId}) 之间缺少预设耗时`;
    await sb.from('ztj_feedbacks').insert({ user_id: 'system', message: msg });
}

// 其他函数保持不变...

// ========== 自设行程（无子POI） ==========
let routeLegs = [], mainPoiOptions = [];

async function toggleCustomTripSection(){
    const section = document.getElementById('customTripSection');
    section.classList.toggle('hidden');
    if(!section.classList.contains('hidden')){
        buildMainPoiOptions();
        resetRouteLegs();
    }
}
function buildMainPoiOptions(){
    mainPoiOptions = allPois.filter(p => !p.parent_id);
    if(!mainPoiOptions.some(p => String(p.id) === 'county')) mainPoiOptions.unshift(COUNTY);
}
function resetRouteLegs(){ routeLegs = [ { ...COUNTY } ]; renderDynamicRoute(); }
function addRouteLeg(){ routeLegs.push({ id:'', name:'' }); renderDynamicRoute(); }
function removeLeg(index){ if(index>0) routeLegs.splice(index,1); renderDynamicRoute(); }
function updateStartPoint(value){
    const poi = mainPoiOptions.find(p => String(p.id) === value);
    routeLegs[0] = poi || COUNTY;
    updateAllTimes();
}
function updateLeg(index, value){
    const poi = mainPoiOptions.find(p => String(p.id) === value);
    if(poi) routeLegs[index] = poi;
    else routeLegs[index] = { id:'', name:'' };
    renderDynamicRoute();
}

function renderDynamicRoute(){
    const container = document.getElementById('dynamic-route');
    let html = `<div class="route-node"><select onchange="updateStartPoint(this.value)">${mainPoiOptions.map(p => `<option value="${p.id}" ${routeLegs[0]?.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select><span>→</span></div>`;
    routeLegs.forEach((leg, idx) => {
        if(idx===0) return;
        html += `<div class="route-node">
            <select onchange="updateLeg(${idx}, this.value)"><option value="">--选择--</option>${mainPoiOptions.map(p => `<option value="${p.id}" ${leg.id==p.id?'selected':''}>${p.name}</option>`).join('')}</select>
            ${idx < routeLegs.length-1 ? `<span class="route-time" id="time-${idx}"></span>` : ''}
            <button class="btn btn-danger" onclick="removeLeg(${idx})">删除</button>
        </div>`;
    });
    container.innerHTML = html;
    updateAllTimes();
}

async function updateAllTimes(){
    for(let i=1; i<routeLegs.length; i++){
        const from = routeLegs[i-1], to = routeLegs[i];
        const span = document.getElementById(`time-${i}`);
        if(span && from.id && to.id){
            const time = getTransportTime(from.id, to.id);
            span.textContent = time !== null ? `⏱️约${time}分钟` : '⏱️暂无数据';
        }
    }
}

async function generateCustomTrip(){
    const valid = routeLegs.filter(l => l.id && l.id!=='county');
    if(valid.length===0) return alert('请至少选择一个景区');
    const startTime = document.getElementById('trip-time').value;
    const mode = document.getElementById('trip-mode').value; // 暂不使用
    let fullNodes = [ { ...routeLegs[0], type:'start' } ];
    for(let i=1; i<routeLegs.length; i++) fullNodes.push({ ...routeLegs[i], type:'poi', visitDuration: allPois.find(p=>p.id==routeLegs[i].id)?.visit_duration || 60 });

    // 检查并记录缺失
    for(let i=1; i<fullNodes.length; i++){
        const from = fullNodes[i-1], to = fullNodes[i];
        const time = getTransportTime(from.id, to.id);
        if(time === null){
            await reportMissingTransport(from.id, to.id, from.name, to.name);
            fullNodes[i].transportTime = -1; // 标记缺失
        } else {
            fullNodes[i].transportTime = time;
        }
    }

    let [h,m] = startTime.split(':').map(Number);
    let curMin = h*60+m;
    let timeline = '', missingList = [];
    fullNodes.forEach((n,i) => {
        if(i===0) timeline += `<div>🚩 ${startTime} 出发：${n.name}</div>`;
        else {
            if(n.transportTime === -1){
                missingList.push(`❌ ${n.name} 交通耗时未知`);
                timeline += `<div>⚠️ 无法计算到达时间（缺少耗时数据）</div>`;
            } else {
                curMin += n.transportTime;
                let arrH=Math.floor(curMin/60), arrM=curMin%60;
                timeline += `<div>🚗 ${('0'+arrH).slice(-2)}:${('0'+arrM).slice(-2)} 到达 ${n.name} (交通${n.transportTime}分钟)</div>`;
            }
            curMin += n.visitDuration;
            let depH=Math.floor(curMin/60), depM=curMin%60;
            timeline += `<div>⏱️ ${('0'+depH).slice(-2)}:${('0'+depM).slice(-2)} 停留至 (${n.visitDuration}分钟)</div>`;
        }
    });
    if(missingList.length) timeline += `<div style="color:#c00;">${missingList.join('<br>')}</div>`;
    document.getElementById('generated-trip').innerHTML = `<div class="card">${timeline}</div>`;
    document.getElementById('saveGeneratedTripBtn').classList.remove('hidden');
    // 提示
    document.getElementById('trip-warnings').innerHTML = missingList.length ? `<div>部分交通耗时缺失，已自动反馈，请等待数据补充</div>` : '';
}

// ... 其余函数（我的面板、预约等）保持不变
window.onload = initMap;
</script>
</body>
</html>
