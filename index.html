<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智游通江-测试</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; height: 100vh; }
        #map { height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 请替换为你的真实信息
        const SUPABASE_URL = 'https://aermnnksvhezfykxefla.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlcm1ubmtzdmhlemZ5a3hlZmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNzQ4ODEsImV4cCI6MjA5NzY1MDg4MX0.c2Wemu90PiezEaXn2Hv3tBL-D5YFXYTVxei14CI-Rvk'; // 从官方示例复制到这里

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function init() {
            const map = L.map('map').setView([32.08, 107.18], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18
            }).addTo(map);

            const { data, error } = await sb.from('ztj_poi').select('*').eq('status', 'active');
            if (error) {
                console.error('错误：', error);
                return;
            }
            data.forEach(poi => {
                const color = poi.category === '景点' ? '#2E7D32' : '#2196F3';
                L.circleMarker([poi.lat, poi.lng], { radius: 10, color: color, fillOpacity: 0.8 })
                    .addTo(map)
                    .bindPopup('<b>' + poi.name + '</b><br>' + (poi.description || ''));
            });
        }
        window.onload = init;
    </script>
</body>
</html>
