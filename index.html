<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游通江</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; height:100vh; overflow:hidden; }
        #map { height:100vh; width:100vw; z-index:1; }
        .top-bar { position:fixed; top:20px; right:20px; z-index:1500; }
        .top-btn { background:white; border-radius:20px; padding:6px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); border:none; cursor:pointer; }
        .bottom-bar { position:fixed; bottom:20px; left:20px; right:20px; z-index:1500; display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-secondary { background:white; color:#2E7D32; }
        .panel { position:fixed; top:0; left:0; right:0; bottom:0; background:white; z-index:2000; transform:translateY(100%); transition:0.3s; overflow-y:auto; }
        .panel.active { transform:translateY(0); }
        .panel-header { padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
        .panel-body { padding:16px; }
        .card { border:1px solid #eee; border-radius:8px; padding:12px; margin:8px 0; background:#fafafa; }
        .hidden { display:none; }
        .form-group { margin:8px 0; }
        label { display:block; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .toggle-section { background:#f0f0f0; border-radius:8px; padding:12px; margin:10px 0; cursor:pointer; }
        .my-tab { padding:8px 16px; border:none; background:#eee; border-radius:20px; cursor:pointer; }
        .my-tab.active { background:#2e7d32; color:white; }
        .route-node { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .route-time { font-size:12px; color:#666; }
        .day-header { font-weight:bold; background:#e9f5ea; padding:6px; border-radius:4px; margin:12px 0 6px; }
        .warn-list { background:#fafafa; padding:10px; border-radius:8px; margin-top:10px; }
        .trip-line { padding:4px 0; border-bottom:1px dotted #eee; }
        .collapse-header { cursor:pointer; font-weight:bold; display:flex; justify-content:space-between; }
    </style>
</head>

<script>

// 时间常量 (分钟)
const DAY_START = 480;   // 8:00 游览开始
const DAY_END = 1080;    // 18:00 游览结束，之后不可开始新游览，交通可继续
const LUNCH_TRIGGER = 690;  // 11:30
const LUNCH_END = 750;     // 12:30 (触发时段结束)
const DINNER_TRIGGER = 1050; // 17:30
const DINNER_END = 1110;    // 18:30
const MEAL_DURATION = 60;   // 1小时

const EXCLUDED_FROM_TRIP = ['游戏娱乐','公共服务','特产购物'];
const NON_VISIT_CATEGORIES = ['交通枢纽','餐饮住宿','公共服务','特产购物','游玩娱乐'];
let routeLegs=[], mainPoiOptions=[], allowedPoiOptions=[];

    await loadTransportPresets();
}

}

// 自设行程动态部分（略，同之前）

// ========== 核心行程生成器 ==========
function generateTimeline(nodes, startDate, startTime) {
    let curDate = new Date(startDate);
    let [h,m] = startTime.split(':').map(Number);
    let curMin = h*60 + m;
    // 出发时间若早于8:00，允许，但第一个游览不能早于8:00
    const lines = [];
    // 每天午餐和晚餐是否已插入
    let lunchInserted = false;
    let dinnerInserted = false;
    let dayStartMin = DAY_START; // 当天游览开始时间（可能早于8:00的交通不计入）

    // 添加起点出发
    lines.push({time: curMin, text: `🚩 ${formatTime(curMin)} 从 ${nodes[0].name} 出发`, date: new Date(curDate)});

    // 处理第一个节点（起点）到第一个景点的交通，允许在8:00前
    for (let i = 1; i < nodes.length; i++) {
        const prev = nodes[i-1], cur = nodes[i];
        // 交通
        let travelTime = cur.transportTime || 0;
        if (travelTime > 0) {
            // 交通不间断，直接推进
            let remainingTravel = travelTime;
            while (remainingTravel > 0) {
                let timeToNextDay = DAY_END - curMin; // 当天剩余时间（18:00前）
                if (curMin >= DAY_END) {
                    // 跨天
                    lines.push({time: DAY_END, text: `🌙 当天行程结束，住宿休息`, date: new Date(curDate)});
                    curDate.setDate(curDate.getDate()+1);
                    curMin = DAY_START;
                    lunchInserted = false;
                    dinnerInserted = false;
                    continue;
                }
                let spend = Math.min(remainingTravel, timeToNextDay);
                let endMin = curMin + spend;
                lines.push({time: curMin, text: `🚗 ${formatTime(curMin)}-${formatTime(endMin)} 前往 ${cur.name} (交通${travelTime}分钟)`, date: new Date(curDate)});
                curMin = endMin;
                remainingTravel -= spend;
                if (curMin >= DAY_END) {
                    // 如果正好结束在18:00，不做额外处理，后面继续检查
                }
            }
            // 交通结束后，检查是否需要插入就餐
            if (!lunchInserted && curMin >= LUNCH_TRIGGER) {
                lines.push({time: curMin, text: `🍽️ 午餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
                curMin += MEAL_DURATION;
                lunchInserted = true;
                // 如果午餐后超过18:00，当天后续无法游览，但不影响
            }
            if (!dinnerInserted && curMin >= DINNER_TRIGGER) {
                lines.push({time: curMin, text: `🍽️ 晚餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
                curMin += MEAL_DURATION;
                dinnerInserted = true;
            }
        }
        // 游览
        if (cur.visitDuration > 0 && !isNonVisitPoi(cur.id)) {
            let visitLeft = cur.visitDuration;
            while (visitLeft > 0) {
                // 如果当前时间早于8:00，等待到8:00
                if (curMin < DAY_START) {
                    lines.push({time: curMin, text: `⏳ 等待游览时间 (${formatTime(curMin)}-${formatTime(DAY_START)})`, date: new Date(curDate)});
                    curMin = DAY_START;
                }
                // 18:00后不可开始新游览，但若已经在游览中（不可能，因为每次游览都会检查）
                if (curMin >= DAY_END) {
                    // 跨天
                    lines.push({time: DAY_END, text: `🌙 当天行程结束，住宿休息`, date: new Date(curDate)});
                    curDate.setDate(curDate.getDate()+1);
                    curMin = DAY_START;
                    lunchInserted = false;
                    dinnerInserted = false;
                    continue;
                }
                // 检查是否触发午餐/晚餐
                if (!lunchInserted && curMin >= LUNCH_TRIGGER && curMin < LUNCH_END) {
                    lines.push({time: curMin, text: `🍽️ 午餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
                    curMin += MEAL_DURATION;
                    lunchInserted = true;
                    continue; // 重新计算游览剩余
                }
                if (!dinnerInserted && curMin >= DINNER_TRIGGER && curMin < DINNER_END) {
                    lines.push({time: curMin, text: `🍽️ 晚餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
                    curMin += MEAL_DURATION;
                    dinnerInserted = true;
                    continue;
                }
                // 计算当天剩余游览时间（到18:00截止）
                let timeLeft = DAY_END - curMin;
                let spend = Math.min(visitLeft, timeLeft);
                let endMin = curMin + spend;
                lines.push({time: curMin, text: `⏱️ ${formatTime(curMin)}-${formatTime(endMin)} 游览 ${cur.name} (游览${cur.visitDuration}分钟)`, date: new Date(curDate)});
                curMin = endMin;
                visitLeft -= spend;
                if (curMin >= DAY_END && visitLeft > 0) {
                    // 游览中断，次日继续
                    lines.push({time: DAY_END, text: `🌙 当天行程结束，住宿休息`, date: new Date(curDate)});
                    curDate.setDate(curDate.getDate()+1);
                    curMin = DAY_START;
                    lunchInserted = false;
                    dinnerInserted = false;
                }
            }
        } else if (isNonVisitPoi(cur.id)) {
            // 非游览类POI直接到达，无时间消耗
            lines.push({time: curMin, text: `📍 ${formatTime(curMin)} 到达 ${cur.name}`, date: new Date(curDate)});
        }
        // 每个节点处理完后，再次检查是否需要补就餐（例如游览结束刚好过了午餐时间但未插入）
        if (!lunchInserted && curMin >= LUNCH_TRIGGER) {
            lines.push({time: curMin, text: `🍽️ 午餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
            curMin += MEAL_DURATION;
            lunchInserted = true;
        }
        if (!dinnerInserted && curMin >= DINNER_TRIGGER) {
            lines.push({time: curMin, text: `🍽️ 晚餐时间 (${formatTime(curMin)}-${formatTime(curMin+MEAL_DURATION)})`, date: new Date(curDate)});
            curMin += MEAL_DURATION;
            dinnerInserted = true;
        }
    }
    return lines;
}

async function generateCustomTrip(){
    const valid = routeLegs.filter(l => l.id && l.id!=='county');
    if(valid.length===0) return alert('请至少选择一个景区');
    const dateStr = document.getElementById('trip-date').value;
    const startTime = document.getElementById('trip-time').value;
    if(!dateStr) return alert('选择出发日期');
    const mode = document.getElementById('trip-mode').value;
    const people = document.getElementById('trip-people').value;

    let nodes = [{...routeLegs[0], type:'start'}];
    for(let i=1; i<routeLegs.length; i++){
        const p = routeLegs[i];
        let dur = allPois.find(p2=>p2.id==p.id)?.visit_duration || 0;
        if(isNonVisitPoi(p.id)) dur = 0;
        nodes.push({...p, type:'poi', visitDuration:dur, transportTime: getTransportTime(routeLegs[i-1].id, p.id)});
    }

    const allLines = generateTimeline(nodes, dateStr, startTime);

    // 按天分组
    const days = [];
    let day = null;
    allLines.forEach(l => {
        const ld = l.date.toLocaleDateString('zh-CN');
        if(!day || day.date !== ld){
            if(day) days.push(day);
            day = { date: ld, lines: [] };
        }
        day.lines.push({time: l.time, text: l.text});
    });
    if(day) days.push(day);

    let html = '';
    days.forEach((d, i) => html += `<div class="day-header">📅 第${i+1}天 (${d.date})</div>` + d.lines.map(l => `<div class="trip-line">${l.text}</div>`).join(''));

    let totalActivity = nodes.reduce((sum, n) => sum + (n.transportTime||0) + (n.visitDuration||0), 0);
    let mealCount = allLines.filter(l => l.text.includes('🍽️')).length;
    let tips = [];
    tips.push(`纯活动时间：${totalActivity}分钟（约${(totalActivity/60).toFixed(1)}小时）`);
    if(mealCount > 0) tips.push(`包含 ${mealCount} 次就餐，预计总耗时约 ${Math.round((totalActivity + mealCount*60)/60)} 小时`);
    if(days.length > 1) tips.push(`行程跨${days.length}天，请合理安排住宿。`);

    document.getElementById('generated-trip').innerHTML = `<div class="card">${html}</div>`;
    document.getElementById('trip-warnings').innerHTML = tips.length ? `<div class="warn-list"><strong>温馨提示：</strong>${tips.map(t=>`<div>${t}</div>`).join('')}</div>` : '';
    document.getElementById('saveGeneratedTripBtn').classList.remove('hidden');

    generatedTripData = { name:'自设行程', date:dateStr, time:startTime, mode, people, nodes, days, tips };
}
