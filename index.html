<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智游通江</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, sans-serif; height:100vh; overflow:hidden; }
        #map { height:100vh; width:100vw; }
        .top-bar { position:fixed; top:10px; right:10px; z-index:1500; display:flex; gap:8px; }
        .top-btn { background:white; border-radius:20px; padding:6px 12px; border:none; font-size:14px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .condition-bar { position:fixed; top:10px; left:10px; right:100px; z-index:1500; display:flex; gap:6px; align-items:center; background:rgba(255,255,255,0.95); padding:8px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); overflow-x:auto; }
        .condition-bar input, .condition-bar select { padding:6px; border:1px solid #ccc; border-radius:10px; font-size:13px; }
        .reserve-quick { background:#1565C0; color:white; padding:6px 14px; border-radius:20px; white-space:nowrap; border:none; }
        .category-bar { position:fixed; top:60px; left:10px; right:10px; z-index:1500; display:flex; gap:6px; overflow-x:auto; padding:8px; background:rgba(255,255,255,0.95); border-radius:12px; }
        .category-btn { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid #ddd; background:white; font-size:13px; }
        .category-btn.active { background:#2E7D32; color:white; border-color:#2E7D32; }
        .bottom-bar { position:fixed; bottom:20px; left:20px; right:20px; z-index:1000; display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:bold; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-secondary { background:white; color:#2E7D32; }
        .panel { position:fixed; top:0; left:0; right:0; bottom:0; background:white; z-index:2000; transform:translateY(100%); transition:transform 0.3s; overflow-y:auto; display:flex; flex-direction:column; }
        .panel.active { transform:translateY(0); }
        .panel-header { padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
        .panel-body { flex:1; padding:16px; }
        .reserve-btn { background:#1565C0; color:white; border:none; padding:10px 20px; border-radius:20px; width:100%; margin-top:12px; }
        .time-slot { display:inline-block; padding:6px 12px; margin:4px; border:1px solid #ccc; border-radius:20px; cursor:pointer; }
        .time-slot.full { background:#eee; color:#999; }
        .time-slot.selected { background:#2E7D32; color:white; }
    </style>
</head>
<body>
<div id="map"></div>

<!-- 条件设置栏 -->
<div class="condition-bar" id="conditionBar">
    <input type="date" id="trip-date" style="width:110px;">
    <select id="trip-duration">
        <option value="4">半天</option><option value="8" selected>全天</option><option value="16">两天</option>
    </select>
    <input type="number" id="trip-people" placeholder="人数" min="1" value="2" style="width:50px;">
    <select id="trip-mode">
        <option value="auto">🚗自驾</option><option value="bus">🚌公交</option>
    </select>
    <button class="reserve-quick" onclick="openQuickReserve()">📋 研学预约</button>
</div>

<!-- 右上 -->
<div class="top-bar">
    <select id="langSelect" class="top-btn"><option value="cn">中文</option><option value="en">EN</option><option value="ja">日本語</option><option value="ko">한국어</option></select>
    <button class="top-btn" onclick="openPanel('myPanel')">👤 我的</button>
</div>

<!-- 分类筛选 -->
<div class="category-bar" id="categoryBar">
    <button class="category-btn active" onclick="filterPOI('全部')">📍全部</button>
    <button class="category-btn" onclick="filterPOI('自然景区')">🏞️自然</button>
    <button class="category-btn" onclick="filterPOI('红色景区')">🏛️红色</button>
    <button class="category-btn" onclick="filterPOI('餐饮住宿')">🍽️食宿</button>
    <button class="category-btn" onclick="filterPOI('停车场')">🅿️停车</button>
    <button class="category-btn" onclick="filterPOI('公共服务')">ℹ️服务</button>
</div>

<div class="float-voice" id="voiceBtn" onclick="toggleVoice()">🔊</div>
<div class="bottom-bar">
    <button class="btn btn-primary" onclick="generateTripFromConditions()">📍 生成行程</button>
    <button class="btn btn-secondary" onclick="startSimulation()">🧭 模拟导航</button>
</div>

<!-- 商户详情面板、预约面板、路线面板、我的面板 略，同之前代码 -->
<!-- 预约面板中使用 openQuickReserve 直接打开所有红色场馆列表让用户选择 -->

<script>
// ... 原有初始化、加载POI、语音、路线等函数 ...
function openQuickReserve(){
    // 列出所有 allow_reserve=true 的商户
    sb.from('ztj_merchants').select('*').eq('allow_reserve', true).then(({data})=>{
        if(!data.length) { alert('暂无红色场馆'); return; }
        let html = '<h4>选择场馆</h4>';
        data.forEach(m => {
            html += `<div class="card" onclick="openReservePanel('${m.id}')">${m.display_name}</div>`;
        });
        const panel = document.createElement('div'); panel.className='panel active'; panel.id='quickReservePanel';
        panel.innerHTML = `<div class="panel-header"><h2>快速预约</h2><button onclick="this.parentElement.parentElement.remove()">✕</button></div><div class="panel-body">${html}</div>`;
        document.body.appendChild(panel);
    });
}
function generateTripFromConditions(){
    const date = document.getElementById('trip-date').value;
    const duration = parseInt(document.getElementById('trip-duration').value);
    const people = parseInt(document.getElementById('trip-people').value);
    const mode = document.getElementById('trip-mode').value;
    // 简单逻辑：选择当前分类下POI生成路线
    // 实际可调用算法，此处示例
    alert(`条件：日期${date||'不限'}，时长${duration}h，人数${people}，${mode}。即将生成最优路线...`);
}
</script>
</body>
</html>
