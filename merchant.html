<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f5f5f5; margin:0; }
        .header { background:#1B5E20; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .container { max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab button { padding:10px 16px; border:none; background:#e0e0e0; border-radius:4px; cursor:pointer; }
        .tab button.active { background:#2E7D32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin:2px; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-danger { background:#B71C1C; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; background:#fafafa; }
        .hidden { display:none; }
        .item-row { display:flex; gap:8px; align-items:center; margin:4px 0; flex-wrap:wrap; }
        .upload-preview { width:120px; height:90px; object-fit:cover; border:1px solid #ccc; border-radius:4px; margin-top:4px; }
        .time-slot-item { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .status-pending { color:#E65100; font-weight:bold; }
        .status-confirmed { color:#2E7D32; font-weight:bold; }
        .reservation-card { background:white; border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>商户登录</h2>
    <div class="form-group"><input id="account" placeholder="邮箱 (如 st001@st.cn)"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>

<div id="main" class="hidden">
    <div class="header"><span id="merchant-name"></span><button class="btn btn-default" onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab" id="main-tabs">
            <button class="active" onclick="switchTab('info')">🏪 基本信息</button>
            <button onclick="switchTab('business')">📦 业务管理</button>
            <button onclick="switchTab('reserve-settings')" class="reserve-tab hidden">⚙️ 预约设置</button>
            <button onclick="switchTab('activities')" class="reserve-tab hidden">📋 活动模板</button>
            <button onclick="switchTab('reservations')">📅 预约列表</button>
            <button onclick="switchTab('feedbacks')">💬 留言</button>
        </div>

        <!-- 基本信息 -->
        <div id="tab-info">
            <div class="form-group"><label>业务类型</label><select id="business_type" onchange="onBusinessTypeChange()">
                <option value="scenic">景区</option><option value="museum">文博场馆</option><option value="hotel">住宿</option><option value="restaurant">餐饮</option><option value="shop">购物</option><option value="entertainment">娱乐</option><option value="transport">交通</option><option value="other">其他</option>
            </select></div>
            <div class="form-group"><label>营业状态</label><select id="status"><option value="open">营业中</option><option value="closed">休息</option><option value="busy">繁忙</option></select></div>
            <div class="form-group"><label>电话</label><input id="phone"></div>
            <div class="form-group"><label>地址</label><input id="address"></div>
            <div class="form-group"><label>停车位</label><input type="number" id="parking" min="0"></div>
            <div class="form-group"><label>简介</label><textarea id="intro"></textarea></div>
            <button class="btn btn-primary" onclick="saveInfo()">保存</button>
        </div>

        <!-- 业务管理 -->
        <div id="tab-business" class="hidden">
            <div id="business-container"></div>
            <button class="btn btn-primary" onclick="addBusinessItem()" style="margin-top:10px;">+ 添加项目</button>
            <button class="btn btn-primary" onclick="saveBusinessData()" style="margin-top:10px;">保存业务数据</button>
        </div>

        <!-- 预约设置 -->
        <div id="tab-reserve-settings" class="hidden">
            <h3>每日总团队上限</h3><input type="number" id="day-limit" min="1" value="10">
            <h3>每团最大人数</h3><input type="number" id="team-max" min="1" value="50">
            <h3>可预约时段</h3><div id="time-slots"></div>
            <button onclick="addTimeSlot()">+ 时段</button>
            <button class="btn btn-primary" onclick="saveReserveSettings()">保存</button>
        </div>

        <!-- 活动模板 -->
        <div id="tab-activities" class="hidden">
            <div id="activity-list"></div>
            <button class="btn btn-primary" onclick="addActivity()">+ 活动</button>
        </div>

        <!-- 预约列表 -->
        <div id="tab-reservations" class="hidden">
            <div id="reservation-list"></div>
        </div>

        <!-- 留言 -->
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let merchant = null;
let timeSlots = [];
let businessItems = []; // 业务项目数组

// ---------- 会话检查（修复刷新退出） ----------
async function checkSession(){
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        const { data: m } = await sb.from('ztj_merchants').select('*').eq('id', session.user.id).single();
        if (m) {
            merchant = m;
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            document.getElementById('merchant-name').innerText = m.display_name;
            loadInfo();
            showReserveTabsIfAllowed();
            switchTab('info');
        } else {
            await sb.auth.signOut();
            showLogin();
        }
    } else {
        showLogin();
    }
}
sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') checkSession();
    else if (event === 'SIGNED_OUT') showLogin();
});
function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); }

async function login(){
    const email = document.getElementById('account').value.trim();
    const pwd = document.getElementById('password').value;
    if (!email || !pwd) { document.getElementById('login-msg').innerText = '请输入邮箱和密码'; return; }
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { document.getElementById('login-msg').innerText = '登录失败：' + error.message; return; }
    // 登录成功后 onAuthStateChange 会自动触发 checkSession
}
async function logout(){ await sb.auth.signOut(); showLogin(); }

function switchTab(tab){
    document.querySelectorAll('#main-tabs button').forEach(b => b.classList.remove('active'));
    const idx = ['info','business','reserve-settings','activities','reservations','feedbacks'].indexOf(tab);
    if (idx >= 0) document.querySelectorAll('#main-tabs button')[idx].classList.add('active');
    ['info','business','reserve-settings','activities','reservations','feedbacks'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if (tab === 'business') loadBusinessTab();
    if (tab === 'reserve-settings') loadReserveSettings();
    if (tab === 'activities') loadActivities();
    if (tab === 'reservations') loadReservations();
    if (tab === 'feedbacks') loadMerchantFeedbacks();
}

function showReserveTabsIfAllowed(){
    const tabs = document.querySelectorAll('.reserve-tab');
    if (merchant && merchant.allow_reserve) {
        tabs.forEach(t => t.classList.remove('hidden'));
    } else {
        tabs.forEach(t => t.classList.add('hidden'));
    }
}

function loadInfo(){
    document.getElementById('status').value = merchant.status || 'open';
    document.getElementById('phone').value = merchant.phone || '';
    document.getElementById('address').value = merchant.address || '';
    document.getElementById('parking').value = merchant.parking_spots || 0;
    document.getElementById('intro').value = merchant.intro || '';
    document.getElementById('business_type').value = merchant.business_type || 'other';
}

async function saveInfo(){
    const updates = {
        status: document.getElementById('status').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        parking_spots: parseInt(document.getElementById('parking').value) || 0,
        intro: document.getElementById('intro').value,
        business_type: document.getElementById('business_type').value
    };
    const { error } = await sb.from('ztj_merchants').update(updates).eq('id', merchant.id);
    if (error) alert('保存失败：'+error.message);
    else alert('基本信息已保存');
}

function onBusinessTypeChange(){
    merchant.business_type = document.getElementById('business_type').value;
    sb.from('ztj_merchants').update({ business_type: merchant.business_type }).eq('id', merchant.id);
}

// ========== 业务管理 ==========
function getBusinessFields(type) {
    // 返回字段模板 { label, key, type }
    const common = [
        { label: '名称', key: 'name', type: 'text' },
        { label: '价格 (¥)', key: 'price', type: 'number' },
        { label: '时限/时长', key: 'duration', type: 'text' },
        { label: '描述', key: 'description', type: 'textarea' },
        { label: '图片', key: 'image', type: 'image' }
    ];
    switch(type) {
        case 'hotel': return [{ label: '房型名称', key: 'name', type: 'text' }, ...common.slice(1)];
        case 'restaurant': return [{ label: '菜品名称', key: 'name', type: 'text' }, ...common.slice(1)];
        case 'scenic': return [{ label: '项目/门票名称', key: 'name', type: 'text' }, ...common.slice(1)];
        case 'museum': return [{ label: '项目名称', key: 'name', type: 'text' }, ...common.slice(1)];
        default: return common;
    }
}

function loadBusinessTab(){
    businessItems = (merchant.service_data && merchant.service_data.items) ? merchant.service_data.items : [];
    renderBusinessItems();
}

function renderBusinessItems(){
    const container = document.getElementById('business-container');
    if (!businessItems.length) { container.innerHTML = '<p>暂无项目，请点击下方按钮添加</p>'; return; }
    const fields = getBusinessFields(merchant.business_type);
    let html = '';
    businessItems.forEach((item, idx) => {
        html += '<div class="card" style="margin-bottom:10px;">';
        fields.forEach(f => {
            const val = item[f.key] || '';
            if (f.type === 'textarea') {
                html += `<div class="form-group"><label>${f.label}</label><textarea onchange="updateBusinessItem(${idx}, '${f.key}', this.value)">${val}</textarea></div>`;
            } else if (f.type === 'image') {
                html += `<div class="form-group"><label>${f.label}</label><input type="file" accept="image/*" onchange="handleBusinessImage(${idx}, this)">
                ${val ? `<img src="${val}" class="upload-preview">` : ''}</div>`;
            } else {
                html += `<div class="form-group"><label>${f.label}</label><input type="${f.type}" value="${val}" onchange="updateBusinessItem(${idx}, '${f.key}', this.value)"></div>`;
            }
        });
        html += `<button class="btn btn-danger" onclick="deleteBusinessItem(${idx})">删除此项</button></div>`;
    });
    container.innerHTML = html;
}

function addBusinessItem(){
    businessItems.push({ name: '', price: '', duration: '', description: '', image: '' });
    renderBusinessItems();
}
function updateBusinessItem(idx, key, value){
    businessItems[idx][key] = value;
}
function deleteBusinessItem(idx){
    businessItems.splice(idx, 1);
    renderBusinessItems();
}
async function handleBusinessImage(idx, input){
    const file = input.files[0];
    if (!file) return;
    const path = `merchant-${merchant.id}/business/${Date.now()}.jpg`;
    const { error } = await sb.storage.from('merchant-uploads').upload(path, file);
    if (error) { alert('上传失败：'+error.message); return; }
    const { data: { publicUrl } } = sb.storage.from('merchant-uploads').getPublicUrl(path);
    businessItems[idx].image = publicUrl;
    renderBusinessItems();
}
async function saveBusinessData(){
    await sb.from('ztj_merchants').update({ service_data: { items: businessItems } }).eq('id', merchant.id);
    alert('业务数据已保存');
}

// ========== 预约设置 ==========
async function loadReserveSettings(){
    const { data } = await sb.from('reservation_settings').select('*').eq('merchant_id', merchant.id);
    timeSlots = data || [];
    if (timeSlots.length) {
        document.getElementById('day-limit').value = timeSlots[0].day_total_limit || 10;
        document.getElementById('team-max').value = timeSlots[0].team_max_size || 50;
    }
    renderTimeSlots();
}
function renderTimeSlots(){
    let html = '';
    timeSlots.forEach((s, i) => {
        html += `<div class="time-slot-item">
            <input type="time" value="${s.time_slot_start}" onchange="updateSlot(${i},'start',this.value)"> 至
            <input type="time" value="${s.time_slot_end}" onchange="updateSlot(${i},'end',this.value)">
            最多团队 <input type="number" value="${s.max_teams}" style="width:60px" onchange="updateSlot(${i},'max_teams',this.value)">
            <button class="btn btn-danger" onclick="removeSlot(${i})">删除</button>
        </div>`;
    });
    document.getElementById('time-slots').innerHTML = html || '<p>暂无时段</p>';
}
function addTimeSlot(){ timeSlots.push({time_slot_start:'09:00', time_slot_end:'10:00', max_teams:1}); renderTimeSlots(); }
function updateSlot(idx, field, value){
    if (field === 'start') timeSlots[idx].time_slot_start = value;
    else if (field === 'end') timeSlots[idx].time_slot_end = value;
    else timeSlots[idx].max_teams = parseInt(value) || 1;
}
function removeSlot(idx){ timeSlots.splice(idx,1); renderTimeSlots(); }
async function saveReserveSettings(){
    const dayLimit = parseInt(document.getElementById('day-limit').value) || 10;
    const teamMax = parseInt(document.getElementById('team-max').value) || 50;
    await sb.from('reservation_settings').delete().eq('merchant_id', merchant.id);
    if (timeSlots.length) {
        const data = timeSlots.map(s => ({
            merchant_id: merchant.id,
            time_slot_start: s.time_slot_start,
            time_slot_end: s.time_slot_end,
            max_teams: s.max_teams,
            day_total_limit: dayLimit,
            team_max_size: teamMax
        }));
        await sb.from('reservation_settings').insert(data);
    }
    alert('时段设置已保存');
}

// ========== 活动模板 ==========
async function loadActivities(){
    const { data } = await sb.from('reservation_activities').select('*').eq('merchant_id', merchant.id);
    let html = '';
    data.forEach(a => {
        html += `<div class="card"><b>${a.title}</b> (${a.duration||0}分钟) 地点：${a.location||''}<button class="btn btn-default" onclick="editActivity(${a.id})">编辑</button><button class="btn btn-danger" onclick="deleteActivity(${a.id})">删除</button></div>`;
    });
    document.getElementById('activity-list').innerHTML = html || '<p>暂无活动</p>';
}
async function addActivity(){
    const title = prompt('活动名称'), location = prompt('地点'), duration = prompt('时长(分钟)'), desc = prompt('描述');
    if (!title) return;
    await sb.from('reservation_activities').insert({ merchant_id: merchant.id, title, location, duration: parseInt(duration)||60, description: desc || '' });
    loadActivities();
}
async function deleteActivity(id){ if (confirm('删除？')) { await sb.from('reservation_activities').delete().eq('id',id); loadActivities(); } }

// ========== 预约列表 ==========
async function loadReservations(){
    const { data } = await sb.from('reservations').select('*').eq('merchant_id', merchant.id).order('created_at', false);
    let html = '';
    data.forEach(r => {
        html += `<div class="reservation-card">
            <p><span class="status-${r.status}">${r.status==='pending'?'待确认':r.status==='confirmed'?'已确认':'已拒绝'}</span> | ${r.reservation_date} ${r.time_slot_start}-${r.time_slot_end}</p>
            <p>活动：${r.activity_id} | 地点：${r.room||''}</p>
            <p>单位：${r.unit||''} | 人数：${r.visitor_count} | 联系人：${r.name} ${r.phone}</p>
            <p>介绍：${r.remark||''}</p>
            ${r.image ? `<img src="${r.image}" style="max-width:200px; max-height:150px;">` : ''}
            ${r.status==='pending' ? `<button class="btn btn-primary" onclick="updateReservation(${r.id},'confirmed')">确认</button> <button class="btn btn-danger" onclick="updateReservation(${r.id},'rejected')">拒绝</button>` : ''}
        </div>`;
    });
    document.getElementById('reservation-list').innerHTML = html || '<p>暂无预约</p>';
}
async function updateReservation(id, status){ await sb.from('reservations').update({ status }).eq('id', id); loadReservations(); }

// ========== 留言 ==========
async function loadMerchantFeedbacks(){
    const { data } = await sb.from('ztj_feedbacks').select('*').eq('merchant_id', merchant.id).order('created_at', false);
    let html = '';
    data.forEach(f => {
        html += `<div class="card"><p>${f.message}</p><small>${new Date(f.created_at).toLocaleString()}</small><p>${f.reply||'暂未回复'}</p><textarea id="reply-${f.id}" rows="2">${f.reply||''}</textarea><button class="btn btn-primary" onclick="replyFeedback(${f.id})">回复</button></div>`;
    });
    document.getElementById('feedback-list').innerHTML = html || '<p>暂无留言</p>';
}
async function replyFeedback(id){
    const reply = document.getElementById('reply-'+id).value;
    await sb.from('ztj_feedbacks').update({ reply }).eq('id', id);
    loadMerchantFeedbacks();
}

// 初始化
checkSession();
</script>
</body>
</html>
