<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f5f5f5; margin:0; }
        .header { background:#1B5E20; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; }
        .container { max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab button { padding:10px 16px; border:none; background:#e0e0e0; border-radius:4px; cursor:pointer; }
        .tab button.active { background:#2E7D32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin:2px; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-danger { background:#B71C1C; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; background:#fafafa; }
        .hidden { display:none; }
        .item-row { display:flex; gap:8px; align-items:center; margin:4px 0; }
        .upload-preview { width:120px; height:90px; object-fit:cover; border:1px solid #ccc; border-radius:4px; }
        .time-slot-item { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .status-pending { color:#E65100; font-weight:bold; }
        .status-confirmed { color:#2E7D32; font-weight:bold; }
        .status-rejected { color:#B71C1C; font-weight:bold; }
        .feedback-reply { background:#fff; padding:8px; border-left:3px solid #2E7D32; margin:4px 0; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>商户登录</h2>
    <div class="form-group"><input id="account" placeholder="账号 (如 st001)"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>

<div id="main" class="hidden">
    <div class="header"><span id="merchant-name"></span><button class="btn btn-default" onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab" id="main-tabs">
            <button class="active" onclick="switchTab('info')">🏪 基本信息</button>
            <button onclick="switchTab('business')">📦 业务管理</button>
            <button onclick="switchTab('reserve-settings')" class="reserve-tab hidden">⚙️ 预约设置</button>
            <button onclick="switchTab('activities')" class="reserve-tab hidden">📋 活动模板</button>
            <button onclick="switchTab('reservations')">📅 预约列表</button>
            <button onclick="switchTab('feedbacks')">💬 留言</button>
        </div>

        <!-- 基本信息 -->
        <div id="tab-info">
            <div class="form-group"><label>业务类型</label><select id="business_type" onchange="onBusinessTypeChange()">
                <option value="scenic">景区</option><option value="museum">文博场馆</option><option value="hotel">住宿</option><option value="restaurant">餐饮</option><option value="shop">购物</option><option value="entertainment">娱乐</option><option value="transport">交通</option><option value="other">其他</option>
            </select></div>
            <div class="form-group"><label>营业状态</label><select id="status"><option value="open">营业中</option><option value="closed">休息</option><option value="busy">繁忙</option></select></div>
            <div class="form-group"><label>联系电话</label><input id="phone"></div>
            <div class="form-group"><label>地址</label><input id="address"></div>
            <div class="form-group"><label>停车场余位</label><input type="number" id="parking" min="0"></div>
            <div class="form-group"><label>简介</label><textarea id="intro" rows="3"></textarea></div>
            <button class="btn btn-primary" onclick="saveInfo()">保存基本信息</button>
        </div>

        <!-- 业务管理（根据类型动态显示） -->
        <div id="tab-business" class="hidden">
            <div id="business-hotel" class="hidden">
                <h3>🏨 房型管理</h3>
                <div id="room-list"></div>
                <button class="btn btn-primary" onclick="addRoom()">+ 添加房型</button>
            </div>
            <div id="business-restaurant" class="hidden">
                <h3>🍽️ 菜品管理</h3>
                <div id="menu-list"></div>
                <button class="btn btn-primary" onclick="addMenuItem()">+ 添加菜品</button>
            </div>
            <div id="business-other" class="hidden">
                <p>当前业务类型无需额外业务管理，请在基本信息中完善描述。</p>
            </div>
        </div>

        <!-- 预约设置 -->
        <div id="tab-reserve-settings" class="hidden">
            <h3>每日总团队上限</h3><input type="number" id="day-limit" min="1" value="10">
            <h3>每团最大人数</h3><input type="number" id="team-max" min="1" value="50">
            <h3>可预约时段（整点开始，时长1小时）</h3>
            <div id="time-slots"></div>
            <button class="btn btn-default" onclick="addTimeSlot()">+ 添加时段</button>
            <button class="btn btn-primary" onclick="saveReserveSettings()">保存时段设置</button>
        </div>

        <!-- 活动模板 -->
        <div id="tab-activities" class="hidden">
            <div id="activity-list"></div>
            <button class="btn btn-primary" onclick="addActivity()">+ 新增活动</button>
            <div id="activity-edit-form" class="hidden card"></div>
        </div>

        <!-- 预约列表 -->
        <div id="tab-reservations" class="hidden">
            <div id="reservation-list"></div>
        </div>

        <!-- 留言反馈 -->
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let merchant = null;
let timeSlots = [];
let serviceData = {}; // 存储业务数据：房型/菜品

async function login(){
    const account = document.getElementById('account').value.trim();
    const pwd = document.getElementById('password').value;
    const email = account.includes('@') ? account : account + '@zhiyoutongjiang.cn';
    const { data, error } = await sb.auth.signInWithPassword({email, password:pwd});
    if(error){ document.getElementById('login-msg').innerText = '登录失败：'+error.message; return; }
    const userId = data.session.user.id;
    const { data: m } = await sb.from('ztj_merchants').select('*').eq('id', userId).single();
    if(!m){ alert('非商户账号'); await sb.auth.signOut(); return; }
    merchant = m;
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('merchant-name').innerText = m.display_name;
    loadInfo();
    showReserveTabsIfAllowed();
    switchTab('info');
}

function logout(){ sb.auth.signOut(); merchant = null; document.getElementById('main').classList.add('hidden'); document.getElementById('login-page').classList.remove('hidden'); }

function switchTab(tab){
    const allTabs = ['info','business','reserve-settings','activities','reservations','feedbacks'];
    document.querySelectorAll('#main-tabs button').forEach(b => b.classList.remove('active'));
    // 激活对应按钮，注意按钮可能隐藏
    const tabButtons = document.querySelectorAll('#main-tabs button');
    tabButtons.forEach(btn => {
        if(btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${tab}'`)) btn.classList.add('active');
    });
    allTabs.forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if(tab==='business') loadBusinessModule();
    if(tab==='reserve-settings') loadReserveSettings();
    if(tab==='activities') loadActivities();
    if(tab==='reservations') loadReservations();
    if(tab==='feedbacks') loadMerchantFeedbacks();
}

function showReserveTabsIfAllowed(){
    const reserveTabs = document.querySelectorAll('.reserve-tab');
    if(merchant.allow_reserve){
        reserveTabs.forEach(tab => tab.classList.remove('hidden'));
    } else {
        reserveTabs.forEach(tab => tab.classList.add('hidden'));
    }
}

function loadInfo(){
    document.getElementById('status').value = merchant.status||'open';
    document.getElementById('phone').value = merchant.phone||'';
    document.getElementById('address').value = merchant.address||'';
    document.getElementById('parking').value = merchant.parking_spots||0;
    document.getElementById('intro').value = merchant.intro||'';
    document.getElementById('business_type').value = merchant.business_type||'other';
    if(merchant.service_data) serviceData = merchant.service_data;
    else serviceData = { rooms: [], menus: [] };
}

function onBusinessTypeChange(){
    // 切换业务类型时自动保存
    const type = document.getElementById('business_type').value;
    merchant.business_type = type;
    sb.from('ztj_merchants').update({ business_type: type }).eq('id', merchant.id);
    loadBusinessModule();
}

async function saveInfo(){
    const updates = {
        status: document.getElementById('status').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        parking_spots: parseInt(document.getElementById('parking').value)||0,
        intro: document.getElementById('intro').value,
        business_type: document.getElementById('business_type').value
    };
    await sb.from('ztj_merchants').update(updates).eq('id', merchant.id);
    alert('基本信息已保存');
    merchant = {...merchant, ...updates};
}

// ========== 业务管理 ==========
function loadBusinessModule(){
    const type = merchant.business_type || 'other';
    document.getElementById('business-hotel').classList.add('hidden');
    document.getElementById('business-restaurant').classList.add('hidden');
    document.getElementById('business-other').classList.add('hidden');
    if(type==='hotel'){
        document.getElementById('business-hotel').classList.remove('hidden');
        renderRooms();
    } else if(type==='restaurant'){
        document.getElementById('business-restaurant').classList.remove('hidden');
        renderMenus();
    } else {
        document.getElementById('business-other').classList.remove('hidden');
    }
}

function renderRooms(){
    const rooms = serviceData.rooms || [];
    let html = '';
    rooms.forEach((room, idx) => {
        html += `<div class="card item-row">
            <input value="${room.name||''}" placeholder="房型名称" onchange="updateRoom(${idx},'name',this.value)">
            <input type="number" value="${room.price||0}" placeholder="价格" onchange="updateRoom(${idx},'price',parseFloat(this.value))">
            <input type="number" value="${room.stock||0}" placeholder="余量" onchange="updateRoom(${idx},'stock',parseInt(this.value))">
            <input type="file" accept="image/*" onchange="uploadRoomImage(${idx}, this)">
            ${room.image ? `<img src="${room.image}" class="upload-preview">` : ''}
            <button class="btn btn-danger" onclick="deleteRoom(${idx})">删除</button>
        </div>`;
    });
    document.getElementById('room-list').innerHTML = html || '<p>暂无房型</p>';
}

function addRoom(){ serviceData.rooms.push({name:'', price:0, stock:0, image:''}); renderRooms(); }
function updateRoom(idx, field, value){ serviceData.rooms[idx][field] = value; }
function deleteRoom(idx){ serviceData.rooms.splice(idx,1); renderRooms(); }
async function uploadRoomImage(idx, input){
    const file = input.files[0]; if(!file) return;
    const path = `${merchant.account_id}/rooms/${Date.now()}.jpg`;
    const { error } = await sb.storage.from('merchant-uploads').upload(path, file);
    if(error){ alert('上传失败'); return; }
    const { data: { publicUrl } } = sb.storage.from('merchant-uploads').getPublicUrl(path);
    serviceData.rooms[idx].image = publicUrl;
    renderRooms();
}

// 菜品管理类似，略...
// 为节省篇幅，可复制房间逻辑修改为菜单字段，字段：name, price, stock, image
function renderMenus(){
    const menus = serviceData.menus || [];
    let html = '';
    menus.forEach((item, idx) => {
        html += `<div class="card item-row">
            <input value="${item.name||''}" placeholder="菜品名称" onchange="updateMenu(${idx},'name',this.value)">
            <input type="number" value="${item.price||0}" placeholder="价格" onchange="updateMenu(${idx},'price',parseFloat(this.value))">
            <input type="number" value="${item.stock||0}" placeholder="余量/份" onchange="updateMenu(${idx},'stock',parseInt(this.value))">
            <input type="file" accept="image/*" onchange="uploadMenuImage(${idx}, this)">
            ${item.image ? `<img src="${item.image}" class="upload-preview">` : ''}
            <button class="btn btn-danger" onclick="deleteMenu(${idx})">删除</button>
        </div>`;
    });
    document.getElementById('menu-list').innerHTML = html || '<p>暂无菜品</p>';
}
function addMenuItem(){ if(!serviceData.menus) serviceData.menus=[]; serviceData.menus.push({name:'', price:0, stock:0, image:''}); renderMenus(); }
function updateMenu(idx, field, value){ serviceData.menus[idx][field] = value; }
function deleteMenu(idx){ serviceData.menus.splice(idx,1); renderMenus(); }
async function uploadMenuImage(idx, input){
    const file = input.files[0]; if(!file) return;
    const path = `${merchant.account_id}/menus/${Date.now()}.jpg`;
    const { error } = await sb.storage.from('merchant-uploads').upload(path, file);
    if(error){ alert('上传失败'); return; }
    const { data: { publicUrl } } = sb.storage.from('merchant-uploads').getPublicUrl(path);
    serviceData.menus[idx].image = publicUrl;
    renderMenus();
}

// 保存业务数据到 merchants 表的 service_data 字段
async function saveBusinessData(){
    await sb.from('ztj_merchants').update({ service_data: serviceData }).eq('id', merchant.id);
}

// 在退出或定时保存？简单起见，增加一个保存按钮
// 可在业务管理区加一个“保存业务数据”按钮，或自动保存
// 此处通过页面离开前提示，但简单实现：在业务数据修改后手动调用 saveBusinessData
// 为避免丢失，在 add/update/delete 函数最后调用 saveBusinessData
function autoSaveBusiness(){
    sb.from('ztj_merchants').update({ service_data: serviceData }).eq('id', merchant.id);
}
// 在修改时调用 autoSaveBusiness
const origRenderRooms = renderRooms;
renderRooms = function(){ origRenderRooms(); autoSaveBusiness(); };
const origRenderMenus = renderMenus;
renderMenus = function(){ origRenderMenus(); autoSaveBusiness(); };

// ========== 预约设置 ==========
async function loadReserveSettings(){
    const { data } = await sb.from('reservation_settings').select('*').eq('merchant_id', merchant.id);
    timeSlots = data || [];
    if(timeSlots.length){
        document.getElementById('day-limit').value = timeSlots[0].day_total_limit || 10;
        document.getElementById('team-max').value = timeSlots[0].team_max_size || 50;
    }
    renderTimeSlots();
}
function renderTimeSlots(){
    let html = '';
    timeSlots.forEach((s,i) => {
        html += `<div class="time-slot-item">
            <input type="time" value="${s.time_slot_start}" onchange="updateSlot(${i},'start',this.value)"> 至 
            <input type="time" value="${s.time_slot_end}" onchange="updateSlot(${i},'end',this.value)"> 
            最多团队 <input type="number" value="${s.max_teams}" style="width:60px" onchange="updateSlot(${i},'max_teams',this.value)">
            <button class="btn btn-danger" onclick="removeSlot(${i})">删除</button>
        </div>`;
    });
    document.getElementById('time-slots').innerHTML = html || '<p>暂无时段</p>';
}
function addTimeSlot(){ timeSlots.push({time_slot_start:'09:00', time_slot_end:'10:00', max_teams:1}); renderTimeSlots(); }
function updateSlot(idx, field, value){
    if(field==='start') timeSlots[idx].time_slot_start = value;
    else if(field==='end') timeSlots[idx].time_slot_end = value;
    else timeSlots[idx].max_teams = parseInt(value)||1;
}
function removeSlot(idx){ timeSlots.splice(idx,1); renderTimeSlots(); }
async function saveReserveSettings(){
    const dayLimit = parseInt(document.getElementById('day-limit').value)||10;
    const teamMax = parseInt(document.getElementById('team-max').value)||50;
    await sb.from('reservation_settings').delete().eq('merchant_id', merchant.id);
    if(timeSlots.length){
        const data = timeSlots.map(s => ({
            merchant_id: merchant.id,
            time_slot_start: s.time_slot_start,
            time_slot_end: s.time_slot_end,
            max_teams: s.max_teams,
            day_total_limit: dayLimit,
            team_max_size: teamMax
        }));
        await sb.from('reservation_settings').insert(data);
    }
    alert('时段设置已保存');
}

// ========== 活动模板 ==========
async function loadActivities(){
    const { data } = await sb.from('reservation_activities').select('*').eq('merchant_id', merchant.id);
    let html = '';
    data.forEach(a => {
        html += `<div class="card">
            <b>${a.title}</b> (${a.duration||0}分钟) 地点：${a.location||''}
            <button class="btn btn-default" onclick="editActivity(${a.id})">编辑</button>
            <button class="btn btn-danger" onclick="deleteActivity(${a.id})">删除</button>
        </div>`;
    });
    document.getElementById('activity-list').innerHTML = html || '<p>暂无活动</p>';
}
async function addActivity(){
    document.getElementById('activity-edit-form').classList.remove('hidden');
    document.getElementById('activity-edit-form').innerHTML = `
        <div class="form-group"><label>活动名称</label><input id="act-name"></div>
        <div class="form-group"><label>时长(分钟)</label><input type="number" id="act-duration" value="60"></div>
        <div class="form-group"><label>地点</label><input id="act-location" placeholder="如：多媒体室、会议室"></div>
        <div class="form-group"><label>描述</label><textarea id="act-desc"></textarea></div>
        <button class="btn btn-primary" onclick="saveActivity()">保存</button>
        <button class="btn btn-default" onclick="document.getElementById('activity-edit-form').classList.add('hidden')">取消</button>
    `;
}
async function saveActivity(){
    const title = document.getElementById('act-name').value;
    const duration = parseInt(document.getElementById('act-duration').value)||60;
    const location = document.getElementById('act-location').value;
    const desc = document.getElementById('act-desc').value;
    if(!title) return;
    await sb.from('reservation_activities').insert({ merchant_id: merchant.id, title, duration, location, description: desc });
    document.getElementById('activity-edit-form').classList.add('hidden');
    loadActivities();
}
async function editActivity(id){ /* 简化：直接删除再添加，或弹窗编辑 */ }
async function deleteActivity(id){
    if(confirm('删除活动？')){ await sb.from('reservation_activities').delete().eq('id',id); loadActivities(); }
}

// ========== 预约列表 ==========
async function loadReservations(){
    const { data } = await sb.from('reservations').select('*').eq('merchant_id', merchant.id).order('created_at',false);
    let html = '';
    data.forEach(r => {
        html += `<div class="card">
            <p><span class="status-${r.status}">${r.status==='pending'?'待确认':r.status==='confirmed'?'已确认':'已拒绝'}</span> | ${r.reservation_date} ${r.time_slot_start}-${r.time_slot_end}</p>
            <p>${r.name} ${r.phone} | 人数：${r.visitor_count} | 单位：${r.unit||''}</p>
            <p>活动：${r.activity_id} | 备注：${r.remark||''}</p>
            ${r.status==='pending' ? `<button class="btn btn-primary" onclick="updateReservation(${r.id},'confirmed')">确认</button> <button class="btn btn-danger" onclick="updateReservation(${r.id},'rejected')">拒绝</button>` : ''}
        </div>`;
    });
    document.getElementById('reservation-list').innerHTML = html || '<p>暂无预约</p>';
}
async function updateReservation(id, status){
    await sb.from('reservations').update({ status }).eq('id', id);
    loadReservations();
}

// ========== 留言反馈 ==========
async function loadMerchantFeedbacks(){
    const { data } = await sb.from('ztj_feedbacks').select('*').eq('merchant_id', merchant.id).order('created_at', false);
    let html = '';
    if(data && data.length){
        data.forEach(f => {
            html += `<div class="card">
                <p><b>留言：</b>${f.message}</p>
                <p style="font-size:12px;">${new Date(f.created_at).toLocaleString()}</p>
                <p><b>回复：</b>${f.reply||'<span style="color:#999;">暂未回复</span>'}</p>
                <textarea id="reply-${f.id}" rows="2" placeholder="输入回复">${f.reply||''}</textarea>
                <button class="btn btn-primary" onclick="replyToFeedback(${f.id})">回复</button>
            </div>`;
        });
    } else {
        html = '<p>暂无留言</p>';
    }
    document.getElementById('feedback-list').innerHTML = html;
}
async function replyToFeedback(id){
    const reply = document.getElementById('reply-'+id).value;
    await sb.from('ztj_feedbacks').update({ reply }).eq('id', id);
    alert('回复已保存');
    loadMerchantFeedbacks();
}

// 辅助：保存业务数据时自动触发
// 自动保存已在业务数据渲染函数中调用
</script>
</body>
</html>
