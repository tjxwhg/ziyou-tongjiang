<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理 - 通江文旅</title>
    <style>
        body { font-family: system-ui; background:#f5f5f5; margin:0; }
        .header { background:#1B5E20; color:white; padding:12px; display:flex; justify-content:space-between; }
        .container { max-width:800px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; }
        .tab button { padding:10px; border:none; background:#e0e0e0; }
        .tab button.active { background:#2E7D32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-danger { background:#B71C1C; color:white; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>商户登录</h2>
    <div class="form-group"><input id="account" placeholder="账号 (如 st001)"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>
<div id="main" class="hidden">
    <div class="header"><span id="merchant-name"></span><button onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('info')">🏪 基本信息</button>
            <button onclick="switchTab('reserve-settings')">⚙️ 预约设置</button>
            <button onclick="switchTab('activities')">📋 活动模板</button>
            <button onclick="switchTab('reservations')">📅 预约列表</button>
        </div>
        <div id="tab-info">
            <div class="form-group"><label>营业状态</label><select id="status"><option value="open">营业中</option><option value="closed">休息</option><option value="busy">繁忙</option></select></div>
            <div class="form-group"><label>联系电话</label><input id="phone"></div>
            <div class="form-group"><label>地址</label><input id="address"></div>
            <div class="form-group"><label>停车场余位</label><input type="number" id="parking" min="0"></div>
            <div class="form-group"><label>简介</label><textarea id="intro" rows="3"></textarea></div>
            <button class="btn btn-primary" onclick="saveInfo()">保存</button>
        </div>
        <div id="tab-reserve-settings" class="hidden">
            <h3>每日总团队上限</h3><input type="number" id="day-limit" min="1">
            <h3>每团最大人数</h3><input type="number" id="team-max" min="1">
            <h3>可预约时段</h3><div id="time-slots"></div>
            <button onclick="addTimeSlot()">+ 添加时段</button>
            <button class="btn btn-primary" onclick="saveReserveSettings()">保存时段设置</button>
        </div>
        <div id="tab-activities" class="hidden">
            <div id="activity-list"></div>
            <button class="btn btn-primary" onclick="addActivity()">+ 新增活动</button>
        </div>
        <div id="tab-reservations" class="hidden">
            <div id="reservation-list"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let merchant = null;
let timeSlots = [];   // 临时存储时段数据

async function login(){
    const account = document.getElementById('account').value.trim();
    const pwd = document.getElementById('password').value;
    const email = account.includes('@') ? account : account + '@zhiyoutongjiang.cn';
    const { error } = await sb.auth.signInWithPassword({email, password:pwd});
    if(error){ document.getElementById('login-msg').innerText = '登录失败：'+error.message; return; }
    const { data: m } = await sb.from('ztj_merchants').select('*').eq('id', sb.auth.session().user.id).single();
    if(!m){ alert('非商户账号'); await sb.auth.signOut(); return; }
    merchant = m;
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('merchant-name').innerText = m.display_name;
    loadInfo();
    switchTab('info');
}
function logout(){ sb.auth.signOut(); merchant = null; document.getElementById('main').classList.add('hidden'); document.getElementById('login-page').classList.remove('hidden'); }
function switchTab(tab){
    document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    ['info','reserve-settings','activities','reservations'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if(tab==='reserve-settings') loadReserveSettings();
    if(tab==='activities') loadActivities();
    if(tab==='reservations') loadReservations();
}
function loadInfo(){
    document.getElementById('status').value = merchant.status||'open';
    document.getElementById('phone').value = merchant.phone||'';
    document.getElementById('address').value = merchant.address||'';
    document.getElementById('parking').value = merchant.parking_spots||0;
    document.getElementById('intro').value = merchant.intro||'';
}
async function saveInfo(){
    const updates = {
        status: document.getElementById('status').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        parking_spots: parseInt(document.getElementById('parking').value)||0,
        intro: document.getElementById('intro').value
    };
    await sb.from('ztj_merchants').update(updates).eq('id', merchant.id);
    alert('保存成功');
}
// --- 预约设置 ---
async function loadReserveSettings(){
    const { data: settings } = await sb.from('reservation_settings').select('*').eq('merchant_id', merchant.id);
    timeSlots = settings || [];
    if(timeSlots.length) document.getElementById('day-limit').value = timeSlots[0].day_total_limit || 10;
    if(timeSlots.length) document.getElementById('team-max').value = timeSlots[0].team_max_size || 50;
    renderTimeSlots();
}
function renderTimeSlots(){
    let html = '';
    timeSlots.forEach((s,i) => {
        html += `<div class="card"><input type="time" value="${s.time_slot_start}" onchange="updateSlot(${i},'start',this.value)"> - <input type="time" value="${s.time_slot_end}" onchange="updateSlot(${i},'end',this.value)"> 最多团队 <input type="number" value="${s.max_teams}" style="width:60px" onchange="updateSlot(${i},'max_teams',this.value)"> <button class="btn-danger" onclick="removeSlot(${i})">删除</button></div>`;
    });
    document.getElementById('time-slots').innerHTML = html || '<p>暂无时段</p>';
}
function addTimeSlot(){ timeSlots.push({time_slot_start:'09:00', time_slot_end:'10:30', max_teams:1}); renderTimeSlots(); }
function updateSlot(idx, field, value){ timeSlots[idx][field==='start'?'time_slot_start':field==='end'?'time_slot_end':'max_teams'] = field==='max_teams'?parseInt(value):value; }
function removeSlot(idx){ timeSlots.splice(idx,1); renderTimeSlots(); }
async function saveReserveSettings(){
    const dayLimit = parseInt(document.getElementById('day-limit').value)||10;
    const teamMax = parseInt(document.getElementById('team-max').value)||50;
    await sb.from('reservation_settings').delete().eq('merchant_id', merchant.id);
    if(timeSlots.length){
        const data = timeSlots.map(s => ({ merchant_id:merchant.id, time_slot_start:s.time_slot_start, time_slot_end:s.time_slot_end, max_teams:s.max_teams, day_total_limit:dayLimit, team_max_size:teamMax }));
        await sb.from('reservation_settings').insert(data);
    }
    alert('预约时段已保存');
}
// --- 活动模板 ---
async function loadActivities(){
    const { data } = await sb.from('reservation_activities').select('*').eq('merchant_id', merchant.id);
    document.getElementById('activity-list').innerHTML = data.map(a => `<div class="card"><b>${a.title}</b> (${a.duration||0}分钟) <button class="btn-danger" onclick="deleteActivity(${a.id})">删除</button></div>`).join('');
}
async function addActivity(){
    const title = prompt('活动名称'), duration = prompt('时长(分钟)'), desc = prompt('描述');
    if(!title) return;
    await sb.from('reservation_activities').insert({merchant_id:merchant.id, title, duration:parseInt(duration)||60, description:desc||''});
    loadActivities();
}
async function deleteActivity(id){ if(confirm('删除？')){ await sb.from('reservation_activities').delete().eq('id',id); loadActivities(); } }
// --- 预约列表 ---
async function loadReservations(){
    const { data } = await sb.from('reservations').select('*').eq('merchant_id', merchant.id).order('created_at',false);
    let html = '';
    data.forEach(r => {
        html += `<div class="card">
            <span style="font-weight:bold;">${r.reservation_date} ${r.time_slot_start}</span> | ${r.visitor_count}人 | ${r.name} ${r.phone}
            <p>状态：${r.status}</p>
            ${r.status==='pending' ? `<button class="btn-primary" onclick="updateReservation(${r.id},'confirmed')">确认</button> <button class="btn-danger" onclick="updateReservation(${r.id},'rejected')">拒绝</button>` : ''}
        </div>`;
    });
    document.getElementById('reservation-list').innerHTML = html || '<p>暂无预约</p>';
}
async function updateReservation(id, status){
    await sb.from('reservations').update({status}).eq('id',id);
    loadReservations();
}
</script>
</body>
</html>
