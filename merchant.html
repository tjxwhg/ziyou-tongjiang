<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理 - 通江文旅</title>
    <style>
        body { font-family: system-ui, sans-serif; background:#f5f5f5; margin:0; }
        .header { background:#1B5E20; color:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
        .container { max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab button { padding:10px 16px; border:none; background:#e0e0e0; border-radius:4px; cursor:pointer; font-size:14px; }
        .tab button.active { background:#2E7D32; color:white; }
        .form-group { margin:8px 0; }
        label { display:block; margin-bottom:4px; font-weight:500; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:6px 14px; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin:2px; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-danger { background:#B71C1C; color:white; }
        .btn-default { background:#e0e0e0; color:#333; }
        .card { border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px; background:#fafafa; }
        .hidden { display:none; }
        .item-collapse { margin-bottom:6px; }
        .item-header { display:flex; align-items:center; gap:10px; cursor:pointer; font-weight:500; padding:8px; background:#f0f0f0; border-radius:4px; }
        .item-header span { flex:1; }
        .item-detail { padding:10px; border:1px solid #eee; border-radius:4px; margin-top:4px; background:white; }
        .upload-preview { max-width:200px; max-height:150px; margin-top:4px; border-radius:4px; border:1px solid #ddd; }
        .reservation-card { margin-bottom:8px; }
        .time-slot-item { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .activity-manage { margin-top:10px; }
    </style>
</head>
<body>
<div id="login-page" style="max-width:400px; margin:80px auto; background:white; padding:20px; border-radius:8px;">
    <h2>商户登录</h2>
    <div class="form-group"><input id="account" placeholder="邮箱 (如 st001@st.cn)"></div>
    <div class="form-group"><input id="password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-msg"></p>
</div>

<div id="main" class="hidden">
    <div class="header"><span id="merchant-name"></span><button class="btn btn-default" onclick="logout()">退出</button></div>
    <div class="container">
        <div class="tab" id="main-tabs">
            <button class="active" onclick="switchTab('business')">📦 业务管理</button>
            <button onclick="switchTab('reservations')">📅 预约列表</button>
            <button onclick="switchTab('feedbacks')">💬 留言</button>
            <button onclick="switchTab('info')">🏪 基本信息</button>
        </div>

        <!-- 业务管理 -->
        <div id="tab-business">
            <div id="business-list"></div>
            <button class="btn btn-primary" onclick="toggleAddBusinessForm()" style="margin-top:10px;">+ 添加项目</button>
            <div id="add-business-form" class="hidden card" style="margin-top:8px;">
                <h4>新增业务项目</h4>
                <div class="form-group"><label>名称</label><input id="new-biz-name"></div>
                <div class="form-group"><label>价格</label><input type="number" id="new-biz-price" placeholder="数字"></div>
                <div class="form-group"><label>时限/时长</label><input id="new-biz-duration" placeholder="如 24小时"></div>
                <div class="form-group"><label>描述</label><textarea id="new-biz-desc" rows="2"></textarea></div>
                <div class="form-group"><label>图片</label><input type="file" accept="image/*" id="new-biz-image"></div>
                <button class="btn btn-primary" onclick="addBusinessItem()">保存</button>
                <button class="btn btn-default" onclick="toggleAddBusinessForm()">取消</button>
            </div>
        </div>

        <!-- 预约列表（含活动类别管理） -->
        <div id="tab-reservations" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>预约记录</h3>
                <button class="btn btn-default" onclick="toggleCategoryManager()">管理活动类别</button>
            </div>
            <div id="category-manager" class="hidden card" style="margin-bottom:10px;">
                <h4>活动类别</h4>
                <div id="activity-category-list"></div>
                <div class="activity-manage">
                    <input id="new-category-name" placeholder="新类别名称" style="width:70%; display:inline-block;">
                    <button class="btn btn-primary" onclick="addActivityCategory()">添加</button>
                </div>
            </div>
            <div id="reservation-list"></div>
            <button class="btn btn-primary" onclick="toggleAddReservationForm()" style="margin-top:10px;">+ 新增预约</button>
            <div id="add-reservation-form" class="hidden card" style="margin-top:8px;">
                <h4>新增预约</h4>
                <div class="form-group"><label>预约日期</label><input type="date" id="new-res-date"></div>
                <div class="form-group"><label>时段</label><select id="new-res-time">
                    <option value="08:00-09:00">08:00-09:00</option><option value="09:00-10:00">09:00-10:00</option><option value="10:00-11:00">10:00-11:00</option><option value="11:00-12:00">11:00-12:00</option><option value="13:00-14:00">13:00-14:00</option><option value="14:00-15:00">14:00-15:00</option><option value="15:00-16:00">15:00-16:00</option><option value="16:00-17:00">16:00-17:00</option>
                </select></div>
                <div class="form-group"><label>单位（团队）名称</label><input id="new-res-unit"></div>
                <div class="form-group"><label>联系人</label><input id="new-res-name"></div>
                <div class="form-group"><label>联系人电话</label><input id="new-res-phone"></div>
                <div class="form-group"><label>人数</label><input type="number" id="new-res-count" min="1"></div>
                <div class="form-group"><label>活动类别</label><select id="new-res-activity"></select></div>
                <div class="form-group"><label>地点/场地</label><input id="new-res-room"></div>
                <div class="form-group"><label>备注</label><textarea id="new-res-remark" rows="2"></textarea></div>
                <button class="btn btn-primary" onclick="addReservation()">保存预约</button>
                <button class="btn btn-default" onclick="toggleAddReservationForm()">取消</button>
            </div>
        </div>

        <!-- 留言 -->
        <div id="tab-feedbacks" class="hidden">
            <div id="feedback-list"></div>
        </div>

        <!-- 基本信息 -->
        <div id="tab-info" class="hidden">
            <div class="form-group"><label>业务类型</label><select id="business_type">
                <option value="scenic">景区</option><option value="museum">文博场馆</option><option value="hotel">住宿</option><option value="restaurant">餐饮</option><option value="shop">购物</option><option value="entertainment">娱乐</option><option value="transport">交通</option><option value="other">其他</option>
            </select></div>
            <div class="form-group"><label>营业状态</label><select id="status"><option value="open">营业中</option><option value="closed">休息</option></select></div>
            <div class="form-group"><label>电话</label><input id="phone"></div>
            <div class="form-group"><label>地址</label><input id="address"></div>
            <div class="form-group"><label>停车位</label><input type="number" id="parking" min="0"></div>
            <div class="form-group"><label>简介</label><textarea id="intro"></textarea></div>
            <button class="btn btn-primary" onclick="saveInfo()">保存</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let merchant = null;
let businessItems = [];
let activityCategories = [];

async function checkSession(){
    const { data: { session } } = await sb.auth.getSession();
    if(session){
        const { data: m } = await sb.from('ztj_merchants').select('*').eq('id', session.user.id).single();
        if(m){ merchant = m; showMain(); }
        else { await sb.auth.signOut(); showLogin(); }
    } else showLogin();
}
sb.auth.onAuthStateChange((event, session) => {
    if(event==='SIGNED_IN') checkSession();
    else if(event==='SIGNED_OUT') showLogin();
});
function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main').classList.add('hidden'); }
function showMain(){
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('merchant-name').innerText = merchant.display_name;
    loadActivityCategories();
    switchTab('business');
}
async function login(){
    const email = document.getElementById('account').value.trim();
    const pwd = document.getElementById('password').value;
    if(!email||!pwd) return;
    const { error } = await sb.auth.signInWithPassword({email, password:pwd});
    if(error) document.getElementById('login-msg').innerText = '登录失败：'+error.message;
}
async function logout(){ await sb.auth.signOut(); showLogin(); }

function switchTab(tab){
    document.querySelectorAll('#main-tabs button').forEach(b => b.classList.remove('active'));
    const tabs = ['business','reservations','feedbacks','info'];
    const idx = tabs.indexOf(tab);
    if(idx>=0) document.querySelectorAll('#main-tabs button')[idx].classList.add('active');
    tabs.forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if(tab==='business') loadBusinessTab();
    if(tab==='reservations') { loadActivityCategoriesForSelect(); loadReservations(); }
    if(tab==='feedbacks') loadMerchantFeedbacks();
    if(tab==='info') loadInfo();
}

// ---------- 活动类别管理 ----------
async function loadActivityCategories(){
    if(merchant.service_data && merchant.service_data.categories){
        activityCategories = merchant.service_data.categories;
    } else {
        activityCategories = [];
    }
    renderActivityCategories();
}
function renderActivityCategories(){
    const container = document.getElementById('activity-category-list');
    if(!activityCategories.length){ container.innerHTML = '<p>暂无类别</p>'; return; }
    let html = '<ul>';
    activityCategories.forEach((cat, idx) => {
        html += `<li>${cat} <button class="btn btn-danger" onclick="deleteActivityCategory(${idx})">删除</button></li>`;
    });
    html += '</ul>';
    container.innerHTML = html;
}
function toggleCategoryManager(){
    document.getElementById('category-manager').classList.toggle('hidden');
    loadActivityCategories();
}
async function addActivityCategory(){
    const name = document.getElementById('new-category-name').value.trim();
    if(!name) return;
    if(activityCategories.includes(name)){ alert('已存在'); return; }
    activityCategories.push(name);
    await updateMerchantCategories();
    document.getElementById('new-category-name').value = '';
    renderActivityCategories();
}
async function deleteActivityCategory(idx){
    activityCategories.splice(idx, 1);
    await updateMerchantCategories();
    renderActivityCategories();
}
async function updateMerchantCategories(){
    const currentService = merchant.service_data || {};
    currentService.categories = activityCategories;
    const { error } = await sb.from('ztj_merchants').update({ service_data: currentService }).eq('id', merchant.id);
    if(!error) merchant.service_data = currentService;
}
async function loadActivityCategoriesForSelect(){
    await loadActivityCategories();
    const sel = document.getElementById('new-res-activity');
    if(sel){
        sel.innerHTML = '<option value="">--选择--</option>';
        activityCategories.forEach(cat => {
            sel.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
    }
}

// ---------- 业务管理 ----------
function loadBusinessTab(){
    const data = merchant.service_data && merchant.service_data.items ? merchant.service_data.items : [];
    businessItems = JSON.parse(JSON.stringify(data));
    renderBusinessList();
}
function renderBusinessList(){
    const container = document.getElementById('business-list');
    if(!businessItems.length){ container.innerHTML = '<p>暂无业务项目</p>'; return; }
    let html = '';
    businessItems.forEach((item, idx) => {
        if(!item.name) return;
        html += `<div class="item-collapse">
            <div class="item-header" onclick="toggleBusinessDetail(${idx})">
                <span>${idx+1}. ${item.name} ${item.image ? '<img src="'+item.image+'" style="height:30px; vertical-align:middle; margin-left:5px;">' : ''} - ${item.price||''} ${item.duration||''}</span>
                <span style="font-size:12px; color:#666;">点击展开编辑</span>
            </div>
            <div id="biz-detail-${idx}" class="item-detail hidden">
                <div class="form-group"><label>名称</label><input id="biz-name-${idx}" value="${item.name||''}"></div>
                <div class="form-group"><label>价格</label><input type="number" id="biz-price-${idx}" value="${item.price||''}"></div>
                <div class="form-group"><label>时限/时长</label><input id="biz-duration-${idx}" value="${item.duration||''}"></div>
                <div class="form-group"><label>描述</label><textarea id="biz-desc-${idx}" rows="2">${item.description||''}</textarea></div>
                <div class="form-group"><label>图片</label><input type="file" accept="image/*" onchange="handleBizImageChange(${idx}, this)">
                ${item.image ? '<img src="'+item.image+'" class="upload-preview">' : ''}</div>
                <button class="btn btn-primary" onclick="saveBusinessItem(${idx})">保存修改</button>
                <button class="btn btn-danger" onclick="deleteBusinessItem(${idx})">删除</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}
window.toggleBusinessDetail = function(idx){ document.getElementById('biz-detail-'+idx).classList.toggle('hidden'); };
async function handleBizImageChange(idx, input){
    const file = input.files[0]; if(!file) return;
    const path = `merchant-${merchant.id}/business/${Date.now()}.jpg`;
    const { error } = await sb.storage.from('merchant-uploads').upload(path, file);
    if(error){ alert('上传失败'); return; }
    const { data: { publicUrl } } = sb.storage.from('merchant-uploads').getPublicUrl(path);
    businessItems[idx].image = publicUrl;
    renderBusinessList();
}
function saveBusinessItem(idx){
    businessItems[idx].name = document.getElementById(`biz-name-${idx}`).value;
    businessItems[idx].price = document.getElementById(`biz-price-${idx}`).value;
    businessItems[idx].duration = document.getElementById(`biz-duration-${idx}`).value;
    businessItems[idx].description = document.getElementById(`biz-desc-${idx}`).value;
    updateMerchantServiceData();
    renderBusinessList();
    alert('已更新');
}
function deleteBusinessItem(idx){
    if(!confirm('删除？')) return;
    businessItems.splice(idx, 1);
    updateMerchantServiceData();
    renderBusinessList();
}
async function updateMerchantServiceData(){
    const currentService = merchant.service_data || {};
    currentService.items = businessItems;
    const { error } = await sb.from('ztj_merchants').update({ service_data: currentService }).eq('id', merchant.id);
    if(!error) merchant.service_data = currentService;
}
function toggleAddBusinessForm(){ document.getElementById('add-business-form').classList.toggle('hidden'); }
async function addBusinessItem(){
    const name = document.getElementById('new-biz-name').value.trim();
    const price = document.getElementById('new-biz-price').value.trim();
    const duration = document.getElementById('new-biz-duration').value.trim();
    const desc = document.getElementById('new-biz-desc').value.trim();
    if(!name){ alert('名称必填'); return; }
    let image = '';
    const file = document.getElementById('new-biz-image').files[0];
    if(file){
        const path = `merchant-${merchant.id}/business/${Date.now()}.jpg`;
        const { error } = await sb.storage.from('merchant-uploads').upload(path, file);
        if(!error){
            const { data: { publicUrl } } = sb.storage.from('merchant-uploads').getPublicUrl(path);
            image = publicUrl;
        }
    }
    businessItems.push({ name, price, duration, description: desc, image });
    await updateMerchantServiceData();
    document.getElementById('new-biz-name').value='';
    document.getElementById('new-biz-price').value='';
    document.getElementById('new-biz-duration').value='';
    document.getElementById('new-biz-desc').value='';
    document.getElementById('new-biz-image').value='';
    toggleAddBusinessForm();
    renderBusinessList();
}

// ---------- 预约列表 ----------
async function loadReservations(){
    const { data } = await sb.from('reservations').select('*').eq('merchant_id', merchant.id).order('created_at', false);
    let html = '';
    if(data && data.length){
        data.forEach((r, idx) => {
            let category = '';
            if(r.remark && r.remark.includes('类别：')) {
                category = r.remark.split('类别：')[1]?.split('|')[0] || '';
            }
            html += `<div class="reservation-card card">
                <div class="item-header" onclick="toggleReservationDetail(${idx})">
                    <span>${idx+1}. ${r.reservation_date} ${r.time_slot_start}-${r.time_slot_end||''} | ${r.visitor_count}人 | ${r.unit||''} | ${r.name}</span>
                </div>
                <div id="res-detail-${idx}" class="item-detail hidden">
                    <p><b>活动类别：</b>${category||'未指定'} <b>地点：</b>${r.room||''}</p>
                    <p><b>联系人：</b>${r.name} ${r.phone}</p>
                    <p><b>单位：</b>${r.unit||''} <b>人数：</b>${r.visitor_count}</p>
                    <p><b>备注：</b>${r.remark ? r.remark.replace('类别：'+category+'|', '').replace('类别：'+category, '') : ''}</p>
                    ${r.image ? `<img src="${r.image}" class="upload-preview">` : ''}
                    <p><b>状态：</b>${r.status}</p>
                    <div style="display:flex; gap:6px; flex-wrap:wrap;">
                        ${r.status==='pending' ? `<button class="btn btn-primary" onclick="updateReservation(${r.id},'confirmed')">确认</button><button class="btn btn-danger" onclick="updateReservation(${r.id},'rejected')">拒绝</button>` : ''}
                        <button class="btn btn-danger" onclick="deleteReservation(${r.id})">删除</button>
                    </div>
                </div>
            </div>`;
        });
    } else html = '<p>暂无预约</p>';
    document.getElementById('reservation-list').innerHTML = html;
}
window.toggleReservationDetail = function(idx){ document.getElementById('res-detail-'+idx).classList.toggle('hidden'); };
async function updateReservation(id, status){ await sb.from('reservations').update({status}).eq('id',id); loadReservations(); }
async function deleteReservation(id){ if(confirm('删除？')){ await sb.from('reservations').delete().eq('id',id); loadReservations(); } }

function toggleAddReservationForm(){
    document.getElementById('add-reservation-form').classList.toggle('hidden');
    loadActivityCategoriesForSelect();
}
async function addReservation(){
    const date = document.getElementById('new-res-date').value;
    const timeRange = document.getElementById('new-res-time').value;
    const [start, end] = timeRange.split('-');
    const name = document.getElementById('new-res-name').value.trim();
    const phone = document.getElementById('new-res-phone').value.trim();
    const unit = document.getElementById('new-res-unit').value.trim();
    const count = parseInt(document.getElementById('new-res-count').value) || 0;
    const activity = document.getElementById('new-res-activity').value;
    const room = document.getElementById('new-res-room').value.trim();
    const remarkBase = document.getElementById('new-res-remark').value.trim();
    let finalRemark = '';
    if(activity) finalRemark += `类别：${activity}`;
    if(remarkBase) finalRemark += (finalRemark ? '|' : '') + remarkBase;
    if(!date||!timeRange||!name||!phone){ alert('请填写必填项'); return; }
    const { error } = await sb.from('reservations').insert({
        merchant_id: merchant.id,
        reservation_date: date,
        time_slot_start: start,
        time_slot_end: end,
        name, phone, unit, visitor_count: count,
        remark: finalRemark,
        room: room,
        status: 'pending',
        user_id: 'manual'
    });
    if(error){ alert('保存失败：'+error.message); return; }
    document.getElementById('new-res-date').value='';
    document.getElementById('new-res-time').value='08:00-09:00';
    document.getElementById('new-res-name').value='';
    document.getElementById('new-res-phone').value='';
    document.getElementById('new-res-unit').value='';
    document.getElementById('new-res-count').value='';
    document.getElementById('new-res-activity').value='';
    document.getElementById('new-res-room').value='';
    document.getElementById('new-res-remark').value='';
    toggleAddReservationForm();
    loadReservations();
}

// ---------- 留言 ----------
async function loadMerchantFeedbacks(){
    const { data } = await sb.from('ztj_feedbacks').select('*').eq('merchant_id', merchant.id).order('created_at', false);
    let html = '';
    data.forEach(f=>{
        html += `<div class="card"><p>${f.message}</p><small>${new Date(f.created_at).toLocaleString()}</small><p>${f.reply||'暂未回复'}</p><textarea id="reply-${f.id}">${f.reply||''}</textarea><button class="btn btn-primary" onclick="replyFeedback(${f.id})">回复</button></div>`;
    });
    document.getElementById('feedback-list').innerHTML = html || '<p>暂无留言</p>';
}
async function replyFeedback(id){
    const reply = document.getElementById('reply-'+id).value;
    await sb.from('ztj_feedbacks').update({reply}).eq('id',id);
    loadMerchantFeedbacks();
}

// ---------- 基本信息 ----------
function loadInfo(){
    document.getElementById('business_type').value = merchant.business_type || 'other';
    document.getElementById('status').value = merchant.status || 'open';
    document.getElementById('phone').value = merchant.phone || '';
    document.getElementById('address').value = merchant.address || '';
    document.getElementById('parking').value = merchant.parking_spots || 0;
    document.getElementById('intro').value = merchant.intro || '';
}
async function saveInfo(){
    const updates = {
        business_type: document.getElementById('business_type').value,
        status: document.getElementById('status').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        parking_spots: parseInt(document.getElementById('parking').value)||0,
        intro: document.getElementById('intro').value
    };
    const { error } = await sb.from('ztj_merchants').update(updates).eq('id', merchant.id);
    if(!error) { Object.assign(merchant, updates); alert('已保存'); }
    else alert('保存失败：'+error.message);
}

checkSession();
</script>
</body>
</html>
