<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理 - 通江文旅</title>
    <style>
        /* 简洁管理后台样式 */
        body { font-family: system-ui; background:#f5f5f5; margin:0; }
        .header { background:#1B5E20; color:white; padding:12px; display:flex; justify-content:space-between; }
        .container { max-width:800px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
        .tab { display:flex; gap:8px; margin-bottom:20px; }
        .tab button { padding:10px; border:none; background:#e0e0e0; cursor:pointer; }
        .tab button.active { background:#2E7D32; color:white; }
        .form-group { margin:12px 0; }
        label { display:block; margin-bottom:4px; }
        input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
        .btn { padding:8px 16px; border:none; border-radius:4px; cursor:pointer; }
        .btn-primary { background:#2E7D32; color:white; }
        .btn-danger { background:#B71C1C; color:white; }
        .card { border:1px solid #ddd; border-radius:8px; padding:12px; margin:12px 0; }
        .time-slot-item { display:flex; gap:8px; align-items:center; margin:8px 0; }
        .status-badge { padding:2px 8px; border-radius:12px; font-size:12px; }
        .status-pending { background:#FFF3E0; color:#E65100; }
        .status-confirmed { background:#E3F2FD; color:#01579B; }
    </style>
</head>
<body>
<div id="login-page">
    <div class="container" style="max-width:400px; margin-top:60px;">
        <h2>商户登录</h2>
        <div class="form-group"><input type="text" id="account" placeholder="账号 (如 st001)"></div>
        <div class="form-group"><input type="password" id="password" placeholder="密码"></div>
        <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
        <p id="login-msg"></p>
    </div>
</div>

<div id="main-page" style="display:none;">
    <div class="header">
        <span id="merchant-name"></span>
        <button onclick="logout()">退出</button>
    </div>
    <div class="container">
        <div class="tab">
            <button class="active" onclick="switchTab('info')">🏪 基本信息</button>
            <button onclick="switchTab('reserve-settings')">⚙️ 预约设置</button>
            <button onclick="switchTab('activities')">📋 活动模板</button>
            <button onclick="switchTab('reservations')">📅 预约列表</button>
        </div>

        <!-- 基本信息面板 -->
        <div id="tab-info">
            <div class="form-group"><label>营业状态</label><select id="status"><option value="open">营业中</option><option value="closed">休息</option><option value="busy">繁忙</option></select></div>
            <div class="form-group"><label>联系电话</label><input id="phone"></div>
            <div class="form-group"><label>地址</label><input id="address"></div>
            <div class="form-group"><label>停车场余位</label><input type="number" id="parking" min="0"></div>
            <div class="form-group"><label>简介/公告</label><textarea id="intro" rows="3"></textarea></div>
            <button class="btn btn-primary" onclick="saveInfo()">保存</button>
        </div>

        <!-- 预约设置面板（仅红色景区显示，通过权限控制） -->
        <div id="tab-reserve-settings" class="hidden">
            <h3>每日接待限制</h3>
            <div class="form-group"><label>每日总团队上限</label><input type="number" id="day-limit" min="1"></div>
            <div class="form-group"><label>每团最大人数</label><input type="number" id="team-max" min="1"></div>
            <h3>可预约时段</h3>
            <div id="time-slots"></div>
            <button onclick="addTimeSlot()">+ 添加时段</button>
            <button class="btn btn-primary" onclick="saveReserveSettings()">保存时段</button>
        </div>

        <!-- 活动模板面板 -->
        <div id="tab-activities" class="hidden">
            <div id="activity-list"></div>
            <button onclick="addActivity()">+ 新增活动</button>
        </div>

        <!-- 预约列表面板 -->
        <div id="tab-reservations" class="hidden">
            <div id="reservation-list"></div>
        </div>
    </div>
</div>

<script src="supabase-js"></script>
<script>
    const sb = supabase.createClient(URL, KEY);
    let merchant = null;

    async function login() {
        const account = document.getElementById('account').value.trim();
        const pwd = document.getElementById('password').value;
        const email = account.includes('@') ? account : account + '@merchant.tj';
        const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if (error) { document.getElementById('login-msg').innerText = '登录失败'; return; }
        // 获取商户信息
        const { data: m } = await sb.from('ztj_merchants').select('*').eq('id', sb.auth.user().id).single();
        if (!m) { alert('非商户账号'); logout(); return; }
        merchant = m;
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
        document.getElementById('merchant-name').innerText = m.display_name;
        loadMerchantData();
        loadReservations();
        subscribeReservations();
    }

    function loadMerchantData() {
        document.getElementById('status').value = merchant.status || 'open';
        document.getElementById('phone').value = merchant.phone || '';
        document.getElementById('address').value = merchant.address || '';
        document.getElementById('parking').value = merchant.parking_spots || 0;
        document.getElementById('intro').value = merchant.intro || '';
        // 加载预约设置等
    }

    async function saveInfo() {
        const updates = {
            status: document.getElementById('status').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            parking_spots: parseInt(document.getElementById('parking').value) || 0,
            intro: document.getElementById('intro').value
        };
        await sb.from('ztj_merchants').update(updates).eq('id', merchant.id);
        alert('已保存');
    }

    // 预约设置相关（略）
    // 活动模板编辑（略）
    // 预约列表与确认/拒绝操作
    async function loadReservations() {
        const { data } = await sb.from('reservations').select('*').eq('merchant_id', merchant.id).order('created_at', false);
        renderReservations(data);
    }

    function renderReservations(list) {
        let html = '';
        list.forEach(r => {
            const statusMap = { pending:'待确认', confirmed:'已确认', rejected:'已拒绝', completed:'已完成' };
            html += `<div class="card">
                <span class="status-badge status-${r.status}">${statusMap[r.status]}</span>
                <p><b>${r.activity_name}</b> | ${r.visitor_count}人 | ${r.reservation_date} ${r.time_slot}</p>
                <p>联系人：${r.name} ${r.phone}</p>
                ${r.status==='pending' ? `<button class="btn btn-primary" onclick="updateReservation(${r.id},'confirmed')">确认</button><button class="btn btn-danger" onclick="updateReservation(${r.id},'rejected')">拒绝</button>` : ''}
            </div>`;
        });
        document.getElementById('reservation-list').innerHTML = html || '<p>暂无预约</p>';
    }

    async function updateReservation(id, status) {
        await sb.from('reservations').update({ status }).eq('id', id);
        loadReservations();
    }

    function subscribeReservations() {
        sb.channel('merchant-reservations').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reservations', filter: `merchant_id=eq.${merchant.id}` }, payload => {
            // 新预约提醒，可播放提示音
            loadReservations();
        }).subscribe();
    }
</script>
</body>
</html>
